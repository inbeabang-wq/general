또는 할론/대체가스 소화기입니다.", "ae": "CO₂ or Halon/replacement extinguishers."}, {"id": "o_c10_8", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "강풍 예보 시 항공기 계류 요령은?", "qe": "How do you tie down for forecast high winds?", "ak": "굄목·계류로 고정하고 기수를 바람 방향으로 둡니다.", "ae": "Chock and tie down, and point the nose into the wind."}, {"id": "o_c10_9", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "화재 삼각형과 소화 원리를 설명하라.", "qe": "Explain the fire triangle and extinguishing.", "ak": "연료·산소·열 중 하나를 제거하면 소화됩니다.", "ae": "Remove any one of fuel, oxygen, or heat."}, {"id": "o_c10_10", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "Class D 화재의 소화제는?", "qe": "What extinguishes a Class D fire?", "ak": "금속화재 전용 건식 분말입니다. 물·CO₂는 부적합합니다.", "ae": "Special dry powder for metals; not water or CO₂."}, {"id": "o_c10_11", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "핫스타트란 무엇이며 조치는?", "qe": "What is a hot start and the action required?", "ak": "시동 중 EGT가 한계로 급상승하는 것 — 즉시 시동 중단합니다.", "ae": "EGT rising toward limits during start — abort immediately."}, {"id": "o_c10_12", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "핸드프로핑의 기본 안전수칙은?", "qe": "Basic safety rule for hand propping?", "ak": "프로펠러를 항상 점화 ON 상태로 간주하고, 유자격자 조종석 배치 후 실시합니다.", "ae": "Treat the prop as live; qualified person at the controls."}, {"id": "o_c10_13", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "왕복엔진 시동 중 흡기(induction) 화재 소화법은?", "qe": "How do you extinguish an induction fire when starting a recip engine?", "ak": "엔진을 계속 돌려 불을 빨아들이고, 안 되면 CO₂를 기화기 흡입구로.", "ae": "Keep the engine cranking to draw the fire in; if not, direct CO₂ into the carburetor air inlet."}, {"id": "o_c10_14", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "왕복엔진 흡기화재에 가장 적합한 소화기는?", "qe": "What extinguisher is best for an induction fire?", "ak": "이산화탄소(CO₂).", "ae": "Carbon dioxide."}, {"id": "o_c10_15", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "터보제트 시동 중 헝스타트(hung start) 발생 시?", "qe": "What if a hung start occurs on a turbojet?", "ak": "시동을 중단하고 가속 실패 원인을 찾는다.", "ae": "Terminate the start and find the reason it wouldn't accelerate."}, {"id": "o_c10_16", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "실린더의 액압잠김(liquid lock)이란? 해소법은?", "qe": "What is a liquid lock in a cylinder and how is it cleared?", "ak": "하부 실린더에 오일이 고인 것. 점화플러그를 빼고 크랭크축을 돌려 밀어냄.", "ae": "Oil in the lower cylinders; remove a spark plug and turn the crankshaft to force it out."}, {"id": "o_c10_17", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "조향 노즈휠 항공기 견인 시 주의사항은?", "qe": "What precautions when towing an aircraft with a steerable nosewheel?", "ak": "노즈휠이 스톱을 넘지 않게, 필요시 토션링크를 분리.", "ae": "Don't let the nosewheel turn past its stops; disconnect the torsion links if required."}, {"id": "o_c10_18", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "플로트 기화기 엔진 시동 시 카브히트 위치는?", "qe": "Carb heat position when starting a float-carburetor engine?", "ak": "'Cold' 위치.", "ae": "In the 'Cold' position."}, {"id": "o_c10_19", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "아이들 중인 터보제트 전방 위험구역은?", "qe": "How far ahead does the danger area extend for an idling turbojet?", "ak": "25피트.", "ae": "25 feet."}, {"id": "o_c10_20", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "터빈 연료를 왕복엔진용 항공가솔린에 섞으면 안 되는 이유는?", "qe": "Why must turbine fuel not be mixed with avgas in a recip engine?", "ak": "엔진 디토네이션을 일으킴.", "ae": "It will cause the engine to detonate."}, {"id": "o_c10_21", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "파란색으로 착색된 항공가솔린 등급은?", "qe": "What grade of aviation gasoline is dyed blue?", "ak": "저납(low-lead) 100옥탄.", "ae": "Low-lead 100-octane."}, {"id": "o_c10_22", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "100옥탄용 엔진을 80옥탄으로 운전하면?", "qe": "What damage if a 100-octane engine runs on 80-octane?", "ak": "디토네이션 → 커넥팅로드 휨, 피스톤 소손, 실린더헤드 균열.", "ae": "Detonation, causing bent rods, burned pistons, cracked heads."}, {"id": "o_c10_23", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "왕복엔진의 디토네이션(detonation)이란?", "qe": "What is meant by detonation in a recip engine?", "ak": "실린더 내 연료의 통제되지 않은 폭발적 연소.", "ae": "Uncontrolled, explosive burning of the fuel in the cylinder."}, {"id": "o_c10_24", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "연료가 너무 쉽게 기화하면 위험한 이유는?", "qe": "What is the danger of fuel that vaporizes too readily?", "ak": "연료라인에 베이퍼록이 생겨 연료 흐름이 끊김.", "ae": "Vapor lock can form in the lines, shutting off fuel flow."}, {"id": "o_c10_25", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "Jet-A 연료는 어떤 연료인가?", "qe": "What type of fuel is Jet-A?", "ak": "등유계, 인화점 110~150°F, 어는점 -40°F, 18,600 Btu/lb.", "ae": "A kerosine-base fuel; flash 110–150°F, freeze -40°F, 18,600 Btu/lb."}, {"id": "o_c10_26", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "항공가솔린 100/130 이중등급의 의미는?", "qe": "What is the significance of the 100/130 dual rating?", "ak": "앞 숫자는 희박혼합 옥탄가, 뒤 숫자는 농후혼합 성능수치.", "ae": "First is the lean-mixture octane, second the rich-mixture performance number."}, {"id": "o_c10_27", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "항공가솔린에 첨가하는 사에틸납(TEL)의 두 기능은?", "qe": "What are two functions of tetraethyl lead in avgas?", "ak": "임계 압력·온도를 높이고 밸브를 윤활.", "ae": "Raises critical pressure/temperature and lubricates the valves."}, {"id": "o_c10_28", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "왕복엔진기의 연료주입구 부근 표시 정보는?", "qe": "What info near the fuel filler on a recip aircraft?", "ak": "'Avgas'와 최소 연료 등급.", "ae": "The word 'Avgas' and the minimum fuel grade."}, {"id": "o_c10_29", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "터빈기의 연료주입구 부근 표시 정보는?", "qe": "What info near the fuel filler on a turbine aircraft?", "ak": "'Jet Fuel', 허용 연료 지정, 압력급유 시 최대 급유·배유 압력.", "ae": "'Jet Fuel', permissible designations, and pressure-fueling limits."}, {"id": "o_c10_30", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "지상활주 중 관제탑이 붉은 점멸등을 비추면?", "qe": "What action when taxiing if the tower shines a flashing red light?", "ak": "사용 중인 활주로에서 벗어난다.", "ae": "Taxi the aircraft clear of the runway in use."}, {"id": "o_c10_31", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "활주 유도 표준 수신호가 실린 간행물은?", "qe": "What publication lists standard hand signals for a taxiing aircraft?", "ak": "항공정보매뉴얼(AIM).", "ae": "The Aeronautical Information Manual."}, {"id": "o_c10_32", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "왕복엔진 연료에 터빈연료가 잘못 들어가 운전된 경우 조치는?", "qe": "What if turbine fuel is inadvertently put in a recip engine's tanks and run?", "ak": "연료계통 배유·플러싱, 압축·보어스코프 점검, 오일 배유·필터 점검 후 재급유·시운전.", "ae": "Drain and flush the fuel system, do compression and borescope checks, drain oil and check filters, then refuel and run up."}, {"id": "o_c11_1", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "정비·개조의 기준이 되는 규정 Part는?", "qe": "Which Part governs maintenance and alteration?", "ak": "14 CFR Part 43입니다.", "ae": "14 CFR Part 43."}, {"id": "o_c11_2", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "정비사 자격을 규정하는 Part는?", "qe": "Which Part governs mechanic certification?", "ak": "14 CFR Part 65입니다.", "ae": "14 CFR Part 65."}, {"id": "o_c11_3", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "AD와 SB의 강제성 차이는?", "qe": "How do AD and SB differ in force?", "ak": "AD는 법적 강제(Part 39), SB는 제작사 권고로 AD로 채택되지 않는 한 강제가 아닙니다.", "ae": "AD is legally mandatory (Part 39); SB is a recommendation unless adopted by an AD."}, {"id": "o_c11_4", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "대수리·대개조에 필요한 자료의 등급은?", "qe": "What data class is required for major repair/alteration?", "ak": "승인(Approved) 자료입니다.", "ae": "Approved data."}, {"id": "o_c11_5", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "AC 43.13-1B는 어떤 자료인가?", "qe": "What kind of data is AC 43.13-1B?", "ak": "수용 가능한(Acceptable) 방법·기술·관행이며, 그 자체로 승인 자료는 아닙니다.", "ae": "Acceptable methods/techniques/practices — not approved data by itself."}, {"id": "o_c11_6", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "형식설계 부합 여부의 판단 기준 서류는?", "qe": "Which document is the basis for type-design conformity?", "ak": "형식증명자료집(TCDS)입니다.", "ae": "The Type Certificate Data Sheet (TCDS)."}, {"id": "o_c11_7", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "STC는 무엇을 승인하는가?", "qe": "What does an STC approve?", "ak": "기존 형식설계에 대한 변경(개조)을 승인합니다.", "ae": "A change (alteration) to an existing type design."}, {"id": "o_c11_8", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "의심 부품(SUP)을 발견하면?", "qe": "What do you do with a suspected unapproved part?", "ak": "사용하지 않고 격리·보고합니다.", "ae": "Do not use it; quarantine and report it."}, {"id": "o_c11_9", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "Part 145와 Part 147의 차이는?", "qe": "Distinguish Part 145 from Part 147.", "ak": "145는 인가정비조직(수리시설), 147은 정비사 양성학교 규정입니다.", "ae": "145 governs repair stations; 147 governs AMT schools."}, {"id": "o_c11_10", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "100시간 검사 초과 운항 규정을 설명하라.", "qe": "Explain the 100-hour overflight rule.", "ak": "검사 장소 이동 목적으로 최대 10시간 초과 가능하며 초과분은 다음 주기에서 차감됩니다.", "ae": "Up to 10 hours to reach the facility; excess is deducted from the next interval."}, {"id": "o_c11_11", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "TSO 승인과 장착 승인은 같은가?", "qe": "Is TSO approval the same as installation approval?", "ak": "다릅니다. TSO는 부품 성능 표준 충족일 뿐, 장착은 별도 승인 필요합니다.", "ae": "No — TSO covers the article; installation needs separate approval."}, {"id": "o_c11_12", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "감항증명서의 유효 조건은?", "qe": "When does an airworthiness certificate remain valid?", "ak": "항공기가 규정에 따라 정비·검사되어 감항성이 유지될 때입니다.", "ae": "While the aircraft is maintained and inspected per regulations."}, {"id": "o_c11_13", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "100시간 검사 복귀 전 어떤 기록을 남기는가?", "qe": "What record must be made of a 100-hour inspection before RTS?", "ak": "검사 종류·범위·날짜·총사용시간·서명·자격번호를 기재.", "ae": "An entry with the type/extent of inspection, date, total time, signature, and certificate number."}, {"id": "o_c11_14", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "100시간 검사 항목 목록은 어디에 있는가?", "qe": "Where is the list of items for a 100-hour inspection?", "ak": "14 CFR Part 43 부록 D.", "ae": "14 CFR Part 43, Appendix D."}, {"id": "o_c11_15", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "진행검사(progressive inspection)란?", "qe": "What is meant by a progressive inspection?", "ak": "FAA 승인 일정에 따라 나눠 수행하는 검사(장기 미가동 없이).", "ae": "An FAA-approved schedule allowing the inspection to be done over time."}, {"id": "o_c11_16", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "FAA 자문서(Advisory Circular)란?", "qe": "What is an FAA Advisory Circular?", "ak": "규제가 아닌 정보 제공용 FAA 간행물.", "ae": "A publication put out by the FAA for information, not regulation."}, {"id": "o_c11_17", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "연방항공규정(FAR)이란?", "qe": "What is a Federal Aviation Regulation?", "ak": "항공 활동에 관한 실제 법령.", "ae": "The actual law regarding the conduct of aviation."}, {"id": "o_c11_18", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "특정 기체 정비 지침은 어디서 찾는가?", "qe": "Where does a mechanic find specific maintenance instructions for a particular aircraft?", "ak": "제작사의 FAA 승인 정비교범.", "ae": "In the FAA-approved maintenance manual by the manufacturer."}, {"id": "o_c11_19", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "감항성 개선지시(AD)의 목적은?", "qe": "What is the purpose of an Airworthiness Directive?", "ak": "불감항 상태를 소유자·운용자에게 경고하기 위해.", "ae": "To warn the owner of a condition that renders the aircraft unairworthy."}, {"id": "o_c11_20", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "승인된 대개조 목록은 어디서 찾는가?", "qe": "Where is a list of major alterations approved for a certificated aircraft?", "ak": "STC 요약(Summary of STCs).", "ae": "In the Summary of Supplemental Type Certificates."}, {"id": "o_c11_21", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "보통·실용·곡예 카테고리 감항기준은 어느 Part?", "qe": "Where are airworthiness standards for normal, utility, acrobatic aircraft?", "ak": "14 CFR Part 23.", "ae": "14 CFR Part 23."}, {"id": "o_c11_22", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "수송 카테고리 감항기준은 어느 Part?", "qe": "Where are airworthiness standards for transport category aircraft?", "ak": "14 CFR Part 25.", "ae": "14 CFR Part 25."}, {"id": "o_c11_23", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "보통 카테고리 회전익 감항기준은 어느 Part?", "qe": "Where are airworthiness standards for normal category rotorcraft?", "ak": "14 CFR Part 27.", "ae": "14 CFR Part 27."}, {"id": "o_c11_24", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "연차·100시간 검사 항목 목록은 어느 규정?", "qe": "Where is the list of items for annual/100-hour inspections?", "ak": "14 CFR Part 43 부록 D.", "ae": "14 CFR Part 43, Appendix D."}, {"id": "o_c11_25", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "특정 항공기에 승인된 엔진 목록은 어디?", "qe": "Where do you find engines approved for a specific airplane?", "ak": "해당 기체의 TCDS.", "ae": "In the Type Certificate Data Sheets."}, {"id": "o_c11_26", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "항공기 식별번호 표시 규격은 어느 Part?", "qe": "Where are the specifications for ID numbers displayed on an aircraft?", "ak": "14 CFR Part 45.", "ae": "14 CFR Part 45."}, {"id": "o_c11_27", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "항공기·엔진 정비에 쓰는 제작사 정보 자료는?", "qe": "What info from the manufacturer allows proper maintenance?", "ak": "FAA 승인 정비교범(service manuals).", "ae": "FAA-approved service manuals."}, {"id": "o_c11_28", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "제작사가 안전·성능 변경을 현장에 알리는 방법은?", "qe": "How does the manufacturer keep the field aware of changes?", "ak": "정비회보(service bulletins) 발행.", "ae": "By issuing service bulletins."}, {"id": "o_c11_29", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "특정 항공기의 인증 카테고리는 어느 정부간행물에서?", "qe": "Which government publication shows an aircraft's certificated category?", "ak": "해당 기체의 TCDS.", "ae": "In the Type Certificate Data Sheets."}, {"id": "o_c11_30", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "정비사가 §45.21~45.33대로 표시할 수 없으면 어떻게 하는가?", "qe": "If marking per 45.21/45.23–45.33 is impossible, what must be done?", "ak": "소유자·운용자가 FAA에 다른 표시 절차를 신청.", "ae": "The owner/operator may apply to the FAA for a different marking procedure."}, {"id": "o_c11_31", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "FAA Form 8100-2는 무엇인가?", "qe": "What is FAA Form 8100-2?", "ak": "표준 감항증명서(Standard Airworthiness Certificate).", "ae": "A Standard Airworthiness Certificate."}, {"id": "o_c11_32", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "불규칙·부주의한 검사는 어떤 결과를 낳는가?", "qe": "Irregular and haphazard inspections invariably result in what?", "ak": "항공기의 점진적이고 확실한 열화.", "ae": "A gradual and certain deterioration of the aircraft."}, {"id": "o_c11_33", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "§91.411 고도계 검사는 누가 수행하는가?", "qe": "Who performs the altimeter inspection required under §91.411?", "ak": "해당 작업에 승인된 FAA 인가 수리시설.", "ae": "An FAA-certificated repair station approved for that function."}, {"id": "o_c12_1", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "A&P 정비사가 단독으로 승인할 수 없는 것은?", "qe": "What can an A&P NOT approve alone?", "ak": "대수리·대개조의 최종 승인과 연차검사입니다(IA 필요).", "ae": "Final approval of major repairs/alterations and annual inspections (IA required)."}, {"id": "o_c12_2", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "무자격자가 정비할 수 있는 조건은?", "qe": "Under what condition may an unrated person do maintenance?", "ak": "자격 정비사의 직접 감독 하에서만 가능합니다.", "ae": "Only under the direct supervision of a certificated mechanic."}, {"id": "o_c12_3", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사 권한 행사의 최근 경험 요건은?", "qe": "What is the recency requirement to exercise privileges?", "ak": "최근 24개월 중 6개월 이상 관련 업무 수행(또는 재검)입니다.", "ae": "At least 6 months of practice within the last 24 months (or retesting)."}, {"id": "o_c12_4", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "사용가능 복귀(RTS) 서명이 증명하는 것은?", "qe": "What does an RTS sign-off certify?", "ak": "작업이 승인 자료·규정에 따라 수행되어 감항성이 있음을 증명합니다.", "ae": "That the work meets approved data/regs and the item is airworthy."}, {"id": "o_c12_5", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "RTS 서명에 포함되어야 할 정보는?", "qe": "What must an RTS signature include?", "ak": "정비사 이름, 자격번호, 날짜입니다.", "ae": "Name, certificate number, and date."}, {"id": "o_c12_6", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "연차검사를 승인할 수 있는 자격은?", "qe": "Who may approve an annual inspection?", "ak": "검사 권한(IA)을 가진 정비사 또는 FAA입니다.", "ae": "A mechanic with an Inspection Authorization (IA), or the FAA."}, {"id": "o_c12_7", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "능력 밖 작업을 맡았을 때 올바른 태도는?", "qe": "What if a task is beyond your competence?", "ak": "적절한 감독을 받거나 자격자에게 맡깁니다(더티더즌: 자기주장).", "ae": "Get proper supervision or refer it to a qualified person."}, {"id": "o_c12_8", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비 후 결함이 남았다면?", "qe": "If a defect remains after maintenance?", "ak": "복귀 승인을 하지 않고 미해결 결함을 기록·통보합니다.", "ae": "Do not return to service; record and report the discrepancy."}, {"id": "o_c12_9", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사 자격의 3대 기본 요건은?", "qe": "Three basic eligibility requirements for the certificate?", "ak": "18세 이상, 영어 능력, 경력/교육 요건 충족 후 시험 합격입니다.", "ae": "Age 18, English proficiency, experience/education plus passing the tests."}, {"id": "o_c12_10", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "주소 변경 통보 기한은?", "qe": "Deadline to report an address change?", "ak": "30일 이내 FAA에 서면 통보합니다.", "ae": "Within 30 days to the FAA."}, {"id": "o_c12_11", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "A&P와 IA의 검사 권한 차이는?", "qe": "Contrast A&P and IA inspection privileges.", "ak": "A&P는 100시간 검사 가능, 연차검사와 대수리·대개조 승인은 IA 필요입니다.", "ae": "A&P may do 100-hour; annuals and major repair/alteration approval need an IA."}, {"id": "o_c12_12", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "수리사(Repairman) 자격의 특징은?", "qe": "What characterizes a repairman certificate?", "ak": "특정 인가조직의 지정 업무에만 유효하며 조직을 떠나면 효력이 없습니다.", "ae": "Valid only for designated tasks at the issuing organization."}, {"id": "o_c12_13", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "100시간 검사는 누가 수행 자격이 있는가?", "qe": "Who is authorized to perform a 100-hour inspection?", "ak": "A&P(기체·동력장치) 자격 정비사.", "ae": "A certificated mechanic with an Airframe and Powerplant rating."}, {"id": "o_c12_14", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "연차검사는 누가 수행하는가?", "qe": "Who is authorized to perform an annual inspection?", "ak": "IA(검사권한)를 가진 A&P 정비사.", "ae": "A certificated A&P mechanic who holds an Inspection Authorization."}, {"id": "o_c12_15", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "A&P가 무자격자를 감독해 100시간 검사를 하게 할 수 있는가?", "qe": "Can an A&P supervise an unlicensed person performing a 100-hour inspection?", "ak": "아니오. 정비사가 직접 수행해야 함.", "ae": "No, a certificated mechanic must personally perform it."}, {"id": "o_c12_16", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "엔진을 재생하고 무시간 기록을 발행할 수 있는 자는?", "qe": "Who may rebuild an engine and issue a zero-time record?", "ak": "제작사 또는 제작사 승인 수리시설.", "ae": "Only the manufacturer or a repair station approved by the manufacturer."}, {"id": "o_c12_17", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사 자격 발급을 규정하는 Part는?", "qe": "What part gives the requirements for issuance of a mechanic certificate?", "ak": "14 CFR Part 65.", "ae": "14 CFR Part 65."}, {"id": "o_c12_18", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사 자격의 두 등급은?", "qe": "What are the two ratings for a mechanic certificate?", "ak": "기체(Airframe)와 동력장치(Powerplant).", "ae": "Airframe and Powerplant."}, {"id": "o_c12_19", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사 자격증의 유효기간은?", "qe": "For how long is a mechanic certificate valid?", "ak": "반납 또는 취소될 때까지.", "ae": "Until it is surrendered or revoked."}, {"id": "o_c12_20", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "자격 유지를 위한 최근 경험 요건은?", "qe": "What is the recency-of-experience requirement to keep a mechanic certificate valid?", "ak": "최근 24개월 중 6개월 이상 기술적·감독적으로 사용.", "ae": "Used it technically or supervisory for at least 6 of the preceding 24 months."}, {"id": "o_c12_21", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "임시 정비사 자격증의 유효기간은?", "qe": "How long is a temporary mechanic certificate valid?", "ak": "120일.", "ae": "For 120 days."}, {"id": "o_c12_22", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사가 계기의 경수리를 합법적으로 할 수 있는가?", "qe": "Is it legal for a mechanic to make a minor repair to an instrument?", "ak": "아니오, 승인 수리시설(CRS) 권한 하가 아니면 불가.", "ae": "No, unless under an approved Certificated Repair Station."}, {"id": "o_c12_23", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "기본구조 대수리 후 복귀 승인 권한자는?", "qe": "Who may approve RTS after a major repair to basic structure?", "ak": "IA를 가진 A&P 정비사.", "ae": "An A&P mechanic holding an Inspection Authorization."}, {"id": "o_c12_24", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "동력장치 정비사가 프로펠러 대수리를 할 수 있는가?", "qe": "Is it legal for a powerplant mechanic to make a major repair to a propeller?", "ak": "아니오, CRS 권한 하가 아니면 불가.", "ae": "No, unless under a Certificated Repair Station."}, {"id": "o_c12_25", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "무자격자를 감독해 100시간 검사를 하게 하는 것이 합법인가?", "qe": "Is it legal to supervise an uncertificated person performing a 100-hour inspection?", "ak": "아니오. 인가 정비사만 수행 가능.", "ae": "No, only a certificated mechanic can perform it."}, {"id": "o_c12_26", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "연차검사를 수행할 수 있는 자는?", "qe": "Who is authorized to conduct an annual inspection?", "ak": "IA를 가진 A&P 정비사.", "ae": "An A&P mechanic who holds an Inspection Authorization."}, {"id": "o_c12_27", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "동력장치 등급만 가진 정비사가 기체를 정비할 수 있는 조건은?", "qe": "Under what conditions can a powerplant-only mechanic maintain an airframe?", "ak": "기체 등급 정비사 감독 하 정비(필수 검사는 제외) 가능.", "ae": "Maintenance (not required inspections) under the supervision of an airframe-rated mechanic."}, {"id": "o_c12_28", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사 자격 취득 최소 연령은?", "qe": "What is the minimum age for a mechanic certificate?", "ak": "만 18세.", "ae": "18 years old."}, {"id": "o_c12_29", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사가 주소 변경 후 FAA에 통보하는 기한은?", "qe": "How soon must a mechanic notify the FAA of a permanent address change?", "ak": "30일 이내.", "ae": "Within 30 days."}, {"id": "o_c12_30", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "유상운항 항공기의 100시간 검사는 누가 하는가?", "qe": "Who may perform the 100-hour inspection on an aircraft operated for hire?", "ak": "적절 자격 정비사가 수행·복귀 승인.", "ae": "An appropriately rated mechanic, who approves it for return to service."}, {"id": "o_c12_31", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "100시간 검사 후 프로펠러 복귀 승인 권한자는?", "qe": "Who may approve a propeller for RTS after a 100-hour inspection?", "ak": "동력장치 등급 정비사.", "ae": "A mechanic holding a powerplant rating."}, {"id": "o_c13_1", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "정비 기록에 반드시 포함되어야 하는 4가지는?", "qe": "What four items must a maintenance record include?", "ak": "작업 설명, 완료일, 정비사 서명·자격번호, 사용가능 복귀 여부입니다.", "ae": "Work description, completion date, mechanic's signature/certificate number, and RTS status."}, {"id": "o_c13_2", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "Form 337은 언제 작성하는가?", "qe": "When is FAA Form 337 used?", "ak": "대수리 또는 대개조를 문서화할 때입니다.", "ae": "To document a major repair or major alteration."}, {"id": "o_c13_3", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "소개조는 Form 337이 필요한가?", "qe": "Does a minor alteration need a 337?", "ak": "아니요. 통상 항공일지 기재로 충분합니다.", "ae": "No; a logbook entry usually suffices."}, {"id": "o_c13_4", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "AD 준수 기록에 필요한 정보는?", "qe": "What must an AD compliance record show?", "ak": "AD 번호·개정, 준수 방법, 준수일/시간, 반복 여부와 차기 기한입니다.", "ae": "AD number/revision, method, date/time, and recurrence with next due."}, {"id": "o_c13_5", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "영구 기록(Permanent Record)의 예는?", "qe": "Give examples of permanent records.", "ak": "총시간, AD, 수명한계 부품, 대개조 기록 등입니다.", "ae": "Total time, ADs, life-limited parts, and major alterations."}, {"id": "o_c13_6", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "일반 정비 기록의 최소 보존 기간은?", "qe": "Minimum retention for routine records?", "ak": "다음 작업으로 대체되거나 최소 1년입니다.", "ae": "Until superseded or at least one year."}, {"id": "o_c13_7", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "항공일지 오기 정정 방법은?", "qe": "How do you correct a logbook error?", "ak": "원문이 보이도록 한 줄 긋고 정정 후 서명합니다.", "ae": "Draw a single line (keeping it legible), re-enter, and sign."}, {"id": "o_c13_8", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "허위 기재의 결과는?", "qe": "What is the consequence of falsifying records?", "ak": "자격 취소 등 중대한 처벌 사유입니다.", "ae": "It is grounds for certificate revocation."}, {"id": "o_c13_9", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "Form 337의 FAA 제출 기한은?", "qe": "When must Form 337 reach the FAA?", "ak": "작업 완료 후 48시간 이내입니다.", "ae": "Within 48 hours of completion."}, {"id": "o_c13_10", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "연료탱크 대수리 시 337의 특별 취급은?", "qe": "Special handling of 337 for fuel tank repairs?", "ak": "사본 한 부를 항공기 안에 비치합니다.", "ae": "Keep a copy in the aircraft."}, {"id": "o_c13_11", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "Time in Service의 정의는?", "qe": "Define time in service.", "ak": "이륙(바퀴 이지)부터 착륙(접지)까지의 시간입니다.", "ae": "From wheels-off to wheels-on."}, {"id": "o_c13_12", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "감항성 없음 판정 시 정비사의 조치는?", "qe": "What does a mechanic do when finding the aircraft unairworthy?", "ak": "복귀 승인하지 않고 서명된 결함 목록을 소유자에게 제공합니다.", "ae": "Withhold approval and give the owner a signed discrepancy list."}, {"id": "o_c13_13", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "대수리를 어떻게 기록하는가?", "qe": "What record must be made of a major repair?", "ak": "FAA Form 337을 작성하고, 정비기록에 그 337을 날짜로 참조 기재.", "ae": "Complete FAA Form 337 and reference it by date in the maintenance record."}, {"id": "o_c13_14", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "기체 대수리 후 Form 337 사본은 몇 부, 어디로 가는가?", "qe": "How many copies of Form 337 after a major airframe repair and their disposition?", "ak": "최소 2부. 원본 서명본은 소유자, 사본은 FAA로.", "ae": "At least two; the original goes to the owner, a copy to the FAA."}, {"id": "o_c13_15", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "AD 준수는 어떻게 기록하는가?", "qe": "How is compliance with an AD recorded?", "ak": "AD 번호·개정일·준수일·총시간·방법·반복 여부를 기재. 반복이면 다음 도래 시기도.", "ae": "Record the AD number, revision, date, total time, method, and (if recurring) next-due time."}, {"id": "o_c13_16", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "100시간 검사 기록은 얼마나 보관하는가?", "qe": "How long must the record of a 100-hour inspection be kept?", "ak": "1년 또는 다음 100시간 검사까지.", "ae": "For one year, or until the next 100-hour inspection."}, {"id": "o_c13_17", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "항공기 매각 시 검사상태 등 기록은 어떻게 하는가?", "qe": "What is done with the records showing current AD status when the aircraft is sold?", "ak": "항공기와 함께 인수자에게 이관.", "ae": "They must be transferred with the aircraft when sold."}, {"id": "o_c13_18", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "100시간 검사가 불감항 부품으로 불합격되면?", "qe": "What if a 100-hour inspection fails due to an unairworthy component?", "ak": "불감항으로 검사됐음을 기록하고, 서명·일자 기입 결함 목록을 소유자에게 제공.", "ae": "Record that it was inspected and found unairworthy, and give the owner a signed, dated list of discrepancies."}, {"id": "o_c13_19", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "모든 정비기록을 최신으로 유지할 책임자는?", "qe": "Who is responsible for keeping all maintenance records up to date?", "ak": "등록 소유자 또는 운용자.", "ae": "The registered owner or operator."}, {"id": "o_c13_20", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "100시간 검사 기재 예시(올바른 문구)는 어디서 찾는가?", "qe": "Where can you find an example of the correct 100-hour inspection write-up?", "ak": "14 CFR §43.11.", "ae": "In 14 CFR §43.11."}, {"id": "o_c13_21", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "정비·개조 후 기재에 필요한 항목은?", "qe": "What must a maintenance/alteration entry contain?", "ak": "작업 설명, 완료일, 수행자 이름, 서명·자격번호·자격 종류.", "ae": "A description of work, date completed, name of the person, signature, certificate number, and kind of certificate."}, {"id": "o_c13_22", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "항공기가 팔릴 때 인수자에게 넘어가는 기록은?", "qe": "What records transfer to the buyer when an aircraft is sold?", "ak": "총사용시간·현재 검사상태·AD 준수 등 영구 기록.", "ae": "Permanent records including total time, current inspection status, and AD compliance."}, {"id": "o_c14_1", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "마이크로미터의 일반 측정 단위는?", "qe": "What does a micrometer typically measure to?", "ak": "0.001인치(1/1000\")입니다.", "ae": "0.001 inch (one-thousandth)."}, {"id": "o_c14_2", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "런아웃(Runout) 측정에 쓰는 공구는?", "qe": "Which tool measures runout?", "ak": "다이얼 인디케이터(Dial Indicator)입니다.", "ae": "A dial indicator."}, {"id": "o_c14_3", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "토크렌치에 연장대를 축 방향으로 붙이면?", "qe": "If you add an in-line extension to a torque wrench?", "ak": "유효 팔길이가 바뀌므로 값을 보정해야 합니다.", "ae": "The effective length changes; recalculate the setting."}, {"id": "o_c14_4", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "'감'으로 조이면 안 되는 이유는?", "qe": "Why not tighten by 'feel'?", "ak": "과·부족 조임으로 체결 불량·파손을 유발하기 때문입니다.", "ae": "It causes over/under-torque and improper clamp-up or failure."}, {"id": "o_c14_5", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "FOD란 무엇인가?", "qe": "What is FOD?", "ak": "빠진 공구·부품이 기구·엔진에 들어가 손상을 일으키는 이물질손상입니다.", "ae": "Foreign object damage from lost tools/parts entering mechanisms/engines."}, {"id": "o_c14_6", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "섀도보드(Shadow Board)의 목적은?", "qe": "Purpose of a shadow board?", "ak": "공구 유무를 즉시 확인해 분실·FOD를 예방합니다.", "ae": "To instantly account for tools and prevent loss/FOD."}, {"id": "o_c14_7", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "작업 후 공구가 하나 없으면?", "qe": "If a tool is missing after work?", "ak": "찾을 때까지 항공기를 사용가능 복귀시키지 않습니다.", "ae": "Do not return the aircraft to service until it's found."}, {"id": "o_c14_8", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "교정 기한이 지난 공구는?", "qe": "What about a tool past its calibration due date?", "ak": "사용 금지이며 재교정해야 합니다.", "ae": "Do not use; it must be recalibrated."}, {"id": "o_c14_9", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "마이크로미터 눈금 0.025인치의 근거는?", "qe": "Why does one thimble turn equal 0.025 inch?", "ak": "스핀들 나사가 인치당 40산이라 1회전=1/40인치입니다.", "ae": "The spindle thread is 40 per inch: one turn = 1/40 inch."}, {"id": "o_c14_10", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "탭과 다이의 용도를 구분하라.", "qe": "Distinguish taps and dies.", "ak": "탭은 암나사(구멍), 다이는 수나사(봉)를 만듭니다.", "ae": "Taps cut internal threads; dies cut external threads."}, {"id": "o_c14_11", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "클릭식 토크렌치 보관 요령은?", "qe": "How is a click-type torque wrench stored?", "ak": "최저 눈금으로 풀어 스프링 장력을 해제해 보관합니다.", "ae": "Backed off to the lowest setting to relax the spring."}, {"id": "o_c14_12", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "드릴링 전 센터펀치를 치는 이유는?", "qe": "Why center punch before drilling?", "ak": "드릴 끝의 미끄러짐(워킹)을 막아 정확한 위치에 구멍을 냅니다.", "ae": "It prevents the drill from walking off location."}, {"id": "o_c15_1", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "정비사 시험 응시 자격을 얻는 세 경로는?", "qe": "What are the three pathways to test eligibility?", "ak": "Part 147 학교 졸업, 실무 경력, 군 정비 경력 인정입니다.", "ae": "Part 147 school, practical experience, or accepted military experience."}, {"id": "o_c15_2", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "A와 P를 모두 받으려면 필요한 경력 기간은?", "qe": "How much experience for both A and P?", "ak": "통상 30개월의 관련 실무 경력입니다.", "ae": "Typically 30 months of relevant practical experience."}, {"id": "o_c15_3", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "현재 시험 기준 체계는?", "qe": "What standard governs current testing?", "ak": "항공정비사 시험표준(ACS)입니다.", "ae": "The Airman Certification Standards (ACS)."}, {"id": "o_c15_4", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "구술·실기 시험을 평가하는 사람은?", "qe": "Who evaluates the oral and practical?", "ak": "지정정비사시험관(DME)입니다.", "ae": "A Designated Mechanic Examiner (DME)."}, {"id": "o_c15_5", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "지식시험 통상 합격선은?", "qe": "Typical knowledge-test passing score?", "ak": "70%입니다.", "ae": "70%."}, {"id": "o_c15_6", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "General 시험의 위치는?", "qe": "Where does the General test fit?", "ak": "A·P 공통 관문으로 먼저 통과해야 합니다.", "ae": "It is the common gateway, passed before A/P."}, {"id": "o_c15_7", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "정비 전문성의 핵심 태도는?", "qe": "What attitude defines professionalism?", "ak": "정직·규정 준수·안전 우선, '의심되면 확인한다'입니다.", "ae": "Honesty, compliance, safety first — 'when in doubt, check it out.'"}, {"id": "o_c15_8", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "정비사가 평생학습을 해야 하는 이유는?", "qe": "Why must a mechanic keep learning?", "ak": "복합재·전기추진·아비오닉스 등 기술이 계속 발전하기 때문입니다.", "ae": "Because technology (composites, electric propulsion, avionics) keeps advancing."}, {"id": "o_c15_9", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "지식시험 합격 후 유효기간과 의미는?", "qe": "How long is a passed written test valid, and why does it matter?", "ak": "24개월 — 그 안에 구술·실기를 마쳐야 하며 넘기면 재응시합니다.", "ae": "24 months; oral/practical must be finished within it."}, {"id": "o_c15_10", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "불합격 후 재응시 요건은?", "qe": "Requirements to retest after a failure?", "ak": "30일 경과 또는 추가 교육을 받았다는 교관 확인서입니다.", "ae": "30 days elapsed or an instructor's statement of added training."}, {"id": "o_c15_11", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "A·P 단일/동시 취득 경력 요건을 비교하라.", "qe": "Compare experience for one rating vs both.", "ak": "단일 18개월, 동시 30개월의 실무 경력입니다.", "ae": "18 months for one; 30 months for both."}, {"id": "o_c15_12", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "캐나다 AME와 미국 A&P의 관계는?", "qe": "How do the Canadian AME and U.S. A&P relate?", "ak": "각국의 정비사 면허로 상호 자동 인정은 아니며, 각각의 요건을 충족해야 합니다.", "ae": "Separate national licenses; no automatic conversion."}];

var PROJ = [{"no": 1, "ko": "정비 인적요인 식별", "en": "Identify Human Factors Elements", "desc": "더티더즌 12요인 중 3가지를 제시된 정비 시나리오에서 식별하고, 각 요인의 안전망(대책)을 설명한다.", "ch": 1, "file": "ch01_intro_aviation.html", "ref": "AMG.I / FAA-H-8083-30B Ch.14"}, {"no": 2, "ko": "정비 계산 수행", "en": "Perform Maintenance Mathematics", "desc": "분수↔소수 변환, 비례식으로 미지수 계산, 실린더 부피(배기량) 계산을 계산기 없이 또는 규정 방법으로 수행한다.", "ch": 2, "file": "ch02_mathematics.html", "ref": "AMG.II / FAA-H-8083-30B Ch.5"}, {"no": 3, "ko": "기체법칙·유체 원리 적용", "en": "Apply Fluid & Gas Principles", "desc": "보일·샤를 법칙으로 실린더 압력 변화를 계산하고, 파스칼 원리로 유압 힘 전달(힘·면적·압력)을 계산한다.", "ch": 3, "file": "ch03_basic_physics.html", "ref": "AMG.III / FAA-H-8083-30B Ch.3"}, {"no": 4, "ko": "전기 측정과 회로 점검", "en": "Electrical Measurement & Circuit Check", "desc": "멀티미터로 전압·전류·저항을 측정하고, 옴의 법칙으로 직렬·병렬 회로 값을 계산·검증한다. 전압강하 시험을 시연한다.", "ch": 4, "file": "ch04_basic_electricity.html", "ref": "AMG.IV / FAA-H-8083-30B Ch.9"}, {"no": 5, "ko": "도면 판독과 스케치", "en": "Read Drawings & Sketch", "desc": "제공된 도면에서 치수·공차·재질을 판독하고, 부품의 수리 스케치를 3면도로 작성한다. 도면 기호를 식별한다.", "ch": 5, "file": "ch05_aircraft_drawings.html", "ref": "AMG.V / FAA-H-8083-30B Ch.4"}, {"no": 6, "ko": "무게측정과 CG 계산", "en": "Weigh Aircraft & Compute CG", "desc": "제시된 무게측정 데이터(저울값·Tare·아암)로 자중과 자중 CG를 계산하고, 장비 추가 후 새 CG를 계산해 한계와 비교한다.", "ch": 6, "file": "ch06_weight_balance.html", "ref": "AMG.VI / FAA-H-8083-30B Ch.6"}, {"no": 7, "ko": "하드웨어 식별과 토크 작업", "en": "Identify Hardware & Apply Torque", "desc": "AN 볼트·너트·와셔를 규격표로 식별하고, 토크렌치(연장대 보정 포함)로 규정 토크를 적용하며 안전결선·코터핀을 시공한다.", "ch": 7, "file": "ch07_materials_processes.html", "ref": "AMG.VII / FAA-H-8083-30B Ch.7"}, {"no": 8, "ko": "부식 식별·제거·처리", "en": "Identify, Remove & Treat Corrosion", "desc": "시편의 부식 종류를 식별하고, 승인된 방법으로 제거 후 전환코팅·프라이머 처리 절차를 시연·설명한다.", "ch": 8, "file": "ch08_corrosion_control.html", "ref": "AMG.VIII / FAA-H-8083-30B Ch.8"}, {"no": 9, "ko": "튜브 벤딩·플레어링", "en": "Fabricate Rigid Tubing", "desc": "알루미늄 튜브를 규정 굽힘반경으로 벤딩하고 37° 싱글/더블 플레어를 제작해 검사 기준(균열·편심·치수)으로 평가한다.", "ch": 9, "file": "ch09_fluid_lines.html", "ref": "AMG.IX / FAA-H-8083-30B Ch.10"}, {"no": 10, "ko": "지상 운용과 서비싱", "en": "Ground Operations & Servicing", "desc": "견인·계류·잭업 절차를 시연하고, 급유 시 본딩·접지와 연료 오염 점검, 소화기 선택을 설명한다.", "ch": 10, "file": "ch10_ground_operation.html", "ref": "AMG.X / FAA-H-8083-30B Ch.11-12"}, {"no": 11, "ko": "규정·간행물 활용", "en": "Locate & Apply Regulations/Publications", "desc": "14 CFR·TCDS·AD·AC 43.13에서 제시된 정비 상황의 적용 규정과 승인 자료를 찾아 적용 가능 여부를 판정한다.", "ch": 11, "file": "ch11_regulations.html", "ref": "AMG.XI / FAA-H-8083-30B Ch.1-2"}, {"no": 12, "ko": "정비 기록 작성", "en": "Write Maintenance Records", "desc": "수행한 작업의 정비 기록(작업 설명·날짜·서명·자격번호)과 사용가능 복귀 문구를 규정에 맞게 작성하고, Form 337 대상 여부를 판정한다.", "ch": 13, "file": "ch13_forms_records.html", "ref": "AMG.XII / FAA-H-8083-30B Ch.2"}];
var chSel = null, showAgainOnly = false;

function getSt(){ try{return JSON.parse(localStorage.getItem('gen_oral')||'{}');}catch(e){return {};} }
function setSt(s){ try{localStorage.setItem('gen_oral', JSON.stringify(s));}catch(e){} }

var chf = document.getElementById('chf');
var allB = document.createElement('div'); allB.className='fbtn on'; allB.textContent='전체';
allB.onclick=function(){ chSel=null; upFilters(); render(); }; chf.appendChild(allB);
CHS.forEach(function(c){
  var b=document.createElement('div'); b.className='fbtn'; b.textContent='Ch.'+c.no+' ('+c.n+')'; b.title=c.ko;
  b.onclick=function(){ chSel=c.no; upFilters(); render(); }; b.dataset.ch=c.no; chf.appendChild(b);
});
function upFilters(){
  chf.querySelectorAll('.fbtn').forEach(function(b){ b.classList.toggle('on', (b.dataset.ch? +b.dataset.ch===chSel : chSel===null)); });
}
function onlyAgain(){ showAgainOnly=true; render(); }
function resetFilter(){ showAgainOnly=false; chSel=null; upFilters(); render(); }
function resetProgress(){ if(confirm('구술 진행도를 초기화할까요?')){ setSt({}); render(); } }

function render(){
  var st=getSt(), list=document.getElementById('olist'); list.innerHTML='';
  var pool = ORAL.filter(function(o){
    if(chSel && o.ch!==chSel) return false;
    if(showAgainOnly && st[o.id]!=='again') return false;
    return true;
  });
  pool.forEach(function(o){
    var d=document.createElement('div'); d.className='ocard'+(st[o.id]==='know'?' done':'');
    d.innerHTML='<span class="otag">CH.'+o.ch+' · '+o.chko+'</span>'
      +'<div class="oq">'+o.qk+'<span class="qe">'+o.qe+'</span></div>'
      +'<div class="oact">'
      +'<button class="obtn" onclick="tg(this)">답 보기 / 가리기</button>'
      +'<button class="obtn know'+(st[o.id]==='know'?' on':'')+'" onclick="gr(\''+o.id+'\',\'know\')">✅ 알았음</button>'
      +'<button class="obtn again'+(st[o.id]==='again'?' on':'')+'" onclick="gr(\''+o.id+'\',\'again\')">🔄 다시</button></div>'
      +'<div class="oans"><div class="lab">MODEL ANSWER · 모범답안</div>'+o.ak
      +'<span class="ae">'+o.ae+'</span><a href="'+o.file+'">→ Ch.'+o.ch+' 교재 보기</a></div>';
    list.appendChild(d);
  });
  if(!pool.length) list.innerHTML='<div style="padding:30px;text-align:center;color:var(--t3)">해당 조건의 카드가 없습니다.</div>';
  var done=0; ORAL.forEach(function(o){ if(st[o.id]==='know') done++; });
  document.getElementById('pDone').textContent=done;
  document.getElementById('pTotal').textContent=ORAL.length;
  var pct=Math.round(done/ORAL.length*100);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pPct').textContent=pct+'%';
}
function tg(btn){ btn.closest('.ocard').querySelector('.oans').classList.toggle('show'); }
function gr(id,v){ var st=getSt(); st[id]=(st[id]===v?null:v); setSt(st); render(); }

var pl=document.getElementById('plist');
PROJ.forEach(function(p){
  var d=document.createElement('div'); d.className='proj';
  d.innerHTML='<span class="pno">PROJECT '+p.no+'</span><h3>'+p.ko+'</h3><span class="en">'+p.en+'</span>'
    +'<div class="desc">'+p.desc+'</div>'
    +'<div class="meta"><span class="badge">'+p.ref+'</span>'
    +'<a class="badge link" href="'+p.file+'">📖 Ch.'+p.ch+' 연계 교재 →</a></div>';
  pl.appendChild(d);
});

function swTab(t){
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
  t.classList.add('on');
  document.getElementById('pane-oral').classList.toggle('hidden', t.dataset.t!=='oral');
  document.getElementById('pane-proj').classList.toggle('hidden', t.dataset.t!=='proj');
}
render();
</script>
