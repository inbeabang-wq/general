.pbar{flex:1;height:9px;background:var(--panel2);border-radius:6px;overflow:hidden;}

.obtn{font-size:12.5px;padding:7px 13px;background:var(--panel);border:1px solid var(--line);border-radius:8px;cursor:pointer;color:var(--t2);}
.obtn.know.on{border-color:var(--green);color:var(--green);background:rgba(52,211,153,.1);}
.obtn.again.on{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.1);}

.oans .ae{display:block;font-size:12.5px;color:var(--t3);font-style:italic;margin-top:5px;}
.oans a{font-size:12px;color:var(--cyan);display:inline-block;margin-top:8px;}
/* projects */
.proj{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:12px;}

.proj .desc{font-size:13.5px;color:var(--t2);margin-top:9px;}
.proj .meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:4px 10px;}
.badge.link{color:var(--cyan);border-color:rgba(96,165,250,.35);}
.pno{font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--gold);letter-spacing:2px;}

<script>
var ORAL = [{"id": "o_c1_1", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "General 자격은 어떤 자격의 기초인가?", "qe": "What ratings is the General certificate the basis for?", "ak": "Airframe(A)와 Powerplant(P) 두 자격의 공통 기초로, A·P 시험 전에 반드시 통과해야 합니다.", "ae": "It is the common foundation for both the Airframe and Powerplant ratings and must be passed before either."}, {"id": "o_c1_2", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "'더티더즌'이란 무엇인가?", "qe": "What is the 'Dirty Dozen'?", "ak": "정비 실수를 유발하는 12가지 인적요인 목록입니다(소통 부족·안일함·피로 등).", "ae": "A list of twelve human factors that lead to maintenance errors, such as lack of communication, complacency, and fatigue."}, {"id": "o_c1_3", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "정비사가 AD(감항성 개선명령)를 반드시 준수해야 하는가?", "qe": "Must a mechanic comply with an AD?", "ak": "네, 법적 강제 사항이며 반복 AD는 규정 주기마다 재수행하고 기록해야 합니다.", "ae": "Yes; compliance is legally mandatory, and recurring ADs must be repeated at the specified interval and recorded."}, {"id": "o_c1_4", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "피로(Fatigue)의 안전망 대책 예시는?", "qe": "Give a safety net for fatigue.", "ak": "충분한 휴식, 중요 작업 시 동료 점검(2인 확인), 무리한 연속근무 회피 등이 있습니다.", "ae": "Adequate rest, having a colleague double-check critical work, and avoiding excessive consecutive shifts."}, {"id": "o_c1_5", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "SHEL 모델의 중심에 두는 요소는?", "qe": "What is at the center of the SHEL model?", "ak": "사람(Liveware)입니다. 나머지 소프트웨어·하드웨어·환경 요소가 사람과 상호작용합니다.", "ae": "Liveware (the person); the software, hardware, and environment elements all interact with the person."}, {"id": "o_c1_6", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "정비 자료 중 'AMM'은 무엇인가?", "qe": "What is the 'AMM'?", "ak": "제작사 항공기 정비교범(Aircraft Maintenance Manual)으로, 승인·수용 가능한 정비 방법의 근거입니다.", "ae": "The manufacturer's Aircraft Maintenance Manual, a source of approved or acceptable maintenance methods."}, {"id": "o_c1_7", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "정비 안일함(Complacency)이 위험한 이유는?", "qe": "Why is complacency dangerous?", "ak": "익숙한 작업을 무의식적으로 처리해 결함을 놓치기 쉽기 때문입니다. 점검표 사용이 대책입니다.", "ae": "Familiar tasks are done on autopilot, so defects are easily missed; using checklists is the countermeasure."}, {"id": "o_c1_8", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "항공정비사에게 요구되는 현대적 기술 두 가지는?", "qe": "Name two modern skills required of an AMT.", "ak": "전기·터빈엔진 고장탐구와 복합재 수리 능력입니다.", "ae": "Electrical/turbine-engine troubleshooting and composite repair."}, {"id": "o_c1_9", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "감항성(Airworthiness)의 정의를 말하라.", "qe": "Define airworthiness.", "ak": "형식설계에 부합하고 안전한 운항 상태에 있는 것 — 두 조건을 모두 만족해야 합니다.", "ae": "Conformity to type design AND condition for safe operation — both required."}, {"id": "o_c1_10", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "스위스치즈 모델을 정비에 적용하면?", "qe": "Apply the Swiss cheese model to maintenance.", "ak": "점검표·2인 확인·기능점검이 각각 방어층이며, 한 층만 작동해도 사고를 막습니다.", "ae": "Checklists, independent inspection, and functional checks are defense layers; any one can stop the accident."}, {"id": "o_c1_11", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "관행(Norms)이 규정을 대체할 수 있는가?", "qe": "Can norms replace procedures?", "ak": "안 됩니다. 비공식 관행은 승인 절차를 절대 대체할 수 없습니다.", "ae": "No. Informal norms can never replace approved procedures."}, {"id": "o_c1_12", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "주의산만 후 작업 재개 요령은?", "qe": "How do you resume work after a distraction?", "ak": "중단 지점보다 몇 단계 앞으로 되돌아가 확인 후 계속합니다.", "ae": "Go back several steps before the interruption point, verify, then continue."}, {"id": "o_c2_1", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "분수의 덧셈에서 먼저 해야 할 일은?", "qe": "What must you do first to add fractions?", "ak": "공통분모(LCD)로 통분해야 합니다.", "ae": "Find a common denominator (LCD)."}, {"id": "o_c2_2", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "3/8을 소수로 바꾸면?", "qe": "Convert 3/8 to a decimal.", "ak": "3÷8 = 0.375 입니다.", "ae": "3 ÷ 8 = 0.375."}, {"id": "o_c2_3", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "비례식에서 미지수를 구하는 방법은?", "qe": "How do you solve a proportion for an unknown?", "ak": "교차곱(Cross-multiply) 후 나누어 구합니다.", "ae": "Cross-multiply, then divide."}, {"id": "o_c2_4", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "원의 넓이 공식은?", "qe": "What is the area of a circle?", "ak": "π×r²(파이 곱하기 반지름의 제곱)입니다.", "ae": "π × r² (pi times radius squared)."}, {"id": "o_c2_5", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "옴의 법칙 E=IR에서 R을 구하면?", "qe": "From E=IR, solve for R.", "ak": "R = E ÷ I 입니다.", "ae": "R = E ÷ I."}, {"id": "o_c2_6", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "엔진 배기량(Displacement)은 어떻게 구하는가?", "qe": "How is engine displacement found?", "ak": "실린더 부피 × 실린더 수로 구합니다.", "ae": "Cylinder volume × number of cylinders."}, {"id": "o_c2_7", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "2진수 1011은 10진수로 얼마인가?", "qe": "What is binary 1011 in decimal?", "ak": "8+0+2+1 = 11 입니다.", "ae": "8+0+2+1 = 11."}, {"id": "o_c2_8", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "과학적 표기 4×10⁻⁴는 얼마인가?", "qe": "What is 4×10⁻⁴ as a decimal?", "ak": "0.0004 입니다.", "ae": "0.0004."}, {"id": "o_c2_9", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "엔진 배기량 계산식을 말하라.", "qe": "State the engine displacement formula.", "ak": "π×(내경/2)²×행정×실린더 수입니다.", "ae": "π × (bore/2)² × stroke × number of cylinders."}, {"id": "o_c2_10", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "피타고라스 정리는 언제 쓰는가?", "qe": "When is the Pythagorean theorem used?", "ak": "직각삼각형에서 빗변·대각선 길이를 구할 때 씁니다(a²+b²=c²).", "ae": "To find the hypotenuse/diagonal in right triangles (a²+b²=c²)."}, {"id": "o_c2_11", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "단위 환산의 검증 방법은?", "qe": "How do you verify unit conversions?", "ak": "단위 소거(Dimensional Analysis)로 원하지 않는 단위가 약분되는지 확인합니다.", "ae": "Dimensional analysis — unwanted units must cancel."}, {"id": "o_c2_12", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "음수 곱하기 음수의 부호는?", "qe": "What is the sign of a negative times a negative?", "ak": "양수(+)입니다.", "ae": "Positive."}, {"id": "o_c3_1", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "파스칼의 원리를 설명하라.", "qe": "State Pascal's law.", "ak": "밀폐된 유체에 가한 압력은 모든 방향으로 동일하게 전달됩니다.", "ae": "Pressure applied to a confined fluid is transmitted equally in all directions."}, {"id": "o_c3_2", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "베르누이 정리와 양력의 관계는?", "qe": "How does Bernoulli's principle relate to lift?", "ak": "익형 윗면의 빠른 흐름이 정압을 낮춰 양력에 기여합니다.", "ae": "Faster flow over the upper surface lowers static pressure, contributing to lift."}, {"id": "o_c3_3", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "압력의 정의는?", "qe": "Define pressure.", "ak": "단위 면적당 작용하는 힘(P=F/A)입니다.", "ae": "Force per unit area (P = F/A)."}, {"id": "o_c3_4", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "1 마력은 몇 ft·lb/min인가?", "qe": "How many ft·lb/min is one horsepower?", "ak": "33,000 ft·lb/min(=550 ft·lb/s)입니다.", "ae": "33,000 ft·lb/min (= 550 ft·lb/s)."}, {"id": "o_c3_5", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "게이지압과 절대압의 차이는?", "qe": "Difference between gauge and absolute pressure?", "ak": "게이지압은 대기압을 0으로, 절대압은 완전진공을 0으로 봅니다.", "ae": "Gauge is referenced to atmospheric (zero); absolute is referenced to a vacuum."}, {"id": "o_c3_6", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "보일의 법칙은?", "qe": "State Boyle's law.", "ak": "온도가 일정하면 기체의 압력과 부피의 곱은 일정합니다.", "ae": "At constant temperature, the product of a gas's pressure and volume is constant."}, {"id": "o_c3_7", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "열 전달 3가지 방식은?", "qe": "Name the three modes of heat transfer.", "ak": "전도·대류·복사입니다.", "ae": "Conduction, convection, and radiation."}, {"id": "o_c3_8", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "작용-반작용 법칙의 항공 예는?", "qe": "Give an aviation example of action–reaction.", "ak": "제트엔진의 배기(작용)에 대한 추력(반작용)입니다.", "ae": "Jet exhaust (action) produces forward thrust (reaction)."}, {"id": "o_c3_9", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "구조물에 작용하는 5가지 응력을 말하라.", "qe": "Name the five stresses on aircraft structures.", "ak": "인장·압축·전단·비틀림·굽힘입니다.", "ae": "Tension, compression, shear, torsion, bending."}, {"id": "o_c3_10", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "힘·면적·압력의 관계식은?", "qe": "State the force–area–pressure relationship.", "ak": "F = P × A (힘 = 압력 × 면적)입니다.", "ae": "F = P × A."}, {"id": "o_c3_11", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "샤를의 법칙을 말하라.", "qe": "State Charles's law.", "ak": "압력이 일정하면 기체 부피는 절대온도에 비례합니다.", "ae": "At constant pressure, gas volume is proportional to absolute temperature."}, {"id": "o_c3_12", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "벤투리 목에서 정압이 낮아지는 이유는?", "qe": "Why does static pressure drop in a venturi throat?", "ak": "유속이 빨라지기 때문입니다(베르누이 정리).", "ae": "Velocity increases there (Bernoulli's principle)."}, {"id": "o_c4_1", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "옴의 법칙을 쓰라.", "qe": "State Ohm's law.", "ak": "E = I × R (전압=전류×저항)입니다.", "ae": "E = I × R (voltage = current × resistance)."}, {"id": "o_c4_2", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전력 공식은?", "qe": "What is the power formula?", "ak": "P = E × I (와트), 또는 P=I²R, P=E²/R입니다.", "ae": "P = E × I (watts), or P = I²R, P = E²/R."}, {"id": "o_c4_3", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "직렬회로에서 전류와 전압의 특징은?", "qe": "In a series circuit, how do current and voltage behave?", "ak": "전류는 어디서나 같고, 전압은 각 저항에 나뉩니다.", "ae": "Current is the same throughout; voltage divides across the resistors."}, {"id": "o_c4_4", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "병렬회로에서 전압의 특징은?", "qe": "In a parallel circuit, how does voltage behave?", "ak": "모든 가지에 걸리는 전압이 같습니다.", "ae": "Voltage is the same across all branches."}, {"id": "o_c4_5", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "납산 배터리 충전상태 확인 방법은?", "qe": "How do you check a lead-acid battery's state of charge?", "ak": "전해액 비중(Specific Gravity)을 비중계로 측정합니다.", "ae": "Measure electrolyte specific gravity with a hydrometer."}, {"id": "o_c4_6", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "Ni-Cd 배터리의 주요 위험은?", "qe": "What is the main hazard of a Ni-Cd battery?", "ak": "열폭주(Thermal Runaway)입니다. 온도 감시가 필요합니다.", "ae": "Thermal runaway; temperature monitoring is required."}, {"id": "o_c4_7", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "회로차단기 정격은 무엇을 보호하도록 정하는가?", "qe": "A circuit breaker rating is chosen to protect what?", "ak": "부하가 아니라 배선(전선)을 보호하도록 정합니다.", "ae": "The wiring, not the load."}, {"id": "o_c4_8", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전자기 유도의 원리는?", "qe": "What is the principle of electromagnetic induction?", "ak": "도체가 자기장을 가로지를 때 전압이 유도됩니다.", "ae": "Voltage is induced when a conductor moves through a magnetic field."}, {"id": "o_c4_9", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "같은 값 저항 2개를 병렬 연결하면 합성저항은?", "qe": "Two equal resistors in parallel give what total?", "ak": "한 개 값의 절반입니다.", "ae": "Half the value of one."}, {"id": "o_c4_10", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "정류기와 인버터의 차이는?", "qe": "Difference between a rectifier and an inverter?", "ak": "정류기는 AC→DC, 인버터는 DC→AC 변환입니다.", "ae": "Rectifier: AC to DC; inverter: DC to AC."}, {"id": "o_c4_11", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "변압기가 직류에서 작동하지 않는 이유는?", "qe": "Why won't a transformer work on DC?", "ak": "유도에는 변화하는 자속이 필요한데 직류는 자속이 일정하기 때문입니다.", "ae": "Induction needs changing flux; DC flux is constant."}, {"id": "o_c4_12", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "배터리 셀당 전압으로 24V 계통을 만들려면 몇 셀?", "qe": "How many 2 V cells make a 24 V battery?", "ak": "12셀입니다.", "ae": "Twelve cells."}, {"id": "o_c5_1", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "상세도·조립도·설치도의 차이는?", "qe": "Difference between detail, assembly, and installation drawings?", "ak": "상세도는 단일 부품, 조립도는 결합된 부품들, 설치도는 항공기 장착 위치를 보여줍니다.", "ae": "Detail shows one part, assembly shows parts joined, installation shows the mounting location on the aircraft."}, {"id": "o_c5_2", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "제목란(Title Block)에서 가장 중요한 식별 정보는?", "qe": "What is the key identifying item in a title block?", "ak": "도면 번호(Drawing Number)입니다.", "ae": "The drawing number."}, {"id": "o_c5_3", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "자재표(BOM)란?", "qe": "What is a bill of materials?", "ak": "필요한 부품·수량·규격을 나열한 목록입니다.", "ae": "A list of required parts, quantities, and specifications."}, {"id": "o_c5_4", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "숨은선(Hidden Line)은 어떻게 표시하는가?", "qe": "How is a hidden line drawn?", "ak": "파선(짧은 점선)으로 표시합니다.", "ae": "As a dashed line."}, {"id": "o_c5_5", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "고장탐구에 유용한 도면은?", "qe": "Which diagram is most useful for troubleshooting?", "ak": "회로도(Schematic)입니다. 기능·연결을 기호로 보여줍니다.", "ae": "The schematic; it shows function and connections symbolically."}, {"id": "o_c5_6", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "치수 1.000±0.005의 허용 범위는?", "qe": "What is the allowable range of 1.000 ±0.005?", "ak": "0.995 ~ 1.005 입니다.", "ae": "0.995 to 1.005."}, {"id": "o_c5_7", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "개정란(Revision Block)의 목적은?", "qe": "Purpose of the revision block?", "ak": "도면의 변경 이력을 기록·관리하는 것입니다.", "ae": "To record and manage the drawing's change history."}, {"id": "o_c5_8", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "억지끼워맞춤(Interference Fit)이란?", "qe": "What is an interference fit?", "ak": "축이 구멍보다 커서 압입해야 하는 끼워맞춤입니다.", "ae": "A fit where the shaft is larger than the hole and must be pressed in."}, {"id": "o_c5_9", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "제3각법에서 세 뷰의 배치를 말하라.", "qe": "Describe view placement in third-angle projection.", "ak": "정면도 기준으로 평면도는 위, 우측면도는 오른쪽에 배치합니다.", "ae": "Top view above the front view; right side view to its right."}, {"id": "o_c5_10", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "스케치가 허용되는 경우는?", "qe": "When is a sketch acceptable?", "ak": "수리 기록·간단한 제작 지시 등 공식 도면이 없을 때 승인 자료와 함께 사용합니다.", "ae": "For repair records/simple fabrication when no formal drawing exists, with approved data."}, {"id": "o_c5_11", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "해칭(Section Lining)의 의미는?", "qe": "What does section lining (hatching) indicate?", "ak": "단면도에서 잘린 면을 나타냅니다.", "ae": "The surface cut by the section plane."}, {"id": "o_c5_12", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "IPC와 AMM의 용도 차이는?", "qe": "How do the IPC and AMM differ?", "ak": "IPC는 부품 식별·주문용, AMM은 정비 절차용입니다.", "ae": "IPC identifies/orders parts; AMM gives maintenance procedures."}, {"id": "o_c6_1", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "기준선(Datum)이란?", "qe": "What is the datum?", "ak": "모든 아암(거리) 측정의 기준이 되는 가상의 수직면입니다.", "ae": "An imaginary vertical plane from which all arms are measured."}, {"id": "o_c6_2", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "모멘트(Moment)는 어떻게 구하는가?", "qe": "How is moment calculated?", "ak": "무게 × 아암 입니다.", "ae": "Weight × arm."}, {"id": "o_c6_3", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "CG를 구하는 공식은?", "qe": "What is the formula for CG?", "ak": "총모멘트 ÷ 총무게 입니다.", "ae": "Total moment ÷ total weight."}, {"id": "o_c6_4", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "자중(Empty Weight)에 포함되는 연료는?", "qe": "What fuel is included in empty weight?", "ak": "불사용 연료(Unusable Fuel)만 포함됩니다.", "ae": "Only unusable fuel."}, {"id": "o_c6_5", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "유용하중(Useful Load)은 어떻게 구하는가?", "qe": "How is useful load found?", "ak": "최대이륙중량에서 자중을 뺀 값입니다.", "ae": "Maximum takeoff weight minus empty weight."}, {"id": "o_c6_6", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "무게측정 시 Tare는 어떻게 처리하는가?", "qe": "How is tare handled during weighing?", "ak": "저울 위 받침·용기 무게이므로 측정값에서 빼야 합니다.", "ae": "It is the weight of chocks/blocks and must be subtracted."}, {"id": "o_c6_7", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "CG가 후방 한계를 넘으면 어떤 위험이 있는가?", "qe": "What is the risk of an aft CG beyond limits?", "ak": "종안정성이 나빠져 실속 회복이 위험해집니다.", "ae": "Longitudinal stability degrades, making stall recovery hazardous."}, {"id": "o_c6_8", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "장비 개조 후 정비사가 해야 할 일은?", "qe": "After an equipment alteration, what must the mechanic do?", "ak": "무게·평형 기록을 갱신하고 필요 시 재측정합니다.", "ae": "Update the weight-and-balance record and reweigh if needed."}, {"id": "o_c6_9", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "Avgas·Jet A·오일의 표준 무게를 말하라.", "qe": "State standard weights for avgas, Jet A, and oil.", "ak": "Avgas 6.0, Jet A 약 6.7, 윤활유 7.5 lb/gal입니다.", "ae": "Avgas 6.0, Jet A ~6.7, lubricating oil 7.5 lb/gal."}, {"id": "o_c6_10", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "기준선 앞 품목의 모멘트 부호는?", "qe": "What sign is the moment of an item forward of the datum?", "ak": "음(−)의 모멘트입니다.", "ae": "Negative."}, {"id": "o_c6_11", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "%MAC 계산식을 말하라.", "qe": "State the %MAC formula.", "ak": "(CG−LEMAC)÷MAC×100 입니다.", "ae": "(CG − LEMAC) ÷ MAC × 100."}, {"id": "o_c6_12", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "수평 확인 수단은 어디에 명시되는가?", "qe": "Where is the leveling means specified?", "ak": "형식증명자료집(TCDS)입니다.", "ae": "In the TCDS."}, {"id": "o_c7_1", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "2024-T3에서 'T3'는 무엇을 뜻하는가?", "qe": "In 2024-T3, what does 'T3' mean?", "ak": "열처리·가공 상태를 나타내는 템퍼(Temper) 표시입니다.", "ae": "It is the temper designation for heat-treatment/work condition."}, {"id": "o_c7_2", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "Alclad(클래딩)의 목적은?", "qe": "What is the purpose of Alclad?", "ak": "합금 표면에 순알루미늄을 입혀 부식을 방지합니다.", "ae": "Pure aluminum on an alloy surface resists corrosion."}, {"id": "o_c7_3", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "볼트 길이 선정 기준은?", "qe": "How is bolt length selected?", "ak": "너트 밖으로 나사산 1~3개가 보이고, 그립이 전단면을 지나지 않아야 합니다.", "ae": "1–3 threads show past the nut and the grip stays out of the shear plane."}, {"id": "o_c7_4", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "고온·배기부에 쓰는 너트는?", "qe": "Which nut is used near heat/exhaust?", "ak": "섬유 인서트가 아닌 전금속(All-metal) 자동잠금너트입니다.", "ae": "All-metal self-locking nuts (not fiber-insert)."}, {"id": "o_c7_5", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "안전결선은 어떤 방향으로 감는가?", "qe": "Which direction is safety wire installed?", "ak": "부품을 조이는 방향(풀림 방지)으로 감습니다.", "ae": "In the tightening (anti-loosening) direction."}, {"id": "o_c7_6", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "표면 균열 검출에 쓰는 NDI는?", "qe": "Which NDI finds surface cracks?", "ak": "침투탐상(Dye Penetrant), 강자성체는 자분탐상도 가능합니다.", "ae": "Dye penetrant; magnetic particle for ferromagnetic parts."}, {"id": "o_c7_7", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "강자성체가 아닌 알루미늄에 자분탐상을 쓸 수 있는가?", "qe": "Can magnetic particle be used on aluminum?", "ak": "안 됩니다. 자분탐상은 강자성체에만 적용됩니다.", "ae": "No; magnetic particle applies only to ferromagnetic materials."}, {"id": "o_c7_8", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "이종금속 접촉 시 부식 대책은?", "qe": "How do you prevent corrosion at dissimilar-metal contact?", "ak": "절연·표면처리(프라이머·실런트)로 전기화학적 접촉을 차단합니다.", "ae": "Insulate/treat the surfaces (primer/sealant) to break the galvanic contact."}, {"id": "o_c7_9", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "AN 볼트 번호와 지름의 관계는?", "qe": "How does an AN bolt number relate to diameter?", "ak": "번호가 지름의 1/16인치 값입니다 (AN4=4/16=1/4\").", "ae": "The number is the diameter in sixteenths (AN4 = 1/4 inch)."}, {"id": "o_c7_10", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "자동잠금너트 재사용 판정법은?", "qe": "How do you judge a self-locking nut for reuse?", "ak": "손으로 완전히 돌아가면 잠금 토크 상실로 폐기합니다.", "ae": "If it runs down by hand, locking torque is gone — discard."}, {"id": "o_c7_11", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "7×19 케이블의 특징은?", "qe": "What characterizes 7×19 cable?", "ak": "가장 유연해 풀리를 지나는 주 조종 케이블에 씁니다.", "ae": "Most flexible; used for primary controls over pulleys."}, {"id": "o_c7_12", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "규정 없는 나사 윤활이 위험한 이유는?", "qe": "Why is unauthorized thread lubrication dangerous?", "ak": "마찰이 줄어 같은 토크값에서 과체결(과인장)이 됩니다.", "ae": "Reduced friction causes overtension at the same torque."}, {"id": "o_c8_1", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "부식이 성립하는 데 필요한 네 요소는?", "qe": "What four elements are needed for corrosion?", "ak": "양극·음극·전해질·전기 경로입니다.", "ae": "An anode, a cathode, an electrolyte, and an electrical path."}, {"id": "o_c8_2", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "결정 경계를 따라 진행되는 부식은?", "qe": "Which corrosion follows grain boundaries?", "ak": "입계부식(Intergranular)이며 심하면 박리(Exfoliation)로 이어집니다.", "ae": "Intergranular corrosion, which can lead to exfoliation."}, {"id": "o_c8_3", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "알루미늄 부식생성물의 색은?", "qe": "What color are aluminum corrosion products?", "ak": "흰색 가루 형태입니다.", "ae": "A white powder."}, {"id": "o_c8_4", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "알루미늄에 강철 브러시를 쓰면 안 되는 이유는?", "qe": "Why not use a steel brush on aluminum?", "ak": "이종금속 오염으로 갈바닉 부식을 유발하기 때문입니다.", "ae": "It causes dissimilar-metal (galvanic) contamination and corrosion."}, {"id": "o_c8_5", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "부식 제거 후 표면처리로 무엇을 하는가?", "qe": "What surface treatment follows corrosion removal?", "ak": "전환코팅(알로다인/크로메이트) 후 프라이머·도장으로 마감합니다.", "ae": "A conversion coating (Alodine/chromate), then primer and paint."}, {"id": "o_c8_6", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "부식 취약 부위 세 곳을 들라.", "qe": "Name three corrosion-prone areas.", "ak": "배터리실, 랜딩기어 웰, 배수가 안 되는 저부(Bilge) 등입니다.", "ae": "Battery compartment, wheel wells, and poorly drained bilge areas."}, {"id": "o_c8_7", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "연료탱크에서 생기는 부식 종류는?", "qe": "What corrosion type occurs in fuel tanks?", "ak": "미생물(Microbial) 부식입니다.", "ae": "Microbial corrosion."}, {"id": "o_c8_8", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "세척제 선정의 기본 원칙은?", "qe": "What is the basic rule for choosing cleaners?", "ak": "재료·표면처리와 호환되는 승인 제품만 사용하는 것입니다.", "ae": "Use only approved cleaners compatible with the material and finish."}, {"id": "o_c8_9", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "필리폼 부식의 특징과 발생 위치는?", "qe": "Describe filiform corrosion and where it occurs.", "ak": "페인트 도막 아래 실처럼 퍼지는 부식으로, 도막 손상부에서 시작합니다.", "ae": "Thread-like corrosion under paint films, starting at coating breaks."}, {"id": "o_c8_10", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "응력부식균열의 3요소는?", "qe": "What three factors cause stress corrosion cracking?", "ak": "감수성 재료, 지속 인장응력, 부식 환경입니다.", "ae": "Susceptible material, sustained tensile stress, corrosive environment."}, {"id": "o_c8_11", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "부식 제거 한계 판정 근거는?", "qe": "What governs corrosion removal limits?", "ak": "제작사 SRM 등 승인 자료의 허용 한계입니다.", "ae": "Approved data such as the manufacturer's SRM."}, {"id": "o_c8_12", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "CPC란 무엇인가?", "qe": "What is a CPC?", "ak": "부식 예방 화합물 — 침투·발수 피막으로 습기를 차단합니다.", "ae": "Corrosion preventive compound — penetrates and displaces moisture."}, {"id": "o_c9_1", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "강체 튜브와 호스는 각각 어디에 쓰는가?", "qe": "Where are rigid tube vs. flexible hose used?", "ak": "튜브는 상대운동이 없는 곳, 호스는 진동·상대운동·엔진 연결부에 씁니다.", "ae": "Tube where there's no relative motion; hose at vibration/relative-motion and engine connections."}, {"id": "o_c9_2", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "튜브 크기와 호스 크기는 각각 무엇으로 표기하는가?", "qe": "How are tube and hose sizes specified?", "ak": "튜브는 외경(OD), 호스는 내경(ID) 대시 번호로 표기합니다.", "ae": "Tube by outside diameter; hose by inside-diameter dash number."}, {"id": "o_c9_3", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "항공용 표준 플레어 각도는?", "qe": "What is the standard aviation flare angle?", "ak": "37°(AN)입니다. 자동차용 45°와 다릅니다.", "ae": "37° (AN), unlike the automotive 45°."}, {"id": "o_c9_4", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "호스의 '레이라인'은 무엇을 알려주는가?", "qe": "What does a hose 'lay line' tell you?", "ak": "설치 시 호스가 비틀렸는지(Torque)를 알려줍니다.", "ae": "Whether the hose is twisted during installation."}, {"id": "o_c9_5", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "산소 라인 취급 시 절대 금지 사항은?", "qe": "What is forbidden when handling oxygen lines?", "ak": "유분(오일·그리스) 오염입니다. 발화 위험이 있습니다.", "ae": "Oil/grease contamination — it is a fire hazard."}, {"id": "o_c9_6", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "플레어리스 피팅의 밀봉 원리는?", "qe": "How does a flareless fitting seal?", "ak": "슬리브가 튜브 표면에 파고들어 밀봉합니다.", "ae": "A sleeve bites into the tube surface to seal."}, {"id": "o_c9_7", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "호스 설치 시 길이 여유를 주는 이유는?", "qe": "Why leave slack when installing a hose?", "ak": "압력·온도에 따른 수축·팽창을 흡수하기 위해서입니다.", "ae": "To absorb expansion/contraction from pressure and temperature."}, {"id": "o_c9_8", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "손상된 강체 튜브의 원칙적 처리는?", "qe": "What is the general rule for a damaged rigid tube?", "ak": "수리보다 교환이 원칙입니다.", "ae": "Replacement rather than repair."}, {"id": "o_c9_9", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "튜브 굽힘 검사 항목을 말하라.", "qe": "What do you inspect on a tube bend?", "ak": "균열·주름·과도한 편평(지름의 25% 이내) 여부입니다.", "ae": "Cracks, wrinkles, flattening within 25 percent of diameter."}, {"id": "o_c9_10", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "호스 교환 시기를 판단하는 표시는?", "qe": "What marking governs hose replacement time?", "ak": "제조일자(큐어 데이트)와 계통 규정 수명입니다.", "ae": "The cure date and the system's service life."}, {"id": "o_c9_11", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "고압 라인 분리 전 안전 조치는?", "qe": "Safety step before opening a high-pressure line?", "ak": "계통 잔압을 완전히 제거합니다.", "ae": "Relieve all trapped system pressure."}, {"id": "o_c9_12", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "배관과 전기배선의 상하 배치 원칙은?", "qe": "How are fluid lines routed relative to wiring?", "ak": "누설이 배선에 떨어지지 않도록 배관을 배선 아래로 배치합니다.", "ae": "Fluid lines below wiring so leaks cannot drip onto wires."}, {"id": "o_c10_1", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "제트엔진 지상 운용의 두 위험 구역은?", "qe": "What are the two hazard zones around a running jet?", "ak": "전방 흡입구(Intake)와 후방 배기(Exhaust)입니다.", "ae": "The intake in front and the exhaust behind."}, {"id": "o_c10_2", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "견인 시 조종석에 반드시 있어야 할 사람은?", "qe": "Who must be in the cockpit during towing?", "ak": "브레이크를 조작할 수 있는 담당자입니다.", "ae": "A person able to operate the brakes."}, {"id": "o_c10_3", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "노즈기어 조향 한계를 넘기면 어떻게 되는가?", "qe": "What happens if nose-gear steering limits are exceeded?", "ak": "조향 기구·구조가 손상됩니다.", "ae": "The steering mechanism/structure is damaged."}, {"id": "o_c10_4", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "잭업은 어디에서만 해야 하는가?", "qe": "Where may jacking be performed?", "ak": "지정된 잭 포인트에서만, 안전잠금을 사용해 합니다.", "ae": "Only at designated jack points, using safety locks."}, {"id": "o_c10_5", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "급유 시 정전기 방지를 위해 무엇을 하는가?", "qe": "How is static prevented during fueling?", "ak": "항공기·급유차를 본딩·접지(Grounding)합니다.", "ae": "Bond and ground the aircraft and fuel truck."}, {"id": "o_c10_6", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "유류·전기 화재에 물을 쓰면 안 되는 이유는?", "qe": "Why not use water on fuel/electrical fires?", "ak": "유류는 확산되고 전기는 감전 위험이 있어 부적합합니다.", "ae": "Water spreads fuel fires and risks shock on electrical fires."}, {"id": "o_c10_7", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "전기 화재에 적합한 소화기는?", "qe": "Which extinguisher suits an electrical fire?", "ak": "CO₂ 또는 할론/대체가스 소화기입니다.", "ae": "CO₂ or Halon/replacement extinguishers."}, {"id": "o_c10_8", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "강풍 예보 시 항공기 계류 요령은?", "qe": "How do you tie down for forecast high winds?", "ak": "굄목·계류로 고정하고 기수를 바람 방향으로 둡니다.", "ae": "Chock and tie down, and point the nose into the wind."}, {"id": "o_c10_9", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "화재 삼각형과 소화 원리를 설명하라.", "qe": "Explain the fire triangle and extinguishing.", "ak": "연료·산소·열 중 하나를 제거하면 소화됩니다.", "ae": "Remove any one of fuel, oxygen, or heat."}, {"id": "o_c10_10", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "Class D 화재의 소화제는?", "qe": "What extinguishes a Class D fire?", "ak": "금속화재 전용 건식 분말입니다. 물·CO₂는 부적합합니다.", "ae": "Special dry powder for metals; not water or CO₂."}, {"id": "o_c10_11", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "핫스타트란 무엇이며 조치는?", "qe": "What is a hot start and the action required?", "ak": "시동 중 EGT가 한계로 급상승하는 것 — 즉시 시동 중단합니다.", "ae": "EGT rising toward limits during start — abort immediately."}, {"id": "o_c10_12", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "핸드프로핑의 기본 안전수칙은?", "qe": "Basic safety rule for hand propping?", "ak": "프로펠러를 항상 점화 ON 상태로 간주하고, 유자격자 조종석 배치 후 실시합니다.", "ae": "Treat the prop as live; qualified person at the controls."}, {"id": "o_c11_1", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "정비·개조의 기준이 되는 규정 Part는?", "qe": "Which Part governs maintenance and alteration?", "ak": "14 CFR Part 43입니다.", "ae": "14 CFR Part 43."}, {"id": "o_c11_2", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "정비사 자격을 규정하는 Part는?", "qe": "Which Part governs mechanic certification?", "ak": "14 CFR Part 65입니다.", "ae": "14 CFR Part 65."}, {"id": "o_c11_3", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "AD와 SB의 강제성 차이는?", "qe": "How do AD and SB differ in force?", "ak": "AD는 법적 강제(Part 39), SB는 제작사 권고로 AD로 채택되지 않는 한 강제가 아닙니다.", "ae": "AD is legally mandatory (Part 39); SB is a recommendation unless adopted by an AD."}, {"id": "o_c11_4", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "대수리·대개조에 필요한 자료의 등급은?", "qe": "What data class is required for major repair/alteration?", "ak": "승인(Approved) 자료입니다.", "ae": "Approved data."}, {"id": "o_c11_5", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "AC 43.13-1B는 어떤 자료인가?", "qe": "What kind of data is AC 43.13-1B?", "ak": "수용 가능한(Acceptable) 방법·기술·관행이며, 그 자체로 승인 자료는 아닙니다.", "ae": "Acceptable methods/techniques/practices — not approved data by itself."}, {"id": "o_c11_6", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "형식설계 부합 여부의 판단 기준 서류는?", "qe": "Which document is the basis for type-design conformity?", "ak": "형식증명자료집(TCDS)입니다.", "ae": "The Type Certificate Data Sheet (TCDS)."}, {"id": "o_c11_7", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "STC는 무엇을 승인하는가?", "qe": "What does an STC approve?", "ak": "기존 형식설계에 대한 변경(개조)을 승인합니다.", "ae": "A change (alteration) to an existing type design."}, {"id": "o_c11_8", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "의심 부품(SUP)을 발견하면?", "qe": "What do you do with a suspected unapproved part?", "ak": "사용하지 않고 격리·보고합니다.", "ae": "Do not use it; quarantine and report it."}, {"id": "o_c11_9", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "Part 145와 Part 147의 차이는?", "qe": "Distinguish Part 145 from Part 147.", "ak": "145는 인가정비조직(수리시설), 147은 정비사 양성학교 규정입니다.", "ae": "145 governs repair stations; 147 governs AMT schools."}, {"id": "o_c11_10", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "100시간 검사 초과 운항 규정을 설명하라.", "qe": "Explain the 100-hour overflight rule.", "ak": "검사 장소 이동 목적으로 최대 10시간 초과 가능하며 초과분은 다음 주기에서 차감됩니다.", "ae": "Up to 10 hours to reach the facility; excess is deducted from the next interval."}, {"id": "o_c11_11", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "TSO 승인과 장착 승인은 같은가?", "qe": "Is TSO approval the same as installation approval?", "ak": "다릅니다. TSO는 부품 성능 표준 충족일 뿐, 장착은 별도 승인 필요합니다.", "ae": "No — TSO covers the article; installation needs separate approval."}, {"id": "o_c11_12", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "감항증명서의 유효 조건은?", "qe": "When does an airworthiness certificate remain valid?", "ak": "항공기가 규정에 따라 정비·검사되어 감항성이 유지될 때입니다.", "ae": "While the aircraft is maintained and inspected per regulations."}, {"id": "o_c12_1", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "A&P 정비사가 단독으로 승인할 수 없는 것은?", "qe": "What can an A&P NOT approve alone?", "ak": "대수리·대개조의 최종 승인과 연차검사입니다(IA 필요).", "ae": "Final approval of major repairs/alterations and annual inspections (IA required)."}, {"id": "o_c12_2", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "무자격자가 정비할 수 있는 조건은?", "qe": "Under what condition may an unrated person do maintenance?", "ak": "자격 정비사의 직접 감독 하에서만 가능합니다.", "ae": "Only under the direct supervision of a certificated mechanic."}, {"id": "o_c12_3", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사 권한 행사의 최근 경험 요건은?", "qe": "What is the recency requirement to exercise privileges?", "ak": "최근 24개월 중 6개월 이상 관련 업무 수행(또는 재검)입니다.", "ae": "At least 6 months of practice within the last 24 months (or retesting)."}, {"id": "o_c12_4", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "사용가능 복귀(RTS) 서명이 증명하는 것은?", "qe": "What does an RTS sign-off certify?", "ak": "작업이 승인 자료·규정에 따라 수행되어 감항성이 있음을 증명합니다.", "ae": "That the work meets approved data/regs and the item is airworthy."}, {"id": "o_c12_5", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "RTS 서명에 포함되어야 할 정보는?", "qe": "What must an RTS signature include?", "ak": "정비사 이름, 자격번호, 날짜입니다.", "ae": "Name, certificate number, and date."}, {"id": "o_c12_6", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "연차검사를 승인할 수 있는 자격은?", "qe": "Who may approve an annual inspection?", "ak": "검사 권한(IA)을 가진 정비사 또는 FAA입니다.", "ae": "A mechanic with an Inspection Authorization (IA), or the FAA."}, {"id": "o_c12_7", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "능력 밖 작업을 맡았을 때 올바른 태도는?", "qe": "What if a task is beyond your competence?", "ak": "적절한 감독을 받거나 자격자에게 맡깁니다(더티더즌: 자기주장).", "ae": "Get proper supervision or refer it to a qualified person."}, {"id": "o_c12_8", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비 후 결함이 남았다면?", "qe": "If a defect remains after maintenance?", "ak": "복귀 승인을 하지 않고 미해결 결함을 기록·통보합니다.", "ae": "Do not return to service; record and report the discrepancy."}, {"id": "o_c12_9", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사 자격의 3대 기본 요건은?", "qe": "Three basic eligibility requirements for the certificate?", "ak": "18세 이상, 영어 능력, 경력/교육 요건 충족 후 시험 합격입니다.", "ae": "Age 18, English proficiency, experience/education plus passing the tests."}, {"id": "o_c12_10", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "주소 변경 통보 기한은?", "qe": "Deadline to report an address change?", "ak": "30일 이내 FAA에 서면 통보합니다.", "ae": "Within 30 days to the FAA."}, {"id": "o_c12_11", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "A&P와 IA의 검사 권한 차이는?", "qe": "Contrast A&P and IA inspection privileges.", "ak": "A&P는 100시간 검사 가능, 연차검사와 대수리·대개조 승인은 IA 필요입니다.", "ae": "A&P may do 100-hour; annuals and major repair/alteration approval need an IA."}, {"id": "o_c12_12", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "수리사(Repairman) 자격의 특징은?", "qe": "What characterizes a repairman certificate?", "ak": "특정 인가조직의 지정 업무에만 유효하며 조직을 떠나면 효력이 없습니다.", "ae": "Valid only for designated tasks at the issuing organization."}, {"id": "o_c13_1", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "정비 기록에 반드시 포함되어야 하는 4가지는?", "qe": "What four items must a maintenance record include?", "ak": "작업 설명, 완료일, 정비사 서명·자격번호, 사용가능 복귀 여부입니다.", "ae": "Work description, completion date, mechanic's signature/certificate number, and RTS status."}, {"id": "o_c13_2", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "Form 337은 언제 작성하는가?", "qe": "When is FAA Form 337 used?", "ak": "대수리 또는 대개조를 문서화할 때입니다.", "ae": "To document a major repair or major alteration."}, {"id": "o_c13_3", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "소개조는 Form 337이 필요한가?", "qe": "Does a minor alteration need a 337?", "ak": "아니요. 통상 항공일지 기재로 충분합니다.", "ae": "No; a logbook entry usually suffices."}, {"id": "o_c13_4", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "AD 준수 기록에 필요한 정보는?", "qe": "What must an AD compliance record show?", "ak": "AD 번호·개정, 준수 방법, 준수일/시간, 반복 여부와 차기 기한입니다.", "ae": "AD number/revision, method, date/time, and recurrence with next due."}, {"id": "o_c13_5", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "영구 기록(Permanent Record)의 예는?", "qe": "Give examples of permanent records.", "ak": "총시간, AD, 수명한계 부품, 대개조 기록 등입니다.", "ae": "Total time, ADs, life-limited parts, and major alterations."}, {"id": "o_c13_6", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "일반 정비 기록의 최소 보존 기간은?", "qe": "Minimum retention for routine records?", "ak": "다음 작업으로 대체되거나 최소 1년입니다.", "ae": "Until superseded or at least one year."}, {"id": "o_c13_7", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "항공일지 오기 정정 방법은?", "qe": "How do you correct a logbook error?", "ak": "원문이 보이도록 한 줄 긋고 정정 후 서명합니다.", "ae": "Draw a single line (keeping it legible), re-enter, and sign."}, {"id": "o_c13_8", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "허위 기재의 결과는?", "qe": "What is the consequence of falsifying records?", "ak": "자격 취소 등 중대한 처벌 사유입니다.", "ae": "It is grounds for certificate revocation."}, {"id": "o_c13_9", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "Form 337의 FAA 제출 기한은?", "qe": "When must Form 337 reach the FAA?", "ak": "작업 완료 후 48시간 이내입니다.", "ae": "Within 48 hours of completion."}, {"id": "o_c13_10", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "연료탱크 대수리 시 337의 특별 취급은?", "qe": "Special handling of 337 for fuel tank repairs?", "ak": "사본 한 부를 항공기 안에 비치합니다.", "ae": "Keep a copy in the aircraft."}, {"id": "o_c13_11", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "Time in Service의 정의는?", "qe": "Define time in service.", "ak": "이륙(바퀴 이지)부터 착륙(접지)까지의 시간입니다.", "ae": "From wheels-off to wheels-on."}, {"id": "o_c13_12", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "감항성 없음 판정 시 정비사의 조치는?", "qe": "What does a mechanic do when finding the aircraft unairworthy?", "ak": "복귀 승인하지 않고 서명된 결함 목록을 소유자에게 제공합니다.", "ae": "Withhold approval and give the owner a signed discrepancy list."}, {"id": "o_c14_1", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "마이크로미터의 일반 측정 단위는?", "qe": "What does a micrometer typically measure to?", "ak": "0.001인치(1/1000\")입니다.", "ae": "0.001 inch (one-thousandth)."}, {"id": "o_c14_2", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "런아웃(Runout) 측정에 쓰는 공구는?", "qe": "Which tool measures runout?", "ak": "다이얼 인디케이터(Dial Indicator)입니다.", "ae": "A dial indicator."}, {"id": "o_c14_3", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "토크렌치에 연장대를 축 방향으로 붙이면?", "qe": "If you add an in-line extension to a torque wrench?", "ak": "유효 팔길이가 바뀌므로 값을 보정해야 합니다.", "ae": "The effective length changes; recalculate the setting."}, {"id": "o_c14_4", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "'감'으로 조이면 안 되는 이유는?", "qe": "Why not tighten by 'feel'?", "ak": "과·부족 조임으로 체결 불량·파손을 유발하기 때문입니다.", "ae": "It causes over/under-torque and improper clamp-up or failure."}, {"id": "o_c14_5", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "FOD란 무엇인가?", "qe": "What is FOD?", "ak": "빠진 공구·부품이 기구·엔진에 들어가 손상을 일으키는 이물질손상입니다.", "ae": "Foreign object damage from lost tools/parts entering mechanisms/engines."}, {"id": "o_c14_6", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "섀도보드(Shadow Board)의 목적은?", "qe": "Purpose of a shadow board?", "ak": "공구 유무를 즉시 확인해 분실·FOD를 예방합니다.", "ae": "To instantly account for tools and prevent loss/FOD."}, {"id": "o_c14_7", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "작업 후 공구가 하나 없으면?", "qe": "If a tool is missing after work?", "ak": "찾을 때까지 항공기를 사용가능 복귀시키지 않습니다.", "ae": "Do not return the aircraft to service until it's found."}, {"id": "o_c14_8", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "교정 기한이 지난 공구는?", "qe": "What about a tool past its calibration due date?", "ak": "사용 금지이며 재교정해야 합니다.", "ae": "Do not use; it must be recalibrated."}, {"id": "o_c14_9", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "마이크로미터 눈금 0.025인치의 근거는?", "qe": "Why does one thimble turn equal 0.025 inch?", "ak": "스핀들 나사가 인치당 40산이라 1회전=1/40인치입니다.", "ae": "The spindle thread is 40 per inch: one turn = 1/40 inch."}, {"id": "o_c14_10", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "탭과 다이의 용도를 구분하라.", "qe": "Distinguish taps and dies.", "ak": "탭은 암나사(구멍), 다이는 수나사(봉)를 만듭니다.", "ae": "Taps cut internal threads; dies cut external threads."}, {"id": "o_c14_11", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "클릭식 토크렌치 보관 요령은?", "qe": "How is a click-type torque wrench stored?", "ak": "최저 눈금으로 풀어 스프링 장력을 해제해 보관합니다.", "ae": "Backed off to the lowest setting to relax the spring."}, {"id": "o_c14_12", "ch": 14, "chko": "정비 공구", "file": "ch14_tools.html", "qk": "드릴링 전 센터펀치를 치는 이유는?", "qe": "Why center punch before drilling?", "ak": "드릴 끝의 미끄러짐(워킹)을 막아 정확한 위치에 구멍을 냅니다.", "ae": "It prevents the drill from walking off location."}, {"id": "o_c15_1", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "정비사 시험 응시 자격을 얻는 세 경로는?", "qe": "What are the three pathways to test eligibility?", "ak": "Part 147 학교 졸업, 실무 경력, 군 정비 경력 인정입니다.", "ae": "Part 147 school, practical experience, or accepted military experience."}, {"id": "o_c15_2", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "A와 P를 모두 받으려면 필요한 경력 기간은?", "qe": "How much experience for both A and P?", "ak": "통상 30개월의 관련 실무 경력입니다.", "ae": "Typically 30 months of relevant practical experience."}, {"id": "o_c15_3", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "현재 시험 기준 체계는?", "qe": "What standard governs current testing?", "ak": "항공정비사 시험표준(ACS)입니다.", "ae": "The Airman Certification Standards (ACS)."}, {"id": "o_c15_4", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "구술·실기 시험을 평가하는 사람은?", "qe": "Who evaluates the oral and practical?", "ak": "지정정비사시험관(DME)입니다.", "ae": "A Designated Mechanic Examiner (DME)."}, {"id": "o_c15_5", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "지식시험 통상 합격선은?", "qe": "Typical knowledge-test passing score?", "ak": "70%입니다.", "ae": "70%."}, {"id": "o_c15_6", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "General 시험의 위치는?", "qe": "Where does the General test fit?", "ak": "A·P 공통 관문으로 먼저 통과해야 합니다.", "ae": "It is the common gateway, passed before A/P."}, {"id": "o_c15_7", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "정비 전문성의 핵심 태도는?", "qe": "What attitude defines professionalism?", "ak": "정직·규정 준수·안전 우선, '의심되면 확인한다'입니다.", "ae": "Honesty, compliance, safety first — 'when in doubt, check it out.'"}, {"id": "o_c15_8", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "정비사가 평생학습을 해야 하는 이유는?", "qe": "Why must a mechanic keep learning?", "ak": "복합재·전기추진·아비오닉스 등 기술이 계속 발전하기 때문입니다.", "ae": "Because technology (composites, electric propulsion, avionics) keeps advancing."}, {"id": "o_c15_9", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "지식시험 합격 후 유효기간과 의미는?", "qe": "How long is a passed written test valid, and why does it matter?", "ak": "24개월 — 그 안에 구술·실기를 마쳐야 하며 넘기면 재응시합니다.", "ae": "24 months; oral/practical must be finished within it."}, {"id": "o_c15_10", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "불합격 후 재응시 요건은?", "qe": "Requirements to retest after a failure?", "ak": "30일 경과 또는 추가 교육을 받았다는 교관 확인서입니다.", "ae": "30 days elapsed or an instructor's statement of added training."}, {"id": "o_c15_11", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "A·P 단일/동시 취득 경력 요건을 비교하라.", "qe": "Compare experience for one rating vs both.", "ak": "단일 18개월, 동시 30개월의 실무 경력입니다.", "ae": "18 months for one; 30 months for both."}, {"id": "o_c15_12", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "캐나다 AME와 미국 A&P의 관계는?", "qe": "How do the Canadian AME and U.S. A&P relate?", "ak": "각국의 정비사 면허로 상호 자동 인정은 아니며, 각각의 요건을 충족해야 합니다.", "ae": "Separate national licenses; no automatic conversion."}];
var CHS = [{"no": 1, "ko": "항공 입문", "n": 12, "file": "ch01_intro_aviation.html"}, {"no": 2, "ko": "항공 수학", "n": 12, "file": "ch02_mathematics.html"}, {"no": 3, "ko": "기초 물리", "n": 12, "file": "ch03_basic_physics.html"}, {"no": 4, "ko": "기초 전기", "n": 12, "file": "ch04_basic_electricity.html"}, {"no": 5, "ko": "항공기 도면", "n": 12, "file": "ch05_aircraft_drawings.html"}, {"no": 6, "ko": "무게와 평형", "n": 12, "file": "ch06_weight_balance.html"}, {"no": 7, "ko": "재료와 공정", "n": 12, "file": "ch07_materials_processes.html"}, {"no": 8, "ko": "세척과 부식방지", "n": 12, "file": "ch08_corrosion_control.html"}, {"no": 9, "ko": "유체 라인과 피팅", "n": 12, "file": "ch09_fluid_lines.html"}, {"no": 10, "ko": "지상 운용과 정비지원", "n": 12, "file": "ch10_ground_operation.html"}, {"no": 11, "ko": "규정과 정비 간행물", "n": 12, "file": "ch11_regulations.html"}, {"no": 12, "ko": "정비사 권한과 한계", "n": 12, "file": "ch12_privileges.html"}, {"no": 13, "ko": "정비 기록과 서식", "n": 12, "file": "ch13_forms_records.html"}, {"no": 14, "ko": "정비 공구", "n": 12, "file": "ch14_tools.html"}, {"no": 15, "ko": "항공정비 취업 입문", "n": 12, "file": "ch15_entering_field.html"}];
var PROJ = [{"no": 1, "ko": "정비 인적요인 식별", "en": "Identify Human Factors Elements", "desc": "더티더즌 12요인 중 3가지를 제시된 정비 시나리오에서 식별하고, 각 요인의 안전망(대책)을 설명한다.", "ch": 1, "file": "ch01_intro_aviation.html", "ref": "AMG.I / FAA-H-8083-30B Ch.14"}, {"no": 2, "ko": "정비 계산 수행", "en": "Perform Maintenance Mathematics", "desc": "분수↔소수 변환, 비례식으로 미지수 계산, 실린더 부피(배기량) 계산을 계산기 없이 또는 규정 방법으로 수행한다.", "ch": 2, "file": "ch02_mathematics.html", "ref": "AMG.II / FAA-H-8083-30B Ch.5"}, {"no": 3, "ko": "기체법칙·유체 원리 적용", "en": "Apply Fluid & Gas Principles", "desc": "보일·샤를 법칙으로 실린더 압력 변화를 계산하고, 파스칼 원리로 유압 힘 전달(힘·면적·압력)을 계산한다.", "ch": 3, "file": "ch03_basic_physics.html", "ref": "AMG.III / FAA-H-8083-30B Ch.3"}, {"no": 4, "ko": "전기 측정과 회로 점검", "en": "Electrical Measurement & Circuit Check", "desc": "멀티미터로 전압·전류·저항을 측정하고, 옴의 법칙으로 직렬·병렬 회로 값을 계산·검증한다. 전압강하 시험을 시연한다.", "ch": 4, "file": "ch04_basic_electricity.html", "ref": "AMG.IV / FAA-H-8083-30B Ch.9"}, {"no": 5, "ko": "도면 판독과 스케치", "en": "Read Drawings & Sketch", "desc": "제공된 도면에서 치수·공차·재질을 판독하고, 부품의 수리 스케치를 3면도로 작성한다. 도면 기호를 식별한다.", "ch": 5, "file": "ch05_aircraft_drawings.html", "ref": "AMG.V / FAA-H-8083-30B Ch.4"}, {"no": 6, "ko": "무게측정과 CG 계산", "en": "Weigh Aircraft & Compute CG", "desc": "제시된 무게측정 데이터(저울값·Tare·아암)로 자중과 자중 CG를 계산하고, 장비 추가 후 새 CG를 계산해 한계와 비교한다.", "ch": 6, "file": "ch06_weight_balance.html", "ref": "AMG.VI / FAA-H-8083-30B Ch.6"}, {"no": 7, "ko": "하드웨어 식별과 토크 작업", "en": "Identify Hardware & Apply Torque", "desc": "AN 볼트·너트·와셔를 규격표로 식별하고, 토크렌치(연장대 보정 포함)로 규정 토크를 적용하며 안전결선·코터핀을 시공한다.", "ch": 7, "file": "ch07_materials_processes.html", "ref": "AMG.VII / FAA-H-8083-30B Ch.7"}, {"no": 8, "ko": "부식 식별·제거·처리", "en": "Identify, Remove & Treat Corrosion", "desc": "시편의 부식 종류를 식별하고, 승인된 방법으로 제거 후 전환코팅·프라이머 처리 절차를 시연·설명한다.", "ch": 8, "file": "ch08_corrosion_control.html", "ref": "AMG.VIII / FAA-H-8083-30B Ch.8"}, {"no": 9, "ko": "튜브 벤딩·플레어링", "en": "Fabricate Rigid Tubing", "desc": "알루미늄 튜브를 규정 굽힘반경으로 벤딩하고 37° 싱글/더블 플레어를 제작해 검사 기준(균열·편심·치수)으로 평가한다.", "ch": 9, "file": "ch09_fluid_lines.html", "ref": "AMG.IX / FAA-H-8083-30B Ch.10"}, {"no": 10, "ko": "지상 운용과 서비싱", "en": "Ground Operations & Servicing", "desc": "견인·계류·잭업 절차를 시연하고, 급유 시 본딩·접지와 연료 오염 점검, 소화기 선택을 설명한다.", "ch": 10, "file": "ch10_ground_operation.html", "ref": "AMG.X / FAA-H-8083-30B Ch.11-12"}, {"no": 11, "ko": "규정·간행물 활용", "en": "Locate & Apply Regulations/Publications", "desc": "14 CFR·TCDS·AD·AC 43.13에서 제시된 정비 상황의 적용 규정과 승인 자료를 찾아 적용 가능 여부를 판정한다.", "ch": 11, "file": "ch11_regulations.html", "ref": "AMG.XI / FAA-H-8083-30B Ch.1-2"}, {"no": 12, "ko": "정비 기록 작성", "en": "Write Maintenance Records", "desc": "수행한 작업의 정비 기록(작업 설명·날짜·서명·자격번호)과 사용가능 복귀 문구를 규정에 맞게 작성하고, Form 337 대상 여부를 판정한다.", "ch": 13, "file": "ch13_forms_records.html", "ref": "AMG.XII / FAA-H-8083-30B Ch.2"}];
var chSel = null, showAgainOnly = false;

function getSt(){ try{return JSON.parse(localStorage.getItem('gen_oral')||'{}');}catch(e){return {};} }
function setSt(s){ try{localStorage.setItem('gen_oral', JSON.stringify(s));}catch(e){} }

var chf = document.getElementById('chf');
var allB = document.createElement('div'); allB.className='fbtn on'; allB.textContent='전체';
allB.onclick=function(){ chSel=null; upFilters(); render(); }; chf.appendChild(allB);
CHS.forEach(function(c){
  var b=document.createElement('div'); b.className='fbtn'; b.textContent='Ch.'+c.no+' ('+c.n+')'; b.title=c.ko;
  b.onclick=function(){ chSel=c.no; upFilters(); render(); }; b.dataset.ch=c.no; chf.appendChild(b);
});
function upFilters(){
  chf.querySelectorAll('.fbtn').forEach(function(b){ b.classList.toggle('on', (b.dataset.ch? +b.dataset.ch===chSel : chSel===null)); });
}
function onlyAgain(){ showAgainOnly=true; render(); }
function resetFilter(){ showAgainOnly=false; chSel=null; upFilters(); render(); }
function resetProgress(){ if(confirm('구술 진행도를 초기화할까요?')){ setSt({}); render(); } }

function render(){
  var st=getSt(), list=document.getElementById('olist'); list.innerHTML='';
  var pool = ORAL.filter(function(o){
    if(chSel && o.ch!==chSel) return false;
    if(showAgainOnly && st[o.id]!=='again') return false;
    return true;
  });
  pool.forEach(function(o){
    var d=document.createElement('div'); d.className='ocard'+(st[o.id]==='know'?' done':'');
    d.innerHTML='<span class="otag">CH.'+o.ch+' · '+o.chko+'</span>'
      +'<div class="oq">'+o.qk+'<span class="qe">'+o.qe+'</span></div>'
      +'<div class="oact">'
      +'<button class="obtn" onclick="tg(this)">답 보기 / 가리기</button>'
      +'<button class="obtn know'+(st[o.id]==='know'?' on':'')+'" onclick="gr(\''+o.id+'\',\'know\')">✅ 알았음</button>'
      +'<button class="obtn again'+(st[o.id]==='again'?' on':'')+'" onclick="gr(\''+o.id+'\',\'again\')">🔄 다시</button></div>'
      +'<div class="oans"><div class="lab">MODEL ANSWER · 모범답안</div>'+o.ak
      +'<span class="ae">'+o.ae+'</span><a href="'+o.file+'">→ Ch.'+o.ch+' 교재 보기</a></div>';
    list.appendChild(d);
  });
  if(!pool.length) list.innerHTML='<div style="padding:30px;text-align:center;color:var(--t3)">해당 조건의 카드가 없습니다.</div>';
  var done=0; ORAL.forEach(function(o){ if(st[o.id]==='know') done++; });
  document.getElementById('pDone').textContent=done;
  document.getElementById('pTotal').textContent=ORAL.length;
  var pct=Math.round(done/ORAL.length*100);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pPct').textContent=pct+'%';
}
function tg(btn){ btn.closest('.ocard').querySelector('.oans').classList.toggle('show'); }
function gr(id,v){ var st=getSt(); st[id]=(st[id]===v?null:v); setSt(st); render(); }

var pl=document.getElementById('plist');
PROJ.forEach(function(p){
  var d=document.createElement('div'); d.className='proj';
  d.innerHTML='<span class="pno">PROJECT '+p.no+'</span><h3>'+p.ko+'</h3><span class="en">'+p.en+'</span>'
    +'<div class="desc">'+p.desc+'</div>'
    +'<div class="meta"><span class="badge">'+p.ref+'</span>'
    +'<a class="badge link" href="'+p.file+'">📖 Ch.'+p.ch+' 연계 교재 →</a></div>';
  pl.appendChild(d);
});

function swTab(t){
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
  t.classList.add('on');
  document.getElementById('pane-oral').classList.toggle('hidden', t.dataset.t!=='oral');
  document.getElementById('pane-proj').classList.toggle('hidden', t.dataset.t!=='proj');
}
render();
</script>
</body>
</html>
