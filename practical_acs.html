<script>
var ORAL = [{"id": "o_c1_1", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "General 자격은 어떤 자격의 기초인가?", "qe": "What ratings is the General certificate the basis for?", "ak": "Airframe(A)와 Powerplant(P) 두 자격의 공통 기초로, A·P 시험 전에 반드시 통과해야 합니다.", "ae": "It is the common foundation for both the Airframe and Powerplant ratings and must be passed before either."}, {"id": "o_c1_2", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "'더티더즌'이란 무엇인가?", "qe": "What is the 'Dirty Dozen'?", "ak": "정비 실수를 유발하는 12가지 인적요인 목록입니다(소통 부족·안일함·피로 등).", "ae": "A list of twelve human factors that lead to maintenance errors, such as lack of communication, complacency, and fatigue."}, {"id": "o_c1_3", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "정비사가 AD(감항성 개선명령)를 반드시 준수해야 하는가?", "qe": "Must a mechanic comply with an AD?", "ak": "네, 법적 강제 사항이며 반복 AD는 규정 주기마다 재수행하고 기록해야 합니다.", "ae": "Yes; compliance is legally mandatory, and recurring ADs must be repeated at the specified interval and recorded."}, {"id": "o_c1_4", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "피로(Fatigue)의 안전망 대책 예시는?", "qe": "Give a safety net for fatigue.", "ak": "충분한 휴식, 중요 작업 시 동료 점검(2인 확인), 무리한 연속근무 회피 등이 있습니다.", "ae": "Adequate rest, having a colleague double-check critical work, and avoiding excessive consecutive shifts."}, {"id": "o_c1_5", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "SHEL 모델의 중심에 두는 요소는?", "qe": "What is at the center of the SHEL model?", "ak": "사람(Liveware)입니다. 나머지 소프트웨어·하드웨어·환경 요소가 사람과 상호작용합니다.", "ae": "Liveware (the person); the software, hardware, and environment elements all interact with the person."}, {"id": "o_c1_6", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "정비 자료 중 'AMM'은 무엇인가?", "qe": "What is the 'AMM'?", "ak": "제작사 항공기 정비교범(Aircraft Maintenance Manual)으로, 승인·수용 가능한 정비 방법의 근거입니다.", "ae": "The manufacturer's Aircraft Maintenance Manual, a source of approved or acceptable maintenance methods."}, {"id": "o_c1_7", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "정비 안일함(Complacency)이 위험한 이유는?", "qe": "Why is complacency dangerous?", "ak": "익숙한 작업을 무의식적으로 처리해 결함을 놓치기 쉽기 때문입니다. 점검표 사용이 대책입니다.", "ae": "Familiar tasks are done on autopilot, so defects are easily missed; using checklists is the countermeasure."}, {"id": "o_c1_8", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "항공정비사에게 요구되는 현대적 기술 두 가지는?", "qe": "Name two modern skills required of an AMT.", "ak": "전기·터빈엔진 고장탐구와 복합재 수리 능력입니다.", "ae": "Electrical/turbine-engine troubleshooting and composite repair."}, {"id": "o_c1_9", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "감항성(Airworthiness)의 정의를 말하라.", "qe": "Define airworthiness.", "ak": "형식설계에 부합하고 안전한 운항 상태에 있는 것 — 두 조건을 모두 만족해야 합니다.", "ae": "Conformity to type design AND condition for safe operation — both required."}, {"id": "o_c1_10", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "스위스치즈 모델을 정비에 적용하면?", "qe": "Apply the Swiss cheese model to maintenance.", "ak": "점검표·2인 확인·기능점검이 각각 방어층이며, 한 층만 작동해도 사고를 막습니다.", "ae": "Checklists, independent inspection, and functional checks are defense layers; any one can stop the accident."}, {"id": "o_c1_11", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "관행(Norms)이 규정을 대체할 수 있는가?", "qe": "Can norms replace procedures?", "ak": "안 됩니다. 비공식 관행은 승인 절차를 절대 대체할 수 없습니다.", "ae": "No. Informal norms can never replace approved procedures."}, {"id": "o_c1_12", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "주의산만 후 작업 재개 요령은?", "qe": "How do you resume work after a distraction?", "ak": "중단 지점보다 몇 단계 앞으로 되돌아가 확인 후 계속합니다.", "ae": "Go back several steps before the interruption point, verify, then continue."}, {"id": "o_c1_13", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "항공사고 중 인적 오류의 비율과, 그중 정비 관련 비율은?", "qe": "Approximately what percent of aviation accidents are human error, and what percent of those are maintenance related?", "ak": "약 75~80%가 인적 오류이며, 그중 약 12%가 정비 관련.", "ae": "About 75–80% are human error, and about 12% of those are maintenance related."}, {"id": "o_c1_14", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "품질 시스템은 무엇으로 보증되는가?", "qe": "How is a quality system assured?", "ak": "내부 보고·감사 체계로.", "ae": "By an internal reporting and auditing system."}, {"id": "o_c1_15", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "제임스 리즌이 말한 두 가지 인적 실패 유형은?", "qe": "What are the two types of human failure per Dr. James Reason?", "ak": "능동(active)과 잠재(latent).", "ae": "Active and latent."}, {"id": "o_c1_16", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "SHEL 모델의 목적은?", "qe": "What is the goal of the SHEL model?", "ak": "문제가 무엇인지뿐 아니라 어디서·왜 존재하는지 규명.", "ae": "To determine not only what the problem is, but where and why it exists."}, {"id": "o_c1_17", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "인적 오류의 세 가지 유형은?", "qe": "What are the three types of human error?", "ak": "누락(omission)·실행오류(commission)·불필요행위(extraneous).", "ae": "Omission, commission, and extraneous."}, {"id": "o_c2_1", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "분수의 덧셈에서 먼저 해야 할 일은?", "qe": "What must you do first to add fractions?", "ak": "공통분모(LCD)로 통분해야 합니다.", "ae": "Find a common denominator (LCD)."}, {"id": "o_c2_2", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "3/8을 소수로 바꾸면?", "qe": "Convert 3/8 to a decimal.", "ak": "3÷8 = 0.375 입니다.", "ae": "3 ÷ 8 = 0.375."}, {"id": "o_c2_3", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "비례식에서 미지수를 구하는 방법은?", "qe": "How do you solve a proportion for an unknown?", "ak": "교차곱(Cross-multiply) 후 나누어 구합니다.", "ae": "Cross-multiply, then divide."}, {"id": "o_c2_4", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "원의 넓이 공식은?", "qe": "What is the area of a circle?", "ak": "π×r²(파이 곱하기 반지름의 제곱)입니다.", "ae": "π × r² (pi times radius squared)."}, {"id": "o_c2_5", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "옴의 법칙 E=IR에서 R을 구하면?", "qe": "From E=IR, solve for R.", "ak": "R = E ÷ I 입니다.", "ae": "R = E ÷ I."}, {"id": "o_c2_6", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "엔진 배기량(Displacement)은 어떻게 구하는가?", "qe": "How is engine displacement found?", "ak": "실린더 부피 × 실린더 수로 구합니다.", "ae": "Cylinder volume × number of cylinders."}, {"id": "o_c2_7", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "2진수 1011은 10진수로 얼마인가?", "qe": "What is binary 1011 in decimal?", "ak": "8+0+2+1 = 11 입니다.", "ae": "8+0+2+1 = 11."}, {"id": "o_c2_8", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "과학적 표기 4×10⁻⁴는 얼마인가?", "qe": "What is 4×10⁻⁴ as a decimal?", "ak": "0.0004 입니다.", "ae": "0.0004."}, {"id": "o_c2_9", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "엔진 배기량 계산식을 말하라.", "qe": "State the engine displacement formula.", "ak": "π×(내경/2)²×행정×실린더 수입니다.", "ae": "π × (bore/2)² × stroke × number of cylinders."}, {"id": "o_c2_10", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "피타고라스 정리는 언제 쓰는가?", "qe": "When is the Pythagorean theorem used?", "ak": "직각삼각형에서 빗변·대각선 길이를 구할 때 씁니다(a²+b²=c²).", "ae": "To find the hypotenuse/diagonal in right triangles (a²+b²=c²)."}, {"id": "o_c2_11", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "단위 환산의 검증 방법은?", "qe": "How do you verify unit conversions?", "ak": "단위 소거(Dimensional Analysis)로 원하지 않는 단위가 약분되는지 확인합니다.", "ae": "Dimensional analysis — unwanted units must cancel."}, {"id": "o_c2_12", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "음수 곱하기 음수의 부호는?", "qe": "What is the sign of a negative times a negative?", "ak": "양수(+)입니다.", "ae": "Positive."}, {"id": "o_c2_13", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "원의 넓이를 구하는 공식은?", "qe": "What formula is used to find the area of a circle?", "ak": "A = 0.7854 × D² 또는 A = π × R².", "ae": "A = 0.7854 × D² or A = π × R²."}, {"id": "o_c2_14", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "원기둥의 부피 공식은?", "qe": "What formula is used to find the volume of a cylinder?", "ak": "V = 0.7854 × D² × H.", "ae": "V = 0.7854 × D² × H."}, {"id": "o_c2_15", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "직사각형의 넓이 공식은?", "qe": "What formula is used to find the area of a rectangle?", "ak": "A = 가로 × 세로 (L × W).", "ae": "A = L × W."}, {"id": "o_c2_16", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "직육면체의 부피 공식은?", "qe": "What formula is used to find the volume of a rectangular solid?", "ak": "V = L × W × H.", "ae": "V = L × W × H."}, {"id": "o_c2_17", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "삼각형의 넓이 공식은?", "qe": "What formula is used to find the area of a triangle?", "ak": "A = (밑변 × 높이) ÷ 2.", "ae": "A = (B × H) ÷ 2."}, {"id": "o_c2_18", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "상수 π(파이)의 의미는?", "qe": "What is the significance of the constant π?", "ak": "원의 둘레와 지름의 비.", "ae": "The ratio of the circumference to the diameter of any circle."}, {"id": "o_c2_19", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "π의 값은?", "qe": "What is the value of the constant π?", "ak": "약 3.1416.", "ae": "π ≈ 3.1416."}, {"id": "o_c2_20", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "어떤 수의 '근(root)'이란?", "qe": "What is meant by the root of a number?", "ak": "곱해서 그 수가 되는 서로 같은 인수 중 하나.", "ae": "One of two or more equal factors that multiply to produce the number."}, {"id": "o_c2_21", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "2의 8제곱은?", "qe": "What is the eighth power of 2?", "ak": "256.", "ae": "256."}, {"id": "o_c2_22", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "4,096의 제곱근은?", "qe": "What is the square root of 4,096?", "ak": "64.", "ae": "64."}, {"id": "o_c2_23", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "음수(negative number)란?", "qe": "What is meant by a negative number?", "ak": "0보다 작은 수, 즉 마이너스 부호가 붙은 수.", "ae": "A number less than 0, preceded by a minus sign."}, {"id": "o_c2_24", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "비(ratio)란 무엇이고 어떻게 표기하는가?", "qe": "What is meant by a ratio and how is it expressed?", "ak": "두 수를 비교한 분수. 예: 6:2.", "ae": "A fraction comparing one number to another; e.g., 6:2."}, {"id": "o_c3_1", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "파스칼의 원리를 설명하라.", "qe": "State Pascal's law.", "ak": "밀폐된 유체에 가한 압력은 모든 방향으로 동일하게 전달됩니다.", "ae": "Pressure applied to a confined fluid is transmitted equally in all directions."}, {"id": "o_c3_2", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "베르누이 정리와 양력의 관계는?", "qe": "How does Bernoulli's principle relate to lift?", "ak": "익형 윗면의 빠른 흐름이 정압을 낮춰 양력에 기여합니다.", "ae": "Faster flow over the upper surface lowers static pressure, contributing to lift."}, {"id": "o_c3_3", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "압력의 정의는?", "qe": "Define pressure.", "ak": "단위 면적당 작용하는 힘(P=F/A)입니다.", "ae": "Force per unit area (P = F/A)."}, {"id": "o_c3_4", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "1 마력은 몇 ft·lb/min인가?", "qe": "How many ft·lb/min is one horsepower?", "ak": "33,000 ft·lb/min(=550 ft·lb/s)입니다.", "ae": "33,000 ft·lb/min (= 550 ft·lb/s)."}, {"id": "o_c3_5", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "게이지압과 절대압의 차이는?", "qe": "Difference between gauge and absolute pressure?", "ak": "게이지압은 대기압을 0으로, 절대압은 완전진공을 0으로 봅니다.", "ae": "Gauge is referenced to atmospheric (zero); absolute is referenced to a vacuum."}, {"id": "o_c3_6", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "보일의 법칙은?", "qe": "State Boyle's law.", "ak": "온도가 일정하면 기체의 압력과 부피의 곱은 일정합니다.", "ae": "At constant temperature, the product of a gas's pressure and volume is constant."}, {"id": "o_c3_7", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "열 전달 3가지 방식은?", "qe": "Name the three modes of heat transfer.", "ak": "전도·대류·복사입니다.", "ae": "Conduction, convection, and radiation."}, {"id": "o_c3_8", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "작용-반작용 법칙의 항공 예는?", "qe": "Give an aviation example of action–reaction.", "ak": "제트엔진의 배기(작용)에 대한 추력(반작용)입니다.", "ae": "Jet exhaust (action) produces forward thrust (reaction)."}, {"id": "o_c3_9", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "구조물에 작용하는 5가지 응력을 말하라.", "qe": "Name the five stresses on aircraft structures.", "ak": "인장·압축·전단·비틀림·굽힘입니다.", "ae": "Tension, compression, shear, torsion, bending."}, {"id": "o_c3_10", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "힘·면적·압력의 관계식은?", "qe": "State the force–area–pressure relationship.", "ak": "F = P × A (힘 = 압력 × 면적)입니다.", "ae": "F = P × A."}, {"id": "o_c3_11", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "샤를의 법칙을 말하라.", "qe": "State Charles's law.", "ak": "압력이 일정하면 기체 부피는 절대온도에 비례합니다.", "ae": "At constant pressure, gas volume is proportional to absolute temperature."}, {"id": "o_c3_12", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "벤투리 목에서 정압이 낮아지는 이유는?", "qe": "Why does static pressure drop in a venturi throat?", "ak": "유속이 빨라지기 때문입니다(베르누이 정리).", "ae": "Velocity increases there (Bernoulli's principle)."}, {"id": "o_c3_13", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "물질(matter)이란?", "qe": "What is meant by matter?", "ak": "공간을 차지하고 무게를 가진 모든 것.", "ae": "Anything that occupies space and has weight."}, {"id": "o_c3_14", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "물질이 존재하는 세 가지 기본 상태는?", "qe": "What are the three basic physical states of matter?", "ak": "고체·액체·기체.", "ae": "Solid, liquid, and gas."}, {"id": "o_c3_15", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "압력(pressure)이란?", "qe": "What is meant by pressure?", "ak": "단위 면적에 작용하는 힘.", "ae": "Force that acts on a unit of area."}, {"id": "o_c3_16", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "표준 해면 대기압은 수은주와 psi로 얼마인가?", "qe": "What is standard sea level atmospheric pressure in inches of mercury and psi?", "ak": "29.92 inHg, 14.69 psi.", "ae": "29.92 in Hg and 14.69 psi."}, {"id": "o_c3_17", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "음속을 결정하는 대기 특성은?", "qe": "What characteristic of the atmosphere determines the speed of sound?", "ak": "온도.", "ae": "Its temperature."}, {"id": "o_c3_18", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "공기의 밀도(density)란?", "qe": "What is meant by the density of air?", "ak": "일정 부피 공기의 무게.", "ae": "The weight of a given volume of air."}, {"id": "o_c3_19", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "1,000 psi가 면적 20 in² 피스톤에 작용하면 힘은?", "qe": "How much force is produced by 1,000 psi acting on a 20 sq in piston?", "ak": "20,000 파운드.", "ae": "20,000 pounds."}, {"id": "o_c3_20", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "지레의 지점(fulcrum)이란?", "qe": "What is meant by the fulcrum of a lever?", "ak": "지레가 회전하는 중심점.", "ae": "The point about which the lever rotates."}, {"id": "o_c3_21", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "1·2·3종 지레의 예는?", "qe": "Give an example of a first-, second-, and third-class lever.", "ak": "1종: 드라이버로 뚜껑 열기, 2종: 손수레, 3종: 유압 접이식 착륙장치.", "ae": "First: screwdriver prying a lid; second: wheelbarrow; third: hydraulically retracted landing gear."}, {"id": "o_c3_22", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "면적 20 in² 피스톤이 5인치 움직이면 밀려나는 유체 부피는?", "qe": "How many cubic inches of fluid are forced out by a 20 sq in piston moving 5 inches?", "ak": "100 in³.", "ae": "100 cubic inches."}, {"id": "o_c3_23", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "절대영도(absolute zero)란?", "qe": "What is meant by a temperature of absolute zero?", "ak": "모든 분자 운동이 멈추는 온도.", "ae": "The temperature at which all molecular movement stops."}, {"id": "o_c3_24", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "화씨 50°F는 섭씨로?", "qe": "What is the Celsius equivalent of 50°F?", "ak": "10°C.", "ae": "10°C."}, {"id": "o_c3_25", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "물체를 바닥으로 옮길 때 한 일의 공식은?", "qe": "What formula is used to find work done moving an object across a floor?", "ak": "일 = 힘 × 거리.", "ae": "Work = Force × Distance."}, {"id": "o_c3_26", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "도르래·로프 배열의 기계적 이득을 결정하는 것은?", "qe": "What determines the mechanical advantage of ropes and pulleys?", "ak": "무게를 지지하는 로프의 가닥 수.", "ae": "The number of ropes that support the weight."}, {"id": "o_c3_27", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "기어열의 기계적 이득을 결정하는 것은?", "qe": "What determines the mechanical advantage of a gear train?", "ak": "구동기어와 피동기어의 잇수 비.", "ae": "The ratio of teeth on the drive gear to the driven gear."}, {"id": "o_c3_28", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "밀폐 기체의 온도가 오르면 압력은?", "qe": "What happens to the pressure of a confined gas if temperature increases?", "ak": "압력이 증가한다.", "ae": "The pressure will increase."}, {"id": "o_c3_29", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "열전달의 세 가지 방법은?", "qe": "What are three methods of heat transfer?", "ak": "전도·대류·복사.", "ae": "Conduction, convection, and radiation."}, {"id": "o_c3_30", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "절대습도(absolute humidity)란?", "qe": "What is meant by the absolute humidity of the atmosphere?", "ak": "일정 부피 공기 속 실제 수분량.", "ae": "The actual amount of water in a given volume of air."}, {"id": "o_c3_31", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "모든 물질의 기본 구성단위는?", "qe": "What is considered the basic building block of all matter?", "ak": "원자(atom).", "ae": "The atom."}, {"id": "o_c3_32", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "종횡비(aspect ratio)를 정의하면?", "qe": "Define the term 'aspect ratio'.", "ak": "날개(에어포일) 길이(스팬)와 폭(시위)의 비.", "ae": "The ratio of the length (span) of an airfoil to its width (chord)."}, {"id": "o_c3_33", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "바깥 잇니가 맞물린 두 기어는 어떤 종류의 지레처럼 작용하는가?", "qe": "Two gears with teeth on their outer edges act like what class of lever?", "ak": "1종 지레.", "ae": "A first-class lever."}, {"id": "o_c3_34", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "단일 로터 헬리콥터에 뒤에서 접근하면 안 되는 이유는?", "qe": "Why should no one ever approach a single-rotor helicopter from the rear?", "ak": "작동 중 테일로터가 보이지 않기 때문.", "ae": "The tail rotor is invisible when operating."}, {"id": "o_c4_1", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "옴의 법칙을 쓰라.", "qe": "State Ohm's law.", "ak": "E = I × R (전압=전류×저항)입니다.", "ae": "E = I × R (voltage = current × resistance)."}, {"id": "o_c4_2", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전력 공식은?", "qe": "What is the power formula?", "ak": "P = E × I (와트), 또는 P=I²R, P=E²/R입니다.", "ae": "P = E × I (watts), or P = I²R, P = E²/R."}, {"id": "o_c4_3", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "직렬회로에서 전류와 전압의 특징은?", "qe": "In a series circuit, how do current and voltage behave?", "ak": "전류는 어디서나 같고, 전압은 각 저항에 나뉩니다.", "ae": "Current is the same throughout; voltage divides across the resistors."}, {"id": "o_c4_4", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "병렬회로에서 전압의 특징은?", "qe": "In a parallel circuit, how does voltage behave?", "ak": "모든 가지에 걸리는 전압이 같습니다.", "ae": "Voltage is the same across all branches."}, {"id": "o_c4_5", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "납산 배터리 충전상태 확인 방법은?", "qe": "How do you check a lead-acid battery's state of charge?", "ak": "전해액 비중(Specific Gravity)을 비중계로 측정합니다.", "ae": "Measure electrolyte specific gravity with a hydrometer."}, {"id": "o_c4_6", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "Ni-Cd 배터리의 주요 위험은?", "qe": "What is the main hazard of a Ni-Cd battery?", "ak": "열폭주(Thermal Runaway)입니다. 온도 감시가 필요합니다.", "ae": "Thermal runaway; temperature monitoring is required."}, {"id": "o_c4_7", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "회로차단기 정격은 무엇을 보호하도록 정하는가?", "qe": "A circuit breaker rating is chosen to protect what?", "ak": "부하가 아니라 배선(전선)을 보호하도록 정합니다.", "ae": "The wiring, not the load."}, {"id": "o_c4_8", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전자기 유도의 원리는?", "qe": "What is the principle of electromagnetic induction?", "ak": "도체가 자기장을 가로지를 때 전압이 유도됩니다.", "ae": "Voltage is induced when a conductor moves through a magnetic field."}, {"id": "o_c4_9", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "같은 값 저항 2개를 병렬 연결하면 합성저항은?", "qe": "Two equal resistors in parallel give what total?", "ak": "한 개 값의 절반입니다.", "ae": "Half the value of one."}, {"id": "o_c4_10", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "정류기와 인버터의 차이는?", "qe": "Difference between a rectifier and an inverter?", "ak": "정류기는 AC→DC, 인버터는 DC→AC 변환입니다.", "ae": "Rectifier: AC to DC; inverter: DC to AC."}, {"id": "o_c4_11", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "변압기가 직류에서 작동하지 않는 이유는?", "qe": "Why won't a transformer work on DC?", "ak": "유도에는 변화하는 자속이 필요한데 직류는 자속이 일정하기 때문입니다.", "ae": "Induction needs changing flux; DC flux is constant."}, {"id": "o_c4_12", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "배터리 셀당 전압으로 24V 계통을 만들려면 몇 셀?", "qe": "How many 2 V cells make a 24 V battery?", "ak": "12셀입니다.", "ae": "Twelve cells."}, {"id": "o_c4_13", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전압의 기본 단위는?", "qe": "What is the basic unit of voltage?", "ak": "볼트(volt).", "ae": "The volt."}, {"id": "o_c4_14", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전류의 기본 단위는?", "qe": "What is the basic unit of current?", "ak": "암페어(amp).", "ae": "The amp."}, {"id": "o_c4_15", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "저항의 기본 단위는?", "qe": "What is the basic unit of resistance?", "ak": "옴(ohm).", "ae": "The ohm."}, {"id": "o_c4_16", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "정비사에게 가장 중요한 전기 법칙은?", "qe": "Which law of electricity is most important for an aircraft mechanic to know?", "ak": "옴의 법칙.", "ae": "Ohm's law."}, {"id": "o_c4_17", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "옴의 법칙의 세 요소는?", "qe": "What are the three elements in Ohm's law?", "ak": "전압·전류·저항.", "ae": "Voltage, current, and resistance."}, {"id": "o_c4_18", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전기 에너지의 다섯 가지 원천은?", "qe": "What are five sources of electrical energy?", "ak": "자기·화학·빛·열·압력.", "ae": "Magnetism, chemical energy, light, heat, and pressure."}, {"id": "o_c4_19", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전선의 저항에 영향을 주는 네 가지는?", "qe": "What four things affect the resistance of a conductor?", "ak": "재질·단면적·길이·온도.", "ae": "The material, cross-sectional area, length, and temperature."}, {"id": "o_c4_20", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "탄소피막 저항의 값은 어떻게 아는가?", "qe": "How can you tell the resistance of a composition resistor?", "ak": "한쪽 끝의 색 띠(컬러밴드)로.", "ae": "By the colored bands around one end."}, {"id": "o_c4_21", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "모든 전기회로가 갖춰야 할 세 가지는?", "qe": "What three things must all circuits contain?", "ak": "전원·부하·도체.", "ae": "A source of energy, a load, and conductors."}, {"id": "o_c4_22", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "콘덴서(capacitor)의 목적은?", "qe": "What is the purpose of a capacitor?", "ak": "정전기장에 전기 에너지를 저장.", "ae": "To store electrical energy in electrostatic fields."}, {"id": "o_c4_23", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "정전용량의 기본 단위는?", "qe": "What is the basic unit of capacitance?", "ak": "패럿(farad).", "ae": "The farad."}, {"id": "o_c4_24", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전해 콘덴서를 AC 회로에 쓰면 안 되는 이유는?", "qe": "Why should electrolytic capacitors not be used in an AC circuit?", "ak": "극성이 있어 한 방향 전류만 통과시키기 때문.", "ae": "They are polarized; they pass one polarity but block the other."}, {"id": "o_c4_25", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "인덕턴스(inductance)란?", "qe": "What is meant by inductance?", "ak": "전자기장에 에너지를 저장하는 능력.", "ae": "The ability to store electrical energy in electromagnetic fields."}, {"id": "o_c4_26", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "인덕턴스의 기본 단위는?", "qe": "What is the basic unit of inductance?", "ak": "헨리(henry).", "ae": "The henry."}, {"id": "o_c4_27", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "임피던스(impedance)란?", "qe": "What is meant by impedance?", "ak": "교류 흐름에 대한 총 저항. 저항·용량리액턴스·유도리액턴스의 벡터합.", "ae": "The total opposition to AC; the vector sum of resistance, capacitive and inductive reactance."}, {"id": "o_c4_28", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전자석의 극성을 찾는 방법은?", "qe": "How can you find the polarity of an electromagnet?", "ak": "왼손으로 전자 흐름 방향으로 코일을 감싸면 엄지가 N극을 가리킴.", "ae": "Grasp the coil with the left hand, fingers in the direction of electron flow; the thumb points to the north end."}, {"id": "o_c4_29", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "임피던스의 단위는?", "qe": "In what units is impedance measured?", "ak": "옴(ohms).", "ae": "In ohms."}, {"id": "o_c4_30", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "DC 회로 전력의 기본 단위는?", "qe": "What is the basic unit of electrical power in a DC circuit?", "ak": "와트(watt).", "ae": "The watt."}, {"id": "o_c4_31", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "킬로와트란?", "qe": "What is meant by a kilowatt?", "ak": "1,000 와트.", "ae": "1,000 watts."}, {"id": "o_c4_32", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "DC 회로에서 저항 일정, 전압이 오르면 전류는?", "qe": "In a DC circuit, if voltage increases but resistance stays the same, what happens to current?", "ak": "전류가 증가한다.", "ae": "The current increases."}, {"id": "o_c4_33", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "부품 배치에 따른 DC 회로 세 가지는?", "qe": "What are three types of DC circuits by component placement?", "ak": "직렬·병렬·직병렬.", "ae": "Series, parallel, and series-parallel."}, {"id": "o_c4_34", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "24V 납축전지의 셀 수는?", "qe": "How many cells are in a 24-volt lead-acid battery?", "ak": "12개.", "ae": "12."}, {"id": "o_c4_35", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "완충된 납축전지 전해질의 비중은?", "qe": "What is the specific gravity of a fully charged lead-acid battery's electrolyte?", "ak": "1.275~1.300.", "ae": "Between 1.275 and 1.300."}, {"id": "o_c4_36", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "비중 측정 시 보정이 필요 없는 전해질 온도 범위는?", "qe": "At what electrolyte temperature range is no specific-gravity correction needed?", "ak": "화씨 70~90도.", "ae": "Between 70 and 90 degrees Fahrenheit."}, {"id": "o_c4_37", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "납축전지 전해질 비중 측정 기구는?", "qe": "What instrument measures the specific gravity of a lead-acid battery?", "ak": "비중계(하이드로미터).", "ae": "A hydrometer."}, {"id": "o_c4_38", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "납축전지 격실의 부식 방지 처리는?", "qe": "How is a lead-acid battery compartment protected from corrosion?", "ak": "아스팔트계 또는 폴리우레탄 도료로 도장.", "ae": "Paint it with asphaltic (tar-base) paint or polyurethane enamel."}, {"id": "o_c4_39", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "납축전지 전해질이 쏟아졌을 때 중화제는?", "qe": "What neutralizes spilled lead-acid electrolyte?", "ak": "탄산수소나트륨(베이킹소다) 용액.", "ae": "A solution of bicarbonate of soda and water."}, {"id": "o_c4_40", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "납축전지의 전해질 액면 높이는?", "qe": "How high should the electrolyte level be in a lead-acid battery?", "ak": "셀의 표시선까지만.", "ae": "Only up to the level of the indicator in the cell."}, {"id": "o_c4_41", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "납축·니카드 전지를 같이 취급하는 정비장의 주의사항은?", "qe": "What precautions where both lead-acid and Ni-Cad batteries are serviced?", "ak": "두 종류를 분리 보관하고 공구를 섞어 쓰지 않는다.", "ae": "Keep the two types separate and don't share tools between them."}, {"id": "o_c4_42", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "니카드 전지 충전상태를 비중계로 안 재는 이유는?", "qe": "Why is a hydrometer not used for a Ni-Cad battery's state of charge?", "ak": "니카드 전해질은 충·방전 화학반응에 참여하지 않아 비중이 거의 안 변함.", "ae": "Its electrolyte doesn't enter the chemical changes, so specific gravity doesn't change appreciably."}, {"id": "o_c4_43", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "니카드 전해질 유출 시 중화제는?", "qe": "What neutralizes spilled Ni-Cad electrolyte?", "ak": "붕산(보릭애시드) 용액.", "ae": "A solution of boric acid and water."}, {"id": "o_c4_44", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전자기 유도(electromagnetic induction)란?", "qe": "What is meant by electromagnetic induction?", "ak": "전기적으로 연결되지 않은 도체 사이의 전기 에너지 전달.", "ae": "The transfer of electrical energy from one conductor to another not electrically connected."}, {"id": "o_c4_45", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "1메그옴은 몇 옴인가?", "qe": "How many ohms are in a megohm?", "ak": "1,000,000 옴.", "ae": "One million (1,000,000)."}, {"id": "o_c4_46", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "밀리암페어는 1암페어의 얼마인가?", "qe": "What part of an amp is a milliamp?", "ak": "1/1000 (0.001).", "ae": "One thousandth (0.001)."}, {"id": "o_c5_1", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "상세도·조립도·설치도의 차이는?", "qe": "Difference between detail, assembly, and installation drawings?", "ak": "상세도는 단일 부품, 조립도는 결합된 부품들, 설치도는 항공기 장착 위치를 보여줍니다.", "ae": "Detail shows one part, assembly shows parts joined, installation shows the mounting location on the aircraft."}, {"id": "o_c5_2", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "제목란(Title Block)에서 가장 중요한 식별 정보는?", "qe": "What is the key identifying item in a title block?", "ak": "도면 번호(Drawing Number)입니다.", "ae": "The drawing number."}, {"id": "o_c5_3", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "자재표(BOM)란?", "qe": "What is a bill of materials?", "ak": "필요한 부품·수량·규격을 나열한 목록입니다.", "ae": "A list of required parts, quantities, and specifications."}, {"id": "o_c5_4", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "숨은선(Hidden Line)은 어떻게 표시하는가?", "qe": "How is a hidden line drawn?", "ak": "파선(짧은 점선)으로 표시합니다.", "ae": "As a dashed line."}, {"id": "o_c5_5", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "고장탐구에 유용한 도면은?", "qe": "Which diagram is most useful for troubleshooting?", "ak": "회로도(Schematic)입니다. 기능·연결을 기호로 보여줍니다.", "ae": "The schematic; it shows function and connections symbolically."}, {"id": "o_c5_6", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "치수 1.000±0.005의 허용 범위는?", "qe": "What is the allowable range of 1.000 ±0.005?", "ak": "0.995 ~ 1.005 입니다.", "ae": "0.995 to 1.005."}, {"id": "o_c5_7", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "개정란(Revision Block)의 목적은?", "qe": "Purpose of the revision block?", "ak": "도면의 변경 이력을 기록·관리하는 것입니다.", "ae": "To record and manage the drawing's change history."}, {"id": "o_c5_8", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "억지끼워맞춤(Interference Fit)이란?", "qe": "What is an interference fit?", "ak": "축이 구멍보다 커서 압입해야 하는 끼워맞춤입니다.", "ae": "A fit where the shaft is larger than the hole and must be pressed in."}, {"id": "o_c5_9", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "제3각법에서 세 뷰의 배치를 말하라.", "qe": "Describe view placement in third-angle projection.", "ak": "정면도 기준으로 평면도는 위, 우측면도는 오른쪽에 배치합니다.", "ae": "Top view above the front view; right side view to its right."}, {"id": "o_c5_10", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "스케치가 허용되는 경우는?", "qe": "When is a sketch acceptable?", "ak": "수리 기록·간단한 제작 지시 등 공식 도면이 없을 때 승인 자료와 함께 사용합니다.", "ae": "For repair records/simple fabrication when no formal drawing exists, with approved data."}, {"id": "o_c5_11", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "해칭(Section Lining)의 의미는?", "qe": "What does section lining (hatching) indicate?", "ak": "단면도에서 잘린 면을 나타냅니다.", "ae": "The surface cut by the section plane."}, {"id": "o_c5_12", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "IPC와 AMM의 용도 차이는?", "qe": "How do the IPC and AMM differ?", "ak": "IPC는 부품 식별·주문용, AMM은 정비 절차용입니다.", "ae": "IPC identifies/orders parts; AMM gives maintenance procedures."}, {"id": "o_c5_13", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "도면의 공차(tolerance)란?", "qe": "What is meant by tolerance on an aircraft drawing?", "ak": "치수에 대해 허용되는 ± 변동량.", "ae": "The allowable plus or minus variation from the given dimension."}, {"id": "o_c5_14", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "도면의 틈새(clearance)란?", "qe": "What is meant by clearance on an aircraft drawing?", "ak": "두 부품 사이에 허용되는 간격.", "ae": "The space or separation allowed between two parts."}, {"id": "o_c5_15", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "표제란(title block)에 들어가는 정보는?", "qe": "What information is in the title block?", "ak": "제작사명·주소, 부품명, 척도, 제도자명, 승인 엔지니어명, 도면(부품)번호.", "ae": "Company name/address, part name, scale, draftsman, approving engineer, and drawing (part) number."}, {"id": "o_c5_16", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "도면의 치수는 어떻게 표시되는가?", "qe": "How are dimensions shown on a drawing?", "ak": "치수선의 끊긴 부분에 숫자로.", "ae": "By numbers shown in the break of a dimension line."}, {"id": "o_c5_17", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "사용 중인 도면이 최신본인지 어떻게 아는가?", "qe": "How do you know a drawing is the most current version?", "ak": "개정란의 번호와 최신 도면 기록으로.", "ae": "By the number in the revision block and the log of recent drawings."}, {"id": "o_c5_18", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "정투상도에는 몇 개의 뷰가 가능한가?", "qe": "How many views can there be in an orthographic projection?", "ak": "여섯.", "ae": "Six."}, {"id": "o_c5_19", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "대부분의 물체를 나타내는 데 쓰는 뷰 수는?", "qe": "How many views are used to show most objects?", "ak": "셋.", "ae": "Three."}, {"id": "o_c5_20", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "중심선(center line)의 목적은?", "qe": "What is the purpose of a center line?", "ak": "도면에서 물체의 중심을 나타냄.", "ae": "It shows the center of the object in the drawing."}, {"id": "o_c5_21", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "동체 스테이션 번호(fuselage station)란?", "qe": "What is a fuselage station number?", "ak": "기준선(datum)에서 동체 세로축을 따라 잰 인치 거리.", "ae": "The distance in inches from the datum along the longitudinal axis."}, {"id": "o_c5_22", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "표제란은 보통 어디에 있는가?", "qe": "Where is the title block normally located?", "ak": "도면 오른쪽 아래 모서리.", "ae": "In the lower right-hand corner."}, {"id": "o_c5_23", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "절단면 표시선(cutting plane)의 목적은?", "qe": "What is the purpose of a cutting plane?", "ak": "보조 도면을 위해 물체를 절단한 위치를 표시. 화살표는 보는 방향.", "ae": "It shows where an object is cut for an auxiliary drawing; arrows show the viewing direction."}, {"id": "o_c5_24", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "부품의 이동(대체) 위치는 어떻게 표시하는가?", "qe": "How is the alternate position of a part shown?", "ak": "긴 대시 사이에 짧은 대시 2개가 있는 가는 선.", "ae": "A thin line of long dashes separated by two short dashes."}, {"id": "o_c5_25", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "전단면도(full section view)는 언제 쓰는가?", "qe": "When is a full section view used on a drawing?", "ak": "외형 뷰로는 내부 구조·숨은 부분을 명확히 보일 수 없을 때.", "ae": "When interior construction or hidden features can't be shown clearly by exterior views."}, {"id": "o_c6_1", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "기준선(Datum)이란?", "qe": "What is the datum?", "ak": "모든 아암(거리) 측정의 기준이 되는 가상의 수직면입니다.", "ae": "An imaginary vertical plane from which all arms are measured."}, {"id": "o_c6_2", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "모멘트(Moment)는 어떻게 구하는가?", "qe": "How is moment calculated?", "ak": "무게 × 아암 입니다.", "ae": "Weight × arm."}, {"id": "o_c6_3", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "CG를 구하는 공식은?", "qe": "What is the formula for CG?", "ak": "총모멘트 ÷ 총무게 입니다.", "ae": "Total moment ÷ total weight."}, {"id": "o_c6_4", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "자중(Empty Weight)에 포함되는 연료는?", "qe": "What fuel is included in empty weight?", "ak": "불사용 연료(Unusable Fuel)만 포함됩니다.", "ae": "Only unusable fuel."}, {"id": "o_c6_5", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "유용하중(Useful Load)은 어떻게 구하는가?", "qe": "How is useful load found?", "ak": "최대이륙중량에서 자중을 뺀 값입니다.", "ae": "Maximum takeoff weight minus empty weight."}, {"id": "o_c6_6", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "무게측정 시 Tare는 어떻게 처리하는가?", "qe": "How is tare handled during weighing?", "ak": "저울 위 받침·용기 무게이므로 측정값에서 빼야 합니다.", "ae": "It is the weight of chocks/blocks and must be subtracted."}, {"id": "o_c6_7", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "CG가 후방 한계를 넘으면 어떤 위험이 있는가?", "qe": "What is the risk of an aft CG beyond limits?", "ak": "종안정성이 나빠져 실속 회복이 위험해집니다.", "ae": "Longitudinal stability degrades, making stall recovery hazardous."}, {"id": "o_c6_8", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "장비 개조 후 정비사가 해야 할 일은?", "qe": "After an equipment alteration, what must the mechanic do?", "ak": "무게·평형 기록을 갱신하고 필요 시 재측정합니다.", "ae": "Update the weight-and-balance record and reweigh if needed."}, {"id": "o_c6_9", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "Avgas·Jet A·오일의 표준 무게를 말하라.", "qe": "State standard weights for avgas, Jet A, and oil.", "ak": "Avgas 6.0, Jet A 약 6.7, 윤활유 7.5 lb/gal입니다.", "ae": "Avgas 6.0, Jet A ~6.7, lubricating oil 7.5 lb/gal."}, {"id": "o_c6_10", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "기준선 앞 품목의 모멘트 부호는?", "qe": "What sign is the moment of an item forward of the datum?", "ak": "음(−)의 모멘트입니다.", "ae": "Negative."}, {"id": "o_c6_11", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "%MAC 계산식을 말하라.", "qe": "State the %MAC formula.", "ak": "(CG−LEMAC)÷MAC×100 입니다.", "ae": "(CG − LEMAC) ÷ MAC × 100."}, {"id": "o_c6_12", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "수평 확인 수단은 어디에 명시되는가?", "qe": "Where is the leveling means specified?", "ak": "형식증명자료집(TCDS)입니다.", "ae": "In the TCDS."}, {"id": "o_c6_13", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "현재 자중과 CG 기록은 어디에 보관하는가?", "qe": "Where must the current empty weight and CG be recorded?", "ak": "비행교범 또는 §23.1583이 요구하는 무게·평형 기록.", "ae": "In the flight manual or the weight-and-balance records required by §23.1583."}, {"id": "o_c6_14", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "무게·평형 계산의 기준선(datum)이란?", "qe": "What is meant by the datum used for W&B?", "ak": "제작사가 정한 기준점으로 모든 세로 위치를 여기서 잰다.", "ae": "A reference chosen by the manufacturer from which all longitudinal locations are measured."}, {"id": "o_c6_15", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "모든 품목 거리를 datum에서 재는 이유는?", "qe": "Why are all distances measured from the datum?", "ak": "항공기가 균형을 이루는 점(CG)을 찾기 위해.", "ae": "To find the point about which the aircraft would balance (the CG)."}, {"id": "o_c6_16", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "무게·평형 관리가 중요한 두 이유는?", "qe": "What are two reasons W&B control is important?", "ak": "비행 안전과 최대 효율 성능.", "ae": "For safety of flight and for efficient performance."}, {"id": "o_c6_17", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "모멘트(moment)란?", "qe": "What is meant by moment in W&B?", "ak": "회전시키려는 힘. 무게(lb) × datum까지 거리(in).", "ae": "A force that tends to cause rotation; weight × arm."}, {"id": "o_c6_18", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "품목의 모멘트는 어떻게 구하는가?", "qe": "How do you find the moment of an item?", "ak": "무게에 datum까지 거리를 곱함.", "ae": "Multiply the weight by its distance from the datum."}, {"id": "o_c6_19", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "품목의 아암(arm)이란?", "qe": "What is meant by the arm of an item?", "ak": "품목의 CG와 datum 사이 인치 거리.", "ae": "The distance in inches between the item's CG and the datum."}, {"id": "o_c6_20", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "무게·평형 계산 시 인가 카테고리를 고려하는 이유는?", "qe": "Why consider the category under which an aircraft is licensed?", "ak": "카테고리마다 최대 총중량과 CG 범위가 다르기 때문.", "ae": "Different categories have different maximum gross weights and CG ranges."}, {"id": "o_c6_21", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "특정 기체의 수평(leveling) 방법은 어디서 찾는가?", "qe": "Where can you find the leveling means?", "ak": "해당 기체의 TCDS.", "ae": "In the Type Certificate Data Sheets."}, {"id": "o_c6_22", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "연료가 든 채 측정했을 때 자중은 어떻게 구하는가?", "qe": "How do you find empty weight if weighed with fuel?", "ak": "연료의 무게와 모멘트를 빼준다.", "ae": "Subtract the weight and moment of the fuel."}, {"id": "o_c6_23", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "타르(tare) 무게란?", "qe": "What is meant by tare weight?", "ak": "저울 위에서 기체를 고정하는 촉·기구 등의 무게.", "ae": "The weight of the chocks and other items holding the aircraft on the scales."}, {"id": "o_c6_24", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "타르 무게는 어떻게 처리하는가?", "qe": "What must be done to the tare weight?", "ak": "저울 값에서 빼준다.", "ae": "It is subtracted from the scale reading."}, {"id": "o_c6_25", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "최소 연료(minimum fuel)란?", "qe": "What is meant by minimum fuel?", "ak": "최대연속출력으로 30분 운전에 필요한 연료량.", "ae": "Fuel for one-half hour of operation at rated maximum continuous power."}, {"id": "o_c6_26", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "최대 무연료중량(max zero fuel weight)이란?", "qe": "What is meant by maximum zero fuel weight?", "ak": "연료를 뺀 적재 항공기의 최대 허용 중량.", "ae": "The maximum permissible weight of a loaded aircraft, less its fuel."}, {"id": "o_c6_27", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "배출 불가 연료(undrainable fuel)란?", "qe": "What is meant by undrainable fuel?", "ak": "배유 후 탱크·라인에 남는 연료. 잔류연료(residual).", "ae": "Fuel left in the tank and lines after draining; residual fuel."}, {"id": "o_c6_28", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "무게·평형 기록이 없을 때 자중·CG는 어떻게 구하는가?", "qe": "How do you find empty weight and CG with no records?", "ak": "항공기를 실제로 측정(weigh)한다.", "ae": "The aircraft is weighed."}, {"id": "o_c6_29", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "영구 밸러스트(permanent ballast)란?", "qe": "What is meant by permanent ballast?", "ak": "자중 CG를 한계 안으로 옮기려 영구 설치하는 무게.", "ae": "Weight permanently installed to bring the EWCG into limits."}, {"id": "o_c6_30", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "비행기와 헬리콥터 중 CG 범위가 더 좁은(민감한) 것은?", "qe": "Which has the more critical CG range, an airplane or a helicopter?", "ak": "헬리콥터.", "ae": "A helicopter."}, {"id": "o_c6_31", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "측정 시 장착돼 있어야 할 장비는?", "qe": "What equipment must be installed when weighing?", "ak": "장비목록의 필수 장비 및 영구 설치 장비 전부.", "ae": "All required and permanently installed equipment."}, {"id": "o_c6_32", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "자중 CG 범위(EWCG range)의 의미는?", "qe": "What is the significance of the EWCG range?", "ak": "EWCG가 이 범위에 있으면 적재 CG가 한계를 벗어나게 실을 수 없음.", "ae": "If the EWCG is within range, the aircraft cannot be loaded outside its CG limits."}, {"id": "o_c6_33", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "일부 기체에 EWCG 범위가 TCDS에 없는 이유는?", "qe": "Why is the EWCG range not given for some aircraft?", "ak": "적재 CG가 한계를 벗어날 수 있는 기체에만 주어지기 때문.", "ae": "It's given only for aircraft that could be loaded outside their limits."}, {"id": "o_c6_34", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "무게·평형 시스템의 똑같이 중요한 세 요소는?", "qe": "The weight-and-balance system consists of what three equally important elements?", "ak": "항공기 측정, 기록 유지, 올바른 적재.", "ae": "Weighing the aircraft, maintaining the records, and proper loading."}, {"id": "o_c7_1", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "2024-T3에서 'T3'는 무엇을 뜻하는가?", "qe": "In 2024-T3, what does 'T3' mean?", "ak": "열처리·가공 상태를 나타내는 템퍼(Temper) 표시입니다.", "ae": "It is the temper designation for heat-treatment/work condition."}, {"id": "o_c7_2", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "Alclad(클래딩)의 목적은?", "qe": "What is the purpose of Alclad?", "ak": "합금 표면에 순알루미늄을 입혀 부식을 방지합니다.", "ae": "Pure aluminum on an alloy surface resists corrosion."}, {"id": "o_c7_3", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "볼트 길이 선정 기준은?", "qe": "How is bolt length selected?", "ak": "너트 밖으로 나사산 1~3개가 보이고, 그립이 전단면을 지나지 않아야 합니다.", "ae": "1–3 threads show past the nut and the grip stays out of the shear plane."}, {"id": "o_c7_4", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "고온·배기부에 쓰는 너트는?", "qe": "Which nut is used near heat/exhaust?", "ak": "섬유 인서트가 아닌 전금속(All-metal) 자동잠금너트입니다.", "ae": "All-metal self-locking nuts (not fiber-insert)."}, {"id": "o_c7_5", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "안전결선은 어떤 방향으로 감는가?", "qe": "Which direction is safety wire installed?", "ak": "부품을 조이는 방향(풀림 방지)으로 감습니다.", "ae": "In the tightening (anti-loosening) direction."}, {"id": "o_c7_6", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "표면 균열 검출에 쓰는 NDI는?", "qe": "Which NDI finds surface cracks?", "ak": "침투탐상(Dye Penetrant), 강자성체는 자분탐상도 가능합니다.", "ae": "Dye penetrant; magnetic particle for ferromagnetic parts."}, {"id": "o_c7_7", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "강자성체가 아닌 알루미늄에 자분탐상을 쓸 수 있는가?", "qe": "Can magnetic particle be used on aluminum?", "ak": "안 됩니다. 자분탐상은 강자성체에만 적용됩니다.", "ae": "No; magnetic particle applies only to ferromagnetic materials."}, {"id": "o_c7_8", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "이종금속 접촉 시 부식 대책은?", "qe": "How do you prevent corrosion at dissimilar-metal contact?", "ak": "절연·표면처리(프라이머·실런트)로 전기화학적 접촉을 차단합니다.", "ae": "Insulate/treat the surfaces (primer/sealant) to break the galvanic contact."}, {"id": "o_c7_9", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "AN 볼트 번호와 지름의 관계는?", "qe": "How does an AN bolt number relate to diameter?", "ak": "번호가 지름의 1/16인치 값입니다 (AN4=4/16=1/4\").", "ae": "The number is the diameter in sixteenths (AN4 = 1/4 inch)."}, {"id": "o_c7_10", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "자동잠금너트 재사용 판정법은?", "qe": "How do you judge a self-locking nut for reuse?", "ak": "손으로 완전히 돌아가면 잠금 토크 상실로 폐기합니다.", "ae": "If it runs down by hand, locking torque is gone — discard."}, {"id": "o_c7_11", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "7×19 케이블의 특징은?", "qe": "What characterizes 7×19 cable?", "ak": "가장 유연해 풀리를 지나는 주 조종 케이블에 씁니다.", "ae": "Most flexible; used for primary controls over pulleys."}, {"id": "o_c7_12", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "규정 없는 나사 윤활이 위험한 이유는?", "qe": "Why is unauthorized thread lubrication dangerous?", "ak": "마찰이 줄어 같은 토크값에서 과체결(과인장)이 됩니다.", "ae": "Reduced friction causes overtension at the same torque."}, {"id": "o_c7_13", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "알루미늄 주물·단조품 표면 균열을 찾는 비파괴검사는?", "qe": "What NDI locates surface cracks in an aluminum casting or forging?", "ak": "지글로(형광침투) 또는 염색침투탐상.", "ae": "Zyglo or dye penetrant."}, {"id": "o_c7_14", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "염색침투탐상 절차는?", "qe": "Explain the dye penetrant inspection procedure.", "ak": "깨끗이 세척→침투제 도포·체류→표면 침투제 제거→현상제 도포.", "ae": "Clean, apply penetrant and dwell, remove surface penetrant, apply developer."}, {"id": "o_c7_15", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "자분탐상 절차는?", "qe": "Explain the magnetic particle inspection procedure.", "ak": "세척→자화→지시매체 도포→흑색광 검사→탈자.", "ae": "Clean, magnetize, flow indicating medium, inspect under black light, demagnetize."}, {"id": "o_c7_16", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "비철금속 입계부식 점검에 가장 적합한 검사는?", "qe": "What inspection is best for a nonferrous part for intergranular corrosion?", "ak": "와전류 검사.", "ae": "Eddy current inspection."}, {"id": "o_c7_17", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "날개 내부 구조의 부식을 확인하는 검사는?", "qe": "What inspection checks an internal wing structure for corrosion?", "ak": "X-선(방사선) 검사.", "ae": "X-ray inspection."}, {"id": "o_c7_18", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "자분탐상 후 엔진 부품을 반드시 탈자하는 이유는?", "qe": "Why must engine parts be demagnetized after magnetic particle inspection?", "ak": "자화된 채면 마모로 생긴 철분을 끌어당겨 베어링 면을 손상.", "ae": "Otherwise they attract steel particles that damage bearing surfaces."}, {"id": "o_c7_19", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "침투탐상 전 부품을 깨끗이 하는 이유는?", "qe": "Why clean parts before dye penetrant inspection?", "ak": "기름·먼지가 결함 속으로 침투제가 스며드는 것을 막기 때문.", "ae": "Grease or dirt keeps the penetrant from seeping into the fault."}, {"id": "o_c7_20", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "열처리 후 알루미늄을 즉시 담금질(quench)하는 이유는?", "qe": "Why quench aluminum immediately after heat treating?", "ak": "지연되면 결정립이 성장해 입계부식이 생기기 쉬움.", "ae": "Delay allows grain growth, making intergranular corrosion likely."}, {"id": "o_c7_21", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "용접 후 강을 불림(normalize)하는 방법은?", "qe": "How is a steel structure normalized after welding?", "ak": "임계온도 이상으로 가열 후 공기 중에서 서서히 냉각.", "ae": "Heat above critical temperature, then cool in still air."}, {"id": "o_c7_22", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "강을 경화 후 뜨임(temper)하는 이유는?", "qe": "Why is steel tempered after hardening?", "ak": "경화로 생긴 취성을 일부 제거하기 위해.", "ae": "Hardening makes steel brittle; tempering removes some brittleness."}, {"id": "o_c7_23", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "아이스박스 리벳(icebox rivet)이란?", "qe": "What is meant by an icebox rivet?", "ak": "2017/2024 합금 리벳. 열처리·담금질 후 냉동 보관해 경화를 지연.", "ae": "A 2017 or 2024 rivet, heat-treated and quenched, stored subfreezing to delay hardening."}, {"id": "o_c7_24", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "셀프로킹 너트에 피해야 할 하중은?", "qe": "What loading should be avoided with a self-locking nut?", "ak": "회전력(rotational force)이 걸리는 곳.", "ae": "Any application with rotational forces on the nut or bolt."}, {"id": "o_c7_25", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "볼트의 올바른 그립 길이는 무엇으로 정하는가?", "qe": "What determines the correct grip length of a bolt?", "ak": "체결되는 재료 두께의 합과 같아야 함.", "ae": "The combined thickness of the materials being bolted."}, {"id": "o_c7_26", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "조종면 혼의 클레비스 볼트 너트는 얼마나 조이나?", "qe": "How tight is the nut on a clevis bolt at a control surface horn?", "ak": "클레비스 볼트가 케이블 피팅·혼 안에서 돌 수 있을 만큼(과조임 금지).", "ae": "Not tight enough to prevent the clevis bolt from turning in the fitting and horn."}, {"id": "o_c7_27", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "클래드(clad) 알루미늄 표면을 긁으면 안 되는 이유는?", "qe": "Why must clad aluminum not be scratched?", "ak": "표면의 순알루미늄은 내식성이나, 긁혀 아래 합금이 노출되면 부식.", "ae": "The pure aluminum cladding is corrosion-resistant; scratching exposes the corrosive alloy."}, {"id": "o_c7_28", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "강 가스용접 시 팁 크기는 무엇으로 정하나?", "qe": "What determines the tip size for gas welding steel?", "ak": "용접 재료의 두께.", "ae": "The thickness of the material being welded."}, {"id": "o_c7_29", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "가스용접한 알루미늄의 용접 플럭스 제거법은?", "qe": "How is welding flux removed from gas-welded aluminum?", "ak": "뜨거운 물과 강모 브러시로 문질러 제거.", "ae": "Scrub with hot water and a bristle brush."}, {"id": "o_c7_30", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "재용접해야 할 용접부는 어떻게 처리하나?", "qe": "What must be done to a welded joint that must be rewelded?", "ak": "기존 용접을 모두 제거해 새 용접이 모재에 침투하게 함.", "ae": "Remove all traces of the old weld."}, {"id": "o_c7_31", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "크랭크축 런아웃을 재는 계기는?", "qe": "What instrument measures crankshaft runout?", "ak": "다이얼 인디케이터.", "ae": "A dial indicator."}, {"id": "o_c7_32", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "로커암 축과 부싱의 끼워맞춤은 무엇으로 재나?", "qe": "How is the fit between a rocker arm shaft and bushing measured?", "ak": "축은 마이크로미터, 부싱 내경은 텔레스코핑 게이지+마이크로미터.", "ae": "Micrometer for the shaft; telescoping gauge and micrometer for the bushing."}, {"id": "o_c7_33", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "1차 조종계통에 허용되는 최소 케이블 굵기는?", "qe": "What is the smallest cable allowed in a primary control system?", "ak": "1/8인치.", "ae": "1/8-inch diameter."}, {"id": "o_c7_34", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "풀리로 방향을 바꿀 때 쓰는 케이블 종류는?", "qe": "What control cable is used where pulleys change cable direction?", "ak": "엑스트라플렉시블 케이블(7×19).", "ae": "Extra-flexible cable (7 × 19)."}, {"id": "o_c7_35", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "알루미늄 합금의 용체화 열처리(solution heat treat)란?", "qe": "Explain solution heat treatment of aluminum alloy.", "ak": "오븐에서 규정 온도로 가열 후 물에 담금질.", "ae": "Heat in an oven to the proper temperature, then quench in water."}, {"id": "o_c7_36", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "석출(precipitation) 열처리란?", "qe": "What is meant by precipitation heat treatment?", "ak": "용체화 후 일정 온도에서 시간 유지. 인공시효(artificial aging).", "ae": "Holding at an elevated temperature for a time; artificial aging."}, {"id": "o_c7_37", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "필리폼(filiform) 부식은 어떻게 나타나는가?", "qe": "How does filiform corrosion usually appear?", "ak": "도장막 아래 실 모양의 부풀어 오른 선.", "ae": "Thread-like lines of puffiness under the finish."}, {"id": "o_c7_38", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "전선·튜브 재료에 필수인 성질은?", "qe": "What property is essential for metals used in wire and tubing?", "ak": "연성(ductility).", "ae": "Ductility."}, {"id": "o_c8_1", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "부식이 성립하는 데 필요한 네 요소는?", "qe": "What four elements are needed for corrosion?", "ak": "양극·음극·전해질·전기 경로입니다.", "ae": "An anode, a cathode, an electrolyte, and an electrical path."}, {"id": "o_c8_2", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "결정 경계를 따라 진행되는 부식은?", "qe": "Which corrosion follows grain boundaries?", "ak": "입계부식(Intergranular)이며 심하면 박리(Exfoliation)로 이어집니다.", "ae": "Intergranular corrosion, which can lead to exfoliation."}, {"id": "o_c8_3", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "알루미늄 부식생성물의 색은?", "qe": "What color are aluminum corrosion products?", "ak": "흰색 가루 형태입니다.", "ae": "A white powder."}, {"id": "o_c8_4", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "알루미늄에 강철 브러시를 쓰면 안 되는 이유는?", "qe": "Why not use a steel brush on aluminum?", "ak": "이종금속 오염으로 갈바닉 부식을 유발하기 때문입니다.", "ae": "It causes dissimilar-metal (galvanic) contamination and corrosion."}, {"id": "o_c8_5", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "부식 제거 후 표면처리로 무엇을 하는가?", "qe": "What surface treatment follows corrosion removal?", "ak": "전환코팅(알로다인/크로메이트) 후 프라이머·도장으로 마감합니다.", "ae": "A conversion coating (Alodine/chromate), then primer and paint."}, {"id": "o_c8_6", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "부식 취약 부위 세 곳을 들라.", "qe": "Name three corrosion-prone areas.", "ak": "배터리실, 랜딩기어 웰, 배수가 안 되는 저부(Bilge) 등입니다.", "ae": "Battery compartment, wheel wells, and poorly drained bilge areas."}, {"id": "o_c8_7", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "연료탱크에서 생기는 부식 종류는?", "qe": "What corrosion type occurs in fuel tanks?", "ak": "미생물(Microbial) 부식입니다.", "ae": "Microbial corrosion."}, {"id": "o_c8_8", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "세척제 선정의 기본 원칙은?", "qe": "What is the basic rule for choosing cleaners?", "ak": "재료·표면처리와 호환되는 승인 제품만 사용하는 것입니다.", "ae": "Use only approved cleaners compatible with the material and finish."}, {"id": "o_c8_9", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "필리폼 부식의 특징과 발생 위치는?", "qe": "Describe filiform corrosion and where it occurs.", "ak": "페인트 도막 아래 실처럼 퍼지는 부식으로, 도막 손상부에서 시작합니다.", "ae": "Thread-like corrosion under paint films, starting at coating breaks."}, {"id": "o_c8_10", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "응력부식균열의 3요소는?", "qe": "What three factors cause stress corrosion cracking?", "ak": "감수성 재료, 지속 인장응력, 부식 환경입니다.", "ae": "Susceptible material, sustained tensile stress, corrosive environment."}, {"id": "o_c8_11", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "부식 제거 한계 판정 근거는?", "qe": "What governs corrosion removal limits?", "ak": "제작사 SRM 등 승인 자료의 허용 한계입니다.", "ae": "Approved data such as the manufacturer's SRM."}, {"id": "o_c8_12", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "CPC란 무엇인가?", "qe": "What is a CPC?", "ak": "부식 예방 화합물 — 침투·발수 피막으로 습기를 차단합니다.", "ae": "Corrosion preventive compound — penetrates and displaces moisture."}, {"id": "o_c8_13", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "항공기에서 부식이 가장 잘 생기는 부위는?", "qe": "Identify the areas most prone to corrosion.", "ak": "배터리실·배기계통·휠웰·기체 하부(빌지)·피아노힌지·이종금속 접촉부·용접부·연료탱크 내부·화장실·급식구역.", "ae": "Battery compartment, exhaust, wheel wells, bilge, piano hinges, dissimilar-metal contacts, welds, fuel tanks, lavatories, galley areas."}, {"id": "o_c8_14", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "필리폼 부식이 가장 잘 생기는 곳은?", "qe": "Where is filiform corrosion most likely to occur?", "ak": "폴리우레탄 같은 두꺼운 도장막 아래(부적절 경화 프라이머 원인).", "ae": "Under a dense topcoat such as polyurethane, from improperly cured primer."}, {"id": "o_c8_15", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "프렛팅(fretting) 부식이 잘 생기는 곳은?", "qe": "Where is fretting corrosion most likely?", "ak": "두 부품 사이에 약간의 상대운동이 있고 잔사가 배출되지 못하는 곳.", "ae": "Where there is slight relative movement between components and no way for residue to escape."}, {"id": "o_c8_16", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "입계(intergranular) 부식이 잘 생기는 곳은?", "qe": "Where is intergranular corrosion most likely?", "ak": "부적절하게 열처리된 알루미늄 합금의 결정립계.", "ae": "Along the grain boundaries of improperly heat-treated aluminum."}, {"id": "o_c8_17", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "이종금속(dissimilar metal) 부식이 잘 생기는 곳은?", "qe": "Where is dissimilar metal corrosion most likely?", "ak": "서로 다른 금속이 접촉하고 수분이 있는 곳.", "ae": "Where different metals contact, especially with moisture."}, {"id": "o_c8_18", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "응력(stress) 부식이 잘 생기는 곳은?", "qe": "Where is stress corrosion most likely?", "ak": "지속적 인장응력을 받는 부품(부싱 압입 구멍 주변 등).", "ae": "In a component under continual tensile stress, e.g., around pressed-in bushings."}, {"id": "o_c8_19", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "알루미늄 표면부식 제거·처리 방법은?", "qe": "How do you remove and treat surface corrosion on aluminum?", "ak": "강모 브러시로 제거→크롬산/전환코팅으로 중화→도장 보호.", "ae": "Remove with a bristle brush, neutralize with chromic acid or a conversion coating, then paint."}, {"id": "o_c8_20", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "구조용 알루미늄에 부식이 생기지 않게 하는 것은?", "qe": "What keeps corrosion from forming on structural aluminum?", "ak": "산화피막 또는 알루미늄 클래딩.", "ae": "An oxide coating or aluminum cladding."}, {"id": "o_c8_21", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "고응력 부품의 녹(rust) 제거법은?", "qe": "How may rust be removed from a highly stressed part?", "ak": "글래스비드 블라스팅, 부드러운 연마지 연마, 버핑 컴파운드.", "ae": "Glass-bead blasting, careful polishing, or buffing compound."}, {"id": "o_c8_22", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "피아노힌지의 부식을 최소화하는 방법은?", "qe": "How should corrosion be minimized at piano hinges?", "ak": "청결·건조 유지 후 저점도 수분방지제로 윤활.", "ae": "Keep clean and dry, lubricate with a low-viscosity moisture-dispersing agent."}, {"id": "o_c8_23", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "알루미늄 부식 제거에 적합한 공구는?", "qe": "What tools are proper for removing corrosion from aluminum?", "ak": "알루미늄 울/알루미늄 와이어 브러시, 심하면 로터리 파일.", "ae": "Aluminum wool or aluminum wire brushes; a rotary file for severe corrosion."}, {"id": "o_c8_24", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "투명 플라스틱 풍방·창문 세척은?", "qe": "What is used to clean transparent plastic windshields?", "ak": "순한 비누와 깨끗한 물.", "ae": "Mild soap and plenty of clean water."}, {"id": "o_c8_25", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "항공기 구조에 쏟아진 납축전지 전해질 중화제는?", "qe": "What neutralizes lead-acid electrolyte spilled on structure?", "ak": "탄산수소나트륨 용액.", "ae": "A solution of bicarbonate of soda and water."}, {"id": "o_c8_26", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "쏟아진 니카드 전해질의 중화제는?", "qe": "What neutralizes spilled Ni-Cad electrolyte?", "ak": "붕산 용액 또는 식초.", "ae": "A solution of boric acid and water, or vinegar."}, {"id": "o_c8_27", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "도프 전 천의 기름 제거 용제는?", "qe": "What solvent removes grease from fabric before doping?", "ak": "MEK(메틸에틸케톤) 또는 래커 시너.", "ae": "Methyl ethyl ketone (MEK) or lacquer thinner."}, {"id": "o_c8_28", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "알루미늄 부품의 양극산화 표면을 보수하는 것은?", "qe": "What repairs an anodized aluminum surface?", "ak": "알로다인(Bonderite) 같은 화학전환피막.", "ae": "A chemical conversion coating such as Alodine (Bonderite)."}, {"id": "o_c8_29", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "마그네슘 합금의 표면부식 제거 도구는?", "qe": "What removes surface corrosion from magnesium alloy?", "ak": "뻣뻣한 돈모(hog-bristle) 브러시.", "ae": "A stiff hog-bristle brush."}, {"id": "o_c8_30", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "구조용 강관 내부 부식 방지법은?", "qe": "How is the inside of structural steel tubing protected?", "ak": "뜨거운 아마인유(linseed oil)를 채웠다 빼낸다.", "ae": "Filled with hot linseed oil, then drained."}, {"id": "o_c8_31", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "천을 씌우기 전 일부 구조를 도프프루핑하는 이유는?", "qe": "Why are portions of structure dope-proofed before covering?", "ak": "도프가 구조에 천을 달라붙게 하지 않도록.", "ae": "To keep the fabric from sticking to the structure."}, {"id": "o_c8_32", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "면·리넨 천의 곰팡이 방지법은?", "qe": "How is cotton and linen fabric protected from mildew?", "ak": "첫 도프에 방미제(mildewcide)를 섞는다.", "ae": "A mildewcide is mixed into the first coat of dope."}, {"id": "o_c8_33", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "폴리에스터 합성 천은 어떻게 수축시키나?", "qe": "How is polyester synthetic fabric shrunk?", "ak": "다리미나 가열기로 열을 가한다.", "ae": "With heat from an iron or heated blower."}, {"id": "o_c8_34", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "나무 스파를 투명 바니시로 마감하는 이유는?", "qe": "Why are wooden spars finished with transparent varnish?", "ak": "목재의 부식·부패를 볼 수 있도록.", "ae": "So decay or rot in the wood can be detected."}, {"id": "o_c8_35", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "에나멜에 페인트 리무버를 바르면?", "qe": "What happens to enamel when paint remover is applied?", "ak": "연화·팽윤되어 표면에서 들뜬다.", "ae": "It softens and swells, pulling away from the surface."}, {"id": "o_c8_36", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "에폭시 도료 혼합 시 경화제와 수지 순서는?", "qe": "When mixing epoxy paint, is converter added to resin or vice versa?", "ak": "경화제를 수지에 넣는다(반대 금지).", "ae": "The converter is added to the resin, never resin to converter."}, {"id": "o_c8_37", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "평면 마감에 흘러내림(run/sag)이 생기는 일반 원인은?", "qe": "What is the general reason for runs and sags?", "ak": "도료를 너무 많이 뿌려 막이 두꺼움.", "ae": "Too much paint; the film is too thick."}, {"id": "o_c8_38", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "도프 표면의 블러싱(blushing)을 없애는 방법은?", "qe": "How to remedy blushing on a freshly sprayed doped surface?", "ak": "리타더+시너 혼합액을 얇게 미스트 도포 후 건조.", "ae": "Spray a light mist of retarder and thinner, then let dry."}, {"id": "o_c8_39", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "마른 도프가 있는 도장실 바닥 청소 시 안전조치는?", "qe": "What safety precaution when sweeping a room with dried dope?", "ak": "바닥을 물로 적신 뒤 쓴다(건식 청소의 정전기→화재 위험).", "ae": "Wet the floor first; dry sweeping can cause a static-electricity fire."}, {"id": "o_c8_40", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "에나멜 위에 도프를 뿌리면?", "qe": "What happens if dope is sprayed over an enameled surface?", "ak": "도프의 시너가 에나멜을 침투해 팽윤시킨다.", "ae": "The thinner penetrates the enamel and causes it to swell."}, {"id": "o_c8_41", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "항공기 도장에 쓰는 프라이머 세 종류는?", "qe": "What are three types of primer used when painting?", "ak": "징크크로메이트, 워시 프라이머, 에폭시 프라이머.", "ae": "Zinc chromate, wash primer, and epoxy primer."}, {"id": "o_c8_42", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "보수 중 유리섬유 부품의 마감 제거법은?", "qe": "How is finish removed from a fiberglass component being repaired?", "ak": "연마로 제거(페인트 리무버는 수지를 연화시킴).", "ae": "Sand it off; paint remover softens the resin."}, {"id": "o_c8_43", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "천 씌운 항공기에 쓰는 도프 두 종류는?", "qe": "What are the two basic types of dope for fabric-covered aircraft?", "ak": "질산(nitrate) 도프와 부티레이트(CAB) 도프.", "ae": "Nitrate dope and butyrate (CAB) dope."}, {"id": "o_c8_44", "ch": 8, "chko": "세척과 부식방지", "file": "ch08_corrosion_control.html", "qk": "열수축한 폴리에스터 합성 천에 쓰는 도프는?", "qe": "What dope is used on heat-shrunk polyester synthetic fabric?", "ak": "비긴장(nontautening) 부티레이트 도프.", "ae": "Nontautening butyrate dope."}, {"id": "o_c9_1", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "강체 튜브와 호스는 각각 어디에 쓰는가?", "qe": "Where are rigid tube vs. flexible hose used?", "ak": "튜브는 상대운동이 없는 곳, 호스는 진동·상대운동·엔진 연결부에 씁니다.", "ae": "Tube where there's no relative motion; hose at vibration/relative-motion and engine connections."}, {"id": "o_c9_2", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "튜브 크기와 호스 크기는 각각 무엇으로 표기하는가?", "qe": "How are tube and hose sizes specified?", "ak": "튜브는 외경(OD), 호스는 내경(ID) 대시 번호로 표기합니다.", "ae": "Tube by outside diameter; hose by inside-diameter dash number."}, {"id": "o_c9_3", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "항공용 표준 플레어 각도는?", "qe": "What is the standard aviation flare angle?", "ak": "37°(AN)입니다. 자동차용 45°와 다릅니다.", "ae": "37° (AN), unlike the automotive 45°."}, {"id": "o_c9_4", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "호스의 '레이라인'은 무엇을 알려주는가?", "qe": "What does a hose 'lay line' tell you?", "ak": "설치 시 호스가 비틀렸는지(Torque)를 알려줍니다.", "ae": "Whether the hose is twisted during installation."}, {"id": "o_c9_5", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "산소 라인 취급 시 절대 금지 사항은?", "qe": "What is forbidden when handling oxygen lines?", "ak": "유분(오일·그리스) 오염입니다. 발화 위험이 있습니다.", "ae": "Oil/grease contamination — it is a fire hazard."}, {"id": "o_c9_6", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "플레어리스 피팅의 밀봉 원리는?", "qe": "How does a flareless fitting seal?", "ak": "슬리브가 튜브 표면에 파고들어 밀봉합니다.", "ae": "A sleeve bites into the tube surface to seal."}, {"id": "o_c9_7", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "호스 설치 시 길이 여유를 주는 이유는?", "qe": "Why leave slack when installing a hose?", "ak": "압력·온도에 따른 수축·팽창을 흡수하기 위해서입니다.", "ae": "To absorb expansion/contraction from pressure and temperature."}, {"id": "o_c9_8", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "손상된 강체 튜브의 원칙적 처리는?", "qe": "What is the general rule for a damaged rigid tube?", "ak": "수리보다 교환이 원칙입니다.", "ae": "Replacement rather than repair."}, {"id": "o_c9_9", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "튜브 굽힘 검사 항목을 말하라.", "qe": "What do you inspect on a tube bend?", "ak": "균열·주름·과도한 편평(지름의 25% 이내) 여부입니다.", "ae": "Cracks, wrinkles, flattening within 25 percent of diameter."}, {"id": "o_c9_10", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "호스 교환 시기를 판단하는 표시는?", "qe": "What marking governs hose replacement time?", "ak": "제조일자(큐어 데이트)와 계통 규정 수명입니다.", "ae": "The cure date and the system's service life."}, {"id": "o_c9_11", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "고압 라인 분리 전 안전 조치는?", "qe": "Safety step before opening a high-pressure line?", "ak": "계통 잔압을 완전히 제거합니다.", "ae": "Relieve all trapped system pressure."}, {"id": "o_c9_12", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "배관과 전기배선의 상하 배치 원칙은?", "qe": "How are fluid lines routed relative to wiring?", "ak": "누설이 배선에 떨어지지 않도록 배관을 배선 아래로 배치합니다.", "ae": "Fluid lines below wiring so leaks cannot drip onto wires."}, {"id": "o_c9_13", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "대부분 저압 강성 유체라인의 재질은?", "qe": "Of what material are most low-pressure rigid fluid lines made?", "ak": "1100-1/2 경질 또는 3003-1/2 경질 알루미늄.", "ae": "1100-1/2 hard or 3003-1/2 hard aluminum alloy."}, {"id": "o_c9_14", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "강성 유체라인 크기는 내경·외경 중 무엇으로 정하나?", "qe": "Is a rigid fluid line sized by inside or outside diameter?", "ak": "외경(OD).", "ae": "By its outside diameter."}, {"id": "o_c9_15", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "유체라인을 전선다발과 나란히 놓을 때 위는?", "qe": "Routing a fluid line parallel to a wire bundle—which is on top?", "ak": "전선다발이 위에.", "ae": "The electrical wire bundle should be on top."}, {"id": "o_c9_16", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "가요성 호스의 레이라인(식별줄) 기능은?", "qe": "What is the function of the lay line on a flexible hose?", "ak": "설치 시 호스가 비틀렸는지 표시. 곧아야 함.", "ae": "It shows whether the hose was twisted; it should be straight."}, {"id": "o_c9_17", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "AN 피팅과 AC 피팅을 어떻게 구분하나?", "qe": "How do you distinguish an AN fluid fitting from an AC fitting?", "ak": "AN은 플레어콘 끝과 첫 나사산 사이에 숄더가 있음.", "ae": "The AN fitting has a shoulder between the flare cone and the first thread."}, {"id": "o_c9_18", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "퀵디스커넥트 커플링은 보통 어디에 쓰나?", "qe": "Where are quick-disconnect couplings normally used?", "ak": "엔진구동 펌프가 유압계통에 연결되는 곳.", "ae": "Where the engine-driven pump connects into the hydraulic system."}, {"id": "o_c9_19", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "가요성 호스 크기는 내경·외경 중 무엇으로 정하나?", "qe": "Is a flexible hose sized by inside or outside diameter?", "ak": "내경(ID).", "ae": "By its inside diameter."}, {"id": "o_c9_20", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "가요성 호스 설치 시 최소 여유(slack)는?", "qe": "What minimum slack must a flexible hose have?", "ak": "피팅 간 거리보다 최소 5% 길게.", "ae": "At least 5% longer than the distance between fittings."}, {"id": "o_c9_21", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "MS 플레어리스 피팅은 얼마나 조이나?", "qe": "How tight should an MS flareless fitting be tightened?", "ak": "손으로 스눅 후 1/6~1/3바퀴. 절대 1/3바퀴 초과 금지.", "ae": "Hand snug, then 1/6 to 1/3 turn; never more than 1/3 turn."}, {"id": "o_c9_22", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "MS 플레어리스 피팅 과조임의 피해는?", "qe": "What damage from overtightening an MS flareless fitting?", "ak": "슬리브 절삭날이 튜브를 깊게 파고들어 약화시킴.", "ae": "The sleeve's cutting edge digs into the tube and weakens it."}, {"id": "o_c9_23", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "더블 플레어가 가능한 강성 튜브는?", "qe": "What rigid tubing can be double-flared?", "ak": "5052-O·6061-T 알루미늄, 1/8~3/8인치 OD.", "ae": "5052-O and 6061-T aluminum tubing, 1/8- to 3/8-inch OD."}, {"id": "o_c9_24", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "테플론 호스의 주요 장점은?", "qe": "What is the principal advantage of Teflon hose?", "ak": "고온에서도 높은 강도를 유지.", "ae": "It retains high strength at high temperature."}, {"id": "o_c9_25", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "알루미늄 튜브 플레어링 시 주의사항은?", "qe": "What precautions when flaring aluminum tubing?", "ak": "끝을 매끄럽게 다듬어 늘릴 때 균열이 생기지 않게.", "ae": "Polish the end so it won't crack when stretched."}, {"id": "o_c9_26", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "가요성 호스 조립품의 프루프 시험 압력은?", "qe": "How much pressure is used to proof test a flexible hose?", "ak": "보통 사용압력의 약 2배.", "ae": "Generally about twice the operating pressure."}, {"id": "o_c9_27", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "초기 항공에서 유체계통 튜브로 많이 쓴 재료는?", "qe": "What tubing material was used extensively in early aviation fluid applications?", "ak": "구리(copper).", "ae": "Copper was used."}, {"id": "o_c10_1", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "제트엔진 지상 운용의 두 위험 구역은?", "qe": "What are the two hazard zones around a running jet?", "ak": "전방 흡입구(Intake)와 후방 배기(Exhaust)입니다.", "ae": "The intake in front and the exhaust behind."}, {"id": "o_c10_2", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "견인 시 조종석에 반드시 있어야 할 사람은?", "qe": "Who must be in the cockpit during towing?", "ak": "브레이크를 조작할 수 있는 담당자입니다.", "ae": "A person able to operate the brakes."}, {"id": "o_c10_3", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "노즈기어 조향 한계를 넘기면 어떻게 되는가?", "qe": "What happens if nose-gear steering limits are exceeded?", "ak": "조향 기구·구조가 손상됩니다.", "ae": "The steering mechanism/structure is damaged."}, {"id": "o_c10_4", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "잭업은 어디에서만 해야 하는가?", "qe": "Where may jacking be performed?", "ak": "지정된 잭 포인트에서만, 안전잠금을 사용해 합니다.", "ae": "Only at designated jack points, using safety locks."}, {"id": "o_c10_5", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "급유 시 정전기 방지를 위해 무엇을 하는가?", "qe": "How is static prevented during fueling?", "ak": "항공기·급유차를 본딩·접지(Grounding)합니다.", "ae": "Bond and ground the aircraft and fuel truck."}, {"id": "o_c10_6", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "유류·전기 화재에 물을 쓰면 안 되는 이유는?", "qe": "Why not use water on fuel/electrical fires?", "ak": "유류는 확산되고 전기는 감전 위험이 있어 부적합합니다.", "ae": "Water spreads fuel fires and risks shock on electrical fires."}, {"id": "o_c10_7", "ch": 10, "chko": "지상 운용과 정비지원", "file": "ch10_ground_operation.html", "qk": "전기 화재에 적합한 소화기는?", "qe": "Which extinguisher suits an electrical fire?", "ak": "CO₂
