  d.className = 'chbox'; d.textContent = 'Ch.' + c.no + ' ' + c.ko + ' (' + c.n + ')';
  d.onclick = function(){ selCh[c.no] = !selCh[c.no]; d.classList.toggle('sel', !!selCh[c.no]); };
  chg.appendChild(d);
});
document.querySelectorAll('.mode').forEach(function(m){
  m.onclick = function(){
    document.querySelectorAll('.mode').forEach(function(x){x.classList.remove('sel');});
    m.classList.add('sel'); selN = parseInt(m.dataset.n);
  };
});

function getWrong(){ try{return JSON.parse(localStorage.getItem('gen_wrong')||'[]');}catch(e){return [];} }
function setWrong(a){ try{localStorage.setItem('gen_wrong', JSON.stringify(a));}catch(e){} }
(function(){
  var w = getWrong();
  if(w.length){ document.getElementById('wrongCard').style.display='';
    document.getElementById('wrongStat').textContent = '저장된 오답 ' + w.length + '문항 — 다시 풀어 완전히 익히세요.'; }
})();
function clearWrong(){ setWrong([]); location.reload(); }

function shuffle(a){ for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }

function startExam(){
  var pool = BANK.filter(function(q){
    var any = Object.keys(selCh).some(function(k){return selCh[k];});
    return !any || selCh[q.ch];
  });
  if(!pool.length){ alert('선택한 챕터에 문항이 없습니다.'); return; }
  examSet = shuffle(pool.slice()).slice(0, Math.min(selN, pool.length));
  begin();
}
function startWrong(){
  var ids = getWrong();
  var pool = BANK.filter(function(q){ return ids.indexOf(q.id) >= 0; });
  if(!pool.length){ alert('저장된 오답이 없습니다.'); return; }
  examSet = shuffle(pool.slice());
  document.getElementById('result').classList.add('hidden');
  begin();
}
function begin(){
  answers = {}; cur = 0;
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('exam').classList.remove('hidden');
  document.body.classList.toggle('eng-only', document.getElementById('engOnly').checked);
  if(document.getElementById('timerOn').checked){
    timeLeft = Math.round(examSet.length * 72);
    tick = setInterval(function(){
      timeLeft--;
      renderTimer();
      if(timeLeft <= 0){ clearInterval(tick); submitExam(); }
    }, 1000);
  } else { document.getElementById('timer').style.display='none'; }
  renderTimer(); renderDots(); renderQ();
  window.scrollTo(0,0);
}
function renderTimer(){
  if(!document.getElementById('timerOn').checked) return;
  var m = Math.floor(timeLeft/60), s = timeLeft%60;
  var el = document.getElementById('timer');
  el.textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  el.classList.toggle('low', timeLeft < 120);
}
function renderDots(){
  var d = document.getElementById('dots'); d.innerHTML='';
  examSet.forEach(function(q,i){
    var b = document.createElement('div');
    b.className = 'dot' + (answers[q.id]?' answered':'') + (i===cur?' cur':'');
    b.textContent = i+1;
    b.onclick = function(){ cur=i; renderQ(); renderDots(); };
    d.appendChild(b);
  });
}
function renderQ(){
  var q = examSet[cur];
  document.getElementById('prog').textContent = (cur+1) + ' / ' + examSet.length + '  ·  Ch.' + q.ch;
  var h = '<span class="qno-tag">Q' + (cur+1) + ' · CH.' + q.ch + '</span>'
    + '<div class="qtext ko-txt">' + q.qk + '</div>'
    + '<div class="qtext-en">' + q.qe + '</div><ul class="opts">';
  q.opts.forEach(function(o){
    h += '<li data-l="' + o.L + '"' + (answers[q.id]===o.L?' class="sel"':'') + ' onclick="pick(this)">'
      + '<span class="ko-opt">' + o.L + '. ' + o.ko + '</span><span class="en">' + o.L + '. ' + o.en + '</span></li>';
  });
  h += '</ul>';
  document.getElementById('qcard').innerHTML = h;
}
function pick(li){
  var q = examSet[cur];
  answers[q.id] = li.dataset.l;
  renderQ(); renderDots();
  if(cur < examSet.length-1){ setTimeout(function(){ cur++; renderQ(); renderDots(); window.scrollTo(0,0); }, 220); }
}
function move(d){ cur = Math.max(0, Math.min(examSet.length-1, cur+d)); renderQ(); renderDots(); }

function submitExam(){
  if(tick) clearInterval(tick);
  var unanswered = examSet.filter(function(q){return !answers[q.id];}).length;
  if(unanswered && timeLeft > 0){
    if(!confirm('미응답 ' + unanswered + '문항이 있습니다. 채점할까요?')) return;
  }
  var right = 0, wrongIds = getWrong();
  examSet.forEach(function(q){
    if(answers[q.id] === q.ans){ right++;
      var idx = wrongIds.indexOf(q.id); if(idx>=0) wrongIds.splice(idx,1);
    } else { if(wrongIds.indexOf(q.id) < 0) wrongIds.push(q.id); }
  });
  setWrong(wrongIds);
  var pct = Math.round(right/examSet.length*100);
  var pass = pct >= 70;
  document.getElementById('exam').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('scoreBig').textContent = pct + '%';
  document.getElementById('scoreBig').className = 'score-big ' + (pass?'pass':'fail');
  document.getElementById('passTxt').textContent = pass ? '🎉 합격 (PASS) — 합격선 70%' : '불합격 (FAIL) — 합격선 70%';
  document.getElementById('passTxt').style.color = pass ? 'var(--green)' : 'var(--red)';
  document.getElementById('scoreDetail').textContent = '정답 ' + right + ' / ' + examSet.length + '문항 · 오답노트에 ' + getWrong().length + '문항 저장됨';
  var rv = document.getElementById('review'); rv.innerHTML='';
  examSet.forEach(function(q,i){
    var ok = answers[q.id] === q.ans;
    var your = answers[q.id] || '무응답';
    var ansTxt = ''; q.opts.forEach(function(o){ if(o.L===q.ans) ansTxt = o.ko; });
    var d = document.createElement('div');
    d.className = 'rv ' + (ok?'right':'wrong');
    d.innerHTML = '<div class="q">' + (ok?'✅':'❌') + ' Q' + (i+1) + '. ' + q.qk + '</div>'
      + '<div class="meta">내 답: ' + your + ' · 정답: ' + q.ans + ' (' + ansTxt + ') · Ch.' + q.ch + ' ' + q.chko + '</div>'
      + '<div class="exp">' + q.expk + '</div>'
      + '<a href="' + q.file + '">→ Ch.' + q.ch + ' 교재 보기</a>';
    rv.appendChild(d);
  });
  window.scrollTo(0,0);
}
</script>
</body>
</html>
