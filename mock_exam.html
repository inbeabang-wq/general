<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F172A">
<title>FAA General 필기 모의고사 — Exam Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F172A;--panel:#13203b;--panel2:#1a2a4a;--cyan:#60A5FA;--gold:#FBBF24;--green:#34D399;--red:#F87171;
--t1:#F1F5F9;--t2:#CBD5E1;--t3:#7c8db0;--line:rgba(96,165,250,.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t1);font-family:'Noto Sans KR',sans-serif;line-height:1.6;
background-image:linear-gradient(rgba(96,165,250,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(96,165,250,.04) 1px,transparent 1px);background-size:44px 44px;}
a{color:inherit;text-decoration:none;}
.wrap{max-width:860px;margin:0 auto;padding:40px 20px 90px;}
.kicker{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);letter-spacing:3px;}
h1{font-family:'Space Grotesk',sans-serif;font-size:34px;margin:10px 0 4px;}
.sub{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:14px;margin-bottom:26px;}
.card{background:rgba(19,32,59,.95);border:1px solid var(--line);border-radius:14px;padding:24px;margin-bottom:16px;}
.btn{display:inline-block;background:var(--cyan);color:#0F172A;font-weight:700;border:none;border-radius:9px;
padding:12px 22px;font-size:15px;cursor:pointer;font-family:'Noto Sans KR';transition:.15s;}
.btn:hover{transform:translateY(-2px);}
.btn.gold{background:var(--gold);} .btn.ghost{background:transparent;color:var(--t2);border:1px solid var(--line);}
.btn.sm{padding:8px 14px;font-size:13px;}
.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0;}
@media(max-width:640px){.modes{grid-template-columns:1fr;}}
.mode{background:var(--panel2);border:1.5px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;text-align:center;transition:.15s;}
.mode:hover,.mode.sel{border-color:var(--cyan);background:rgba(96,165,250,.12);}
.mode b{font-size:26px;font-family:'Space Grotesk',sans-serif;color:var(--cyan);display:block;}
.mode span{font-size:12.5px;color:var(--t3);}
.chgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
@media(max-width:640px){.chgrid{grid-template-columns:repeat(2,1fr);}}
.chbox{font-size:12.5px;padding:9px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:.12s;}
.chbox.sel{border-color:var(--gold);color:var(--gold);background:rgba(251,191,36,.08);}
.opt-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-top:14px;}
.toggle{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--t2);cursor:pointer;}
.toggle input{accent-color:var(--cyan);width:16px;height:16px;}
/* exam */
.exam-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.timer{font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--gold);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:8px 16px;}
.timer.low{color:var(--red);border-color:var(--red);}
.prog{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--t3);}
.qno-tag{font-family:'Space Grotesk',sans-serif;color:var(--gold);font-size:13px;letter-spacing:1px;}
.qtext{font-size:18px;font-weight:700;margin:8px 0 2px;}
.qtext-en{font-size:13.5px;color:var(--t3);font-style:italic;margin-bottom:16px;}
.opts{list-style:none;}
.opts li{background:var(--panel2);border:1.5px solid var(--line);border-radius:10px;padding:13px 16px;margin-bottom:9px;cursor:pointer;transition:.12s;font-size:15px;}
.opts li:hover{border-color:var(--cyan);}
.opts li.sel{border-color:var(--cyan);background:rgba(96,165,250,.14);}
.opts li .en{display:block;font-size:12px;color:var(--t3);}
.nav-row{display:flex;justify-content:space-between;margin-top:18px;gap:10px;flex-wrap:wrap;}
.dots{display:flex;flex-wrap:wrap;gap:5px;margin-top:16px;}
.dot{width:26px;height:26px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);font-size:11px;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}
.dot.answered{background:rgba(96,165,250,.25);color:var(--cyan);border-color:var(--cyan);}
.dot.cur{outline:2px solid var(--gold);}
/* result */
.score-big{font-family:'Space Grotesk',sans-serif;font-size:56px;font-weight:700;line-height:1;}
.pass{color:var(--green);} .fail{color:var(--red);}
.rv{border-left:3px solid var(--line);padding:12px 16px;margin:12px 0;background:var(--panel2);border-radius:0 10px 10px 0;}
.rv.wrong{border-left-color:var(--red);}
.rv.right{border-left-color:var(--green);}
.rv .q{font-weight:700;font-size:14.5px;}
.rv .meta{font-size:12px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.rv .exp{font-size:13.5px;color:var(--t2);margin-top:7px;}
.rv a{color:var(--cyan);font-size:12.5px;}
.hidden{display:none;}
.top-link{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--cyan);}
.stat-line{font-size:13.5px;color:var(--t3);margin-top:8px;}
.eng-only .ko-txt{display:none;}
.eng-only .qtext-en{font-size:17px;color:var(--t1);font-style:normal;font-weight:700;}
.eng-only .opts li .en{font-size:14.5px;color:var(--t1);}
.eng-only .opts li .ko-opt{display:none;}
</style>
</head>
<body>
<div class="wrap">
<a class="top-link" href="index.html">← 전체 목차 (Master Index)</a>
<div class="kicker" style="margin-top:14px">FAA-H-8083-30B · GENERAL WRITTEN EXAM</div>
<h1>✍️ 필기 모의고사</h1>
<div class="sub">General Exam Simulator — 문제은행 <b id="bankN"></b>문항</div>

<!-- SETUP -->
<div id="setup">
  <div class="card">
    <b style="font-size:17px">출제 방식</b>
    <div class="modes">
      <div class="mode sel" data-n="30"><b>30</b><span>문항 · 36분<br>실전 압축</span></div>
      <div class="mode" data-n="50"><b>50</b><span>문항 · 60분<br>표준 모의고사</span></div>
      <div class="mode" data-n="100"><b>100</b><span>문항 · 120분<br>전 범위 총정리</span></div>
    </div>
    <div class="opt-row">
      <label class="toggle"><input type="checkbox" id="engOnly"> English Only (실전 모드)</label>
      <label class="toggle"><input type="checkbox" id="timerOn" checked> 타이머 사용 (1.2분/문항)</label>
    </div>
  </div>
  <div class="card">
    <b style="font-size:17px">챕터 선택</b> <span style="font-size:12.5px;color:var(--t3)">(미선택 시 전체 챕터에서 무작위)</span>
    <div class="chgrid" id="chgrid"></div>
  </div>
  <div class="card" id="wrongCard" style="display:none">
    <b style="font-size:17px">📕 오답노트</b>
    <div class="stat-line" id="wrongStat"></div>
    <div class="opt-row">
      <button class="btn gold sm" onclick="startWrong()">오답만 다시 풀기</button>
      <button class="btn ghost sm" onclick="clearWrong()">오답노트 비우기</button>
    </div>
  </div>
  <button class="btn" style="font-size:17px;padding:14px 34px" onclick="startExam()">시험 시작 →</button>
</div>

<!-- EXAM -->
<div id="exam" class="hidden">
  <div class="exam-head">
    <span class="prog" id="prog"></span>
    <span class="timer" id="timer">--:--</span>
  </div>
  <div class="card" id="qcard"></div>
  <div class="nav-row">
    <button class="btn ghost" onclick="move(-1)">← 이전</button>
    <button class="btn gold" onclick="submitExam()">채점하기 ✓</button>
    <button class="btn ghost" onclick="move(1)">다음 →</button>
  </div>
  <div class="dots" id="dots"></div>
</div>

<!-- RESULT -->
<div id="result" class="hidden">
  <div class="card" style="text-align:center">
    <div class="score-big" id="scoreBig"></div>
    <div id="passTxt" style="font-size:19px;font-weight:700;margin:6px 0"></div>
    <div class="stat-line" id="scoreDetail"></div>
    <div style="margin-top:16px">
      <button class="btn" onclick="location.reload()">새 시험 보기</button>
      <button class="btn gold" onclick="startWrong()" id="retryWrongBtn">틀린 문제 다시 풀기</button>
    </div>
  </div>
  <div class="card"><b style="font-size:17px">문항 리뷰</b><div id="review"></div></div>
</div>
</div>

q5", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "AD(감항성 개선명령)의 준수 성격은?", "qe": "What is the nature of AD compliance?", "opts": [{"L": "A", "ko": "권장 사항", "en": "Recommended"}, {"L": "B", "ko": "법적 강제", "en": "Legally mandatory"}, {"L": "C", "ko": "선택 사항", "en": "Optional"}, {"L": "D", "ko": "제작사 재량", "en": "Manufacturer's discretion"}], "ans": "B", "expk": "AD는 반드시 준수해야 하는 법적 강제 사항입니다.", "expe": "ADs are legally mandatory and must be complied with."}, {"id": "c1q6", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "제작사 정비교범을 뜻하는 약어는?", "qe": "Which abbreviation means the manufacturer's maintenance manual?", "opts": [{"L": "A", "ko": "AMM", "en": "AMM"}, {"L": "B", "ko": "POH", "en": "POH"}, {"L": "C", "ko": "MEL", "en": "MEL"}, {"L": "D", "ko": "TCDS", "en": "TCDS"}], "ans": "A", "expk": "AMM = Aircraft Maintenance Manual.", "expe": "AMM = Aircraft Maintenance Manual."}, {"id": "c1q7", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "1927~1939년 항공기 구조의 주된 변화는?", "qe": "What was the main structural change during 1927–1939?", "opts": [{"L": "A", "ko": "복합재 도입", "en": "Composites introduced"}, {"L": "B", "ko": "목재·우포에서 전금속으로", "en": "Wood/fabric to all-metal"}, {"L": "C", "ko": "제트엔진 상용화", "en": "Jet engines commercialized"}, {"L": "D", "ko": "여압객실 표준화", "en": "Pressurization standardized"}], "ans": "B", "expk": "황금기에 전금속 구조가 목재·우포를 대체했습니다.", "expe": "During the Golden Age all-metal replaced wood and fabric."}, {"id": "c1q8", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "현대기의 자가진단 시스템이 아닌 것은?", "qe": "Which is NOT a modern self-diagnostic system?", "opts": [{"L": "A", "ko": "FADEC", "en": "FADEC"}, {"L": "B", "ko": "BITE", "en": "BITE"}, {"L": "C", "ko": "EICAS", "en": "EICAS"}, {"L": "D", "ko": "VOR", "en": "VOR"}], "ans": "D", "expk": "VOR은 항법(무선) 시설이며 자가진단 시스템이 아닙니다.", "expe": "VOR is a radio navigation aid, not a self-diagnostic system."}, {"id": "c1q9", "ch": 1, "chko": "항공 입문", ": "계속 사용", "en": "Kept in use"}, {"L": "B", "ko": "교체·수리", "en": "Replaced/repaired"}, {"L": "C", "ko": "도장", "en": "Painted"}, {"L": "D", "ko": "방치", "en": "Left alone"}], "ans": "B", "expk": "오차를 유발하므로 교체·수리합니다.", "expe": "Replaced/repaired to avoid errors."}, {"id": "c15q1", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "정비사 시험 응시 자격 경로가 아닌 것은?", "qe": "Which is NOT a path to test eligibility?", "opts": [{"L": "A", "ko": "Part 147 학교", "en": "Part 147 school"}, {"L": "B", "ko": "실무 경력", "en": "Practical experience"}, {"L": "C", "ko": "군 정비 경력", "en": "Military experience"}, {"L": "D", "ko": "조종 시간", "en": "Pilot flight time"}], "ans": "D", "expk": "조종 시간은 정비사 응시 경로가 아닙니다.", "expe": "Pilot time is not a mechanic path."}, {"id": "c15q2", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "A·P 모두를 위한 통상 실무 경력은?", "qe": "Typical experience for both A and P:", "opts": [{"L": "A", "ko": "6개월", "en": "6 months"}, {"L": "B", "ko": "18개월", "en": "18 months"}, {"L": "C", "ko": "30개월", "en": "30 months"}, {"L": "D", "ko": "60개월", "en": "60 months"}], "ans": "C", "expk": "통상 30개월입니다.", "expe": "About 30 months."}, {"id": "c15q3", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "현재 정비사 시험 기준 체계는?", "qe": "Current testing standard is the:", "opts": [{"L": "A", "ko": "PTS", "en": "PTS"}, {"L": "B", "ko": "ACS", "en": "ACS"}, {"L": "C", "ko": "AMM", "en": "AMM"}, {"L": "D", "ko": "TCDS", "en": "TCDS"}], "ans": "B", "expk": "항공정비사 시험표준(ACS)입니다.", "expe": "Airman Certification Standards."}, {"id": "c15q4", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "구술·실기 시험을 평가하는 사람은?", "qe": "Oral/practical tests are given by a:", "opts": [{"L": "A", "ko": "DME", "en": "DME"}, {"L": "B", "ko": "조종사", "en": "Pilot"}, {"L": "C", "ko": "관제사", "en": "Controller"}, {"L": "D", "ko": "소유자", "en": "Owner"}], "ans": "A", "expk": "지정정비사시험관(DME)입니다.", "expe": "A Designated Mechanic Examiner."}, {"id": "c15q5", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "지식시험 통상 합격선은?", "qe": "Typical passing score:", "opts": [{"L": "A", "ko": "50%", "en": "50%"}, {"L": "B", "ko": "60%", "en": "60%"}, {"L": "C", "ko": "70%", "en": "70%"}, {"L": "D", "ko": "90%", "en": "90%"}], "ans": "C", "expk": "70%입니다.", "expe": "70%."}, {"id": "c15q6", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "A·P의 공통 관문 과목은?", "qe": "The common gateway subject for A and P is:", "opts": [{"L": "A", "ko": "General", "en": "General"}, {"L": "B", "ko": "Airframe", "en": "Airframe"}, {"L": "C", "ko": "Powerplant", "en": "Powerplant"}, {"L": "D", "ko": "Avionics", "en": "Avionics"}], "ans": "A", "expk": "General을 먼저 통과해야 합니다.", "expe": "General must be passed first."}, {"id": "c15q7", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "항공정비사가 일하지 않는 분야는?", "qe": "Where do AMTs typically NOT work?", "opts": [{"L": "A", "ko": "항공사", "en": "Airlines"}, {"L": "B", "ko": "MRO", "en": "MRO shops"}, {"L": "C", "ko": "일반항공", "en": "General aviation"}, {"L": "D", "ko": "증권 거래소", "en": "Stock exchange"}], "ans": "D", "expk": "증권 거래소는 정비 분야가 아닙니다.", "expe": "A stock exchange is not maintenance."}, {"id": "c15q8", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "정비 전문성의 기본 원칙은?", "qe": "A guiding principle of professionalism is:", "opts": [{"L": "A", "ko": "의심되면 확인한다", "en": "When in doubt, check it out"}, {"L": "B", "ko": "빠르면 좋다", "en": "Faster is better"}, {"L": "C", "ko": "기록 생략", "en": "Skip records"}, {"L": "D", "ko": "감으로 판단", "en": "Judge by feel"}], "ans": "A", "expk": "'의심되면 확인한다'가 기본입니다.", "expe": "'When in doubt, check it out.'"}, {"id": "c15q9", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "허위 기록의 결과는?", "qe": "Falsifying records can result in:", "opts": [{"L": "A", "ko": "포상", "en": "A reward"}, {"L": "B", "ko": "자격 취소", "en": "Certificate revocation"}, {"L": "C", "ko": "무관", "en": "No effect"}, {"L": "D", "ko": "승진", "en": "Promotion"}], "ans": "B", "expk": "자격 취소 등 처벌 대상입니다.", "expe": "Revocation and penalties."}, {"id": "c15q10", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "정비사가 평생학습을 해야 하는 이유는?", "qe": "Why must mechanics keep learning?", "opts": [{"L": "A", "ko": "기술이 계속 발전", "en": "Technology keeps evolving"}, {"L": "B", "ko": "규정이 없어서", "en": "No regulations"}, {"L": "C", "ko": "취미로", "en": "As a hobby"}, {"L": "D", "ko": "불필요", "en": "It's unnecessary"}], "ans": "A", "expk": "복합재·전기추진 등 신기술 때문입니다.", "expe": "Because of new tech like composites/electric."}];
var CHS = [{"no": 1, "ko": "항공 입문", "n": 10}, {"no": 2, "ko": "항공 수학", "n": 10}, {"no": 3, "ko": "기초 물리", "n": 10}, {"no": 4, "ko": "기초 전기", "n": 10}, {"no": 5, "ko": "항공기 도면", "n": 10}, {"no": 6, "ko": "무게와 평형", "n": 10}, {"no": 7, "ko": "재료와 공정", "n": 10}, {"no": 8, "ko": "세척과 부식방지", "n": 10}, {"no": 9, "ko": "유체 라인과 피팅", "n": 10}, {"no": 10, "ko": "지상 운용과 정비지원", "n": 10}, {"no": 11, "ko": "규정과 정비 간행물", "n": 10}, {"no": 12, "ko": "정비사 권한과 한계", "n": 10}, {"no": 13, "ko": "정비 기록과 서식", "n": 10}, {"no": 14, "ko": "정비 공구", "n": 10}, {"no": 15, "ko": "항공정비 취업 입문", "n": 10}];
document.getElementById('bankN').textContent = BANK.length;

var selN = 30, selCh = {}, order = [], answers = {}, cur = 0, timeLeft = 0, tick = null, examSet = [];

var chg = document.getElementById('chgrid');
CHS.forEach(function(c){
  var d = document.createElement('div');
  d.className = 'chbox'; d.textContent = 'Ch.' + c.no + ' ' + c.ko + ' (' + c.n + ')';
  d.onclick = function(){ selCh[c.no] = !selCh[c.no]; d.classList.toggle('sel', !!selCh[c.no]); };
  chg.appendChild(d);
});
document.querySelectorAll('.mode').forEach(function(m){
  m.onclick = function(){
    document.querySelectorAll('.mode').forEach(function(x){x.classList.remove('sel');});
    m.classList.add('sel'); selN = parseInt(m.dataset.n);
  };
});

function getWrong(){ try{return JSON.parse(localStorage.getItem('gen_wrong')||'[]');}catch(e){return [];} }
function setWrong(a){ try{localStorage.setItem('gen_wrong', JSON.stringify(a));}catch(e){} }
(function(){
  var w = getWrong();
  if(w.length){ document.getElementById('wrongCard').style.display='';
    document.getElementById('wrongStat').textContent = '저장된 오답 ' + w.length + '문항 — 다시 풀어 완전히 익히세요.'; }
})();
function clearWrong(){ setWrong([]); location.reload(); }

function shuffle(a){ for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }

function startExam(){
  var pool = BANK.filter(function(q){
    var any = Object.keys(selCh).some(function(k){return selCh[k];});
    return !any || selCh[q.ch];
  });
  if(!pool.length){ alert('선택한 챕터에 문항이 없습니다.'); return; }
  examSet = shuffle(pool.slice()).slice(0, Math.min(selN, pool.length));
  begin();
}
function startWrong(){
  var ids = getWrong();
  var pool = BANK.filter(function(q){ return ids.indexOf(q.id) >= 0; });
  if(!pool.length){ alert('저장된 오답이 없습니다.'); return; }
  examSet = shuffle(pool.slice());
  document.getElementById('result').classList.add('hidden');
  begin();
}
function begin(){
  answers = {}; cur = 0;
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('exam').classList.remove('hidden');
  document.body.classList.toggle('eng-only', document.getElementById('engOnly').checked);
  if(document.getElementById('timerOn').checked){
    timeLeft = Math.round(examSet.length * 72);
    tick = setInterval(function(){
      timeLeft--;
      renderTimer();
      if(timeLeft <= 0){ clearInterval(tick); submitExam(); }
    }, 1000);
  } else { document.getElementById('timer').style.display='none'; }
  renderTimer(); renderDots(); renderQ();
  window.scrollTo(0,0);
}
function renderTimer(){
  if(!document.getElementById('timerOn').checked) return;
  var m = Math.floor(timeLeft/60), s = timeLeft%60;
  var el = document.getElementById('timer');
  el.textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  el.classList.toggle('low', timeLeft < 120);
}
function renderDots(){
  var d = document.getElementById('dots'); d.innerHTML='';
  examSet.forEach(function(q,i){
    var b = document.createElement('div');
    b.className = 'dot' + (answers[q.id]?' answered':'') + (i===cur?' cur':'');
    b.textContent = i+1;
    b.onclick = function(){ cur=i; renderQ(); renderDots(); };
    d.appendChild(b);
  });
}
function renderQ(){
  var q = examSet[cur];
  document.getElementById('prog').textContent = (cur+1) + ' / ' + examSet.length + '  ·  Ch.' + q.ch;
  var h = '<span class="qno-tag">Q' + (cur+1) + ' · CH.' + q.ch + '</span>'
    + '<div class="qtext ko-txt">' + q.qk + '</div>'
    + '<div class="qtext-en">' + q.qe + '</div><ul class="opts">';
  q.opts.forEach(function(o){
    h += '<li data-l="' + o.L + '"' + (answers[q.id]===o.L?' class="sel"':'') + ' onclick="pick(this)">'
      + '<span class="ko-opt">' + o.L + '. ' + o.ko + '</span><span class="en">' + o.L + '. ' + o.en + '</span></li>';
  });
  h += '</ul>';
  document.getElementById('qcard').innerHTML = h;
}
function pick(li){
  var q = examSet[cur];
  answers[q.id] = li.dataset.l;
  renderQ(); renderDots();
  if(cur < examSet.length-1){ setTimeout(function(){ cur++; renderQ(); renderDots(); window.scrollTo(0,0); }, 220); }
}
function move(d){ cur = Math.max(0, Math.min(examSet.length-1, cur+d)); renderQ(); renderDots(); }

function submitExam(){
  if(tick) clearInterval(tick);
  var unanswered = examSet.filter(function(q){return !answers[q.id];}).length;
  if(unanswered && timeLeft > 0){
    if(!confirm('미응답 ' + unanswered + '문항이 있습니다. 채점할까요?')) return;
  }
  var right = 0, wrongIds = getWrong();
  examSet.forEach(function(q){
    if(answers[q.id] === q.ans){ right++;
      var idx = wrongIds.indexOf(q.id); if(idx>=0) wrongIds.splice(idx,1);
    } else { if(wrongIds.indexOf(q.id) < 0) wrongIds.push(q.id); }
  });
  setWrong(wrongIds);
  var pct = Math.round(right/examSet.length*100);
  var pass = pct >= 70;
  document.getElementById('exam').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('scoreBig').textContent = pct + '%';
  document.getElementById('scoreBig').className = 'score-big ' + (pass?'pass':'fail');
  document.getElementById('passTxt').textContent = pass ? '🎉 합격 (PASS) — 합격선 70%' : '불합격 (FAIL) — 합격선 70%';
  document.getElementById('passTxt').style.color = pass ? 'var(--green)' : 'var(--red)';
  document.getElementById('scoreDetail').textContent = '정답 ' + right + ' / ' + examSet.length + '문항 · 오답노트에 ' + getWrong().length + '문항 저장됨';
  var rv = document.getElementById('review'); rv.innerHTML='';
  examSet.forEach(function(q,i){
    var ok = answers[q.id] === q.ans;
    var your = answers[q.id] || '무응답';
    var ansTxt = ''; q.opts.forEach(function(o){ if(o.L===q.ans) ansTxt = o.ko; });
    var d = document.createElement('div');
    d.className = 'rv ' + (ok?'right':'wrong');
    d.innerHTML = '<div class="q">' + (ok?'✅':'❌') + ' Q' + (i+1) + '. ' + q.qk + '</div>'
      + '<div class="meta">내 답: ' + your + ' · 정답: ' + q.ans + ' (' + ansTxt + ') · Ch.' + q.ch + ' ' + q.chko + '</div>'
      + '<div class="exp">' + q.expk + '</div>'
      + '<a href="' + q.file + '">→ Ch.' + q.ch + ' 교재 보기</a>';
    rv.appendChild(d);
  });
  window.scrollTo(0,0);
}
</script>
