", "ko": "실물 사진", "en": "Photographs"}, {"L": "D", "ko": "치수 공차", "en": "Dimensional tolerances"}], "ans": "A", "expk": "계통을 큰 기능 블록으로 단순화해 보여줍니다.", "expe": "It simplifies a system into major functional blocks."}, {"id": "c5q15", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "도면에서 재질 정보는 어디서 확인하는가?", "qe": "Material information on a drawing is found in the:", "opts": [{"L": "A", "ko": "제목란", "en": "Title block"}, {"L": "B", "ko": "해칭", "en": "Hatching"}, {"L": "C", "ko": "중심선", "en": "Center line"}, {"L": "D", "ko": "숨은선", "en": "Hidden lines"}], "ans": "A", "expk": "제목란에 재질·축척 등이 기재됩니다.", "expe": "The title block lists material, scale, etc."}, {"id": "c5q16", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "수리 부위를 손으로 그려 기록하는 간단한 도면은?", "qe": "A simple hand-drawn record of a repair is a:", "opts": [{"L": "A", "ko": "스케치", "en": "Sketch"}, {"L": "B", "ko": "청사진", "en": "Blueprint"}, {"L": "C", "ko": "형식증명", "en": "Type certificate"}, {"L": "D", "ko": "IPC", "en": "IPC"}], "ans": "A", "expk": "스케치는 수리 기록·제작 지시에 쓰이는 간단한 도면입니다.", "expe": "A sketch is a simple drawing for repair records."}, {"id": "c5q17", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "전기 기호로 회로 기능을 보여주지만 부품 위치는 무시하는 도면은?", "qe": "Which diagram shows circuit function with symbols, ignoring physical location?", "opts": [{"L": "A", "ko": "회로도", "en": "Schematic"}, {"L": "B", "ko": "설치도", "en": "Installation"}, {"L": "C", "ko": "상세도", "en": "Detail"}, {"L": "D", "ko": "조립도", "en": "Assembly"}], "ans": "A", "expk": "회로도(Schematic)입니다.", "expe": "The schematic diagram."}, {"id": "c5q18", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "치수 15.00±0.05의 최소 허용값은?", "qe": "For 15.00 ±0.05, the minimum allowable is:", "opts": [{"L": "A", "ko": "14.95", "en": "14.95"}, {"L": "B", "ko": "15.05", "en": "15.05"}, {"L": "C", "ko": "14.50", "en": "14.50"}, {"L": "D", "ko": "15.00", "en": "15.00"}], "ans": "A", "expk": "15.00−0.05 = 14.95.", "expe": "15.00 − 0.05 = 14.95."}, {"id": "c5q19", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "도면 개정(Revision) 시 반드시 해야 하는 것은?", "qe": "When a drawing is revised, you must:", "opts": [{"L": "A", "ko": "개정란에 기록", "en": "Record it in the revision block"}, {"L": "B", "ko": "기존 도면 파기 금지 없이 혼용", "en": "Mix old and new freely"}, {"L": "C", "ko": "구두로만 전달", "en": "Verbal notice only"}, {"L": "D", "ko": "무시", "en": "Ignore it"}], "ans": "A", "expk": "개정란에 변경 이력을 기록하고 최신본만 사용합니다.", "expe": "Log it in the revision block; use only the current version."}, {"id": "c5q20", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "부품도해목록(IPC)의 용도는?", "qe": "An Illustrated Parts Catalog (IPC) is used to:", "opts": [{"L": "A", "ko": "부품 번호·분해 위치 확인", "en": "Find part numbers and breakdown locations"}, {"L": "B", "ko": "비행 계획", "en": "Flight planning"}, {"L": "C", "ko": "기상 확인", "en": "Weather"}, {"L": "D", "ko": "급유량 계산", "en": "Fuel quantity"}], "ans": "A", "expk": "IPC로 부품 번호와 조립 관계를 확인합니다.", "expe": "The IPC identifies part numbers and assembly relationships."}, {"id": "c5q21", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "도면에서 보이지 않는 모서리·윤곽을 나타내는 선은?", "qe": "What type of line indicates invisible edges or contours?", "opts": [{"L": "A", "ko": "중간 굵기의 짧은 파선(균일 간격)", "en": "Medium-weight short dashes evenly spaced"}, {"L": "B", "ko": "아주 짧은 파선", "en": "Very short dashes"}, {"L": "C", "ko": "긴 선 하나+짧은 선 둘", "en": "One long and two short dashes"}], "ans": "A", "expk": "숨은선=중간 굵기 파선. [ASA 8103]", "expe": "Hidden line = medium-weight dashed. [ASA 8103]"}, {"id": "c5q22", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "긴 선과 짧은 선이 번갈아 나오는 선의 종류는?", "qe": "What type of drawing line consists of alternating long and short lines?", "opts": [{"L": "A", "ko": "치수선", "en": "Dimension"}, {"L": "B", "ko": "중심선", "en": "Center"}, {"L": "C", "ko": "숨은선", "en": "Hidden"}], "ans": "B", heir perpendicular bisectors"}, {"L": "B", "ko": "평행한 두 현과 수직이등분선", "en": "Two parallel chords"}, {"L": "C", "ko": "현 하나와 수직이등분선", "en": "A single chord"}], "ans": "A", "expk": "두 수직이등분선의 교점=중심. [ASA 8117-1]", "expe": "The bisectors cross at the center. [ASA 8117-1]"}, {"id": "c5q27", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "스케치 작업을 쉽게 해주는 것은?", "qe": "Sketches are usually made easier by the use of", "opts": [{"L": "A", "ko": "모눈종이", "en": "Graph paper"}, {"L": "B", "ko": "백지", "en": "Plain white paper"}, {"L": "C", "ko": "전문가용 용지", "en": "Artist's paper"}], "ans": "A", "expk": "모눈이 치수 가늠에 유리. [ASA 8120]", "expe": "Graph paper eases dimensioning. [ASA 8120]"}, {"id": "c5q28", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "도면에서 모든 금속을 대표해 흔히 쓰는 단면 기호는?", "qe": "What material symbol is frequently used to represent all metals?", "opts": [{"L": "A", "ko": "강철", "en": "Steel"}, {"L": "B", "ko": "주철", "en": "Cast iron"}, {"L": "C", "ko": "알루미늄", "en": "Aluminum"}], "ans": "B", "expk": "주철 기호가 범용 — 정확한 재질은 BOM/노트에. [ASA 8121]", "expe": "Cast iron symbol is the general-purpose one. [ASA 8121]"}, {"id": "c5q29", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "기계 다듬질이 필요한 면을 표시하는 것은?", "qe": "What is used to indicate that a surface must be machine finished?", "opts": [{"L": "A", "ko": "텍스트", "en": "Text"}, {"L": "B", "ko": "지시선", "en": "Leader lines"}, {"L": "C", "ko": "다듬질 기호(Finish Marks)", "en": "Finished marks"}], "ans": "C", "expk": "다듬질 기호로 기계가공 면 지정. [ASA 8121-1]", "expe": "Finish marks identify machined surfaces. [ASA 8121-1]"}, {"id": "c5q30", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "대형 도면의 존 번호(Zone Numbers)의 용도는?", "qe": "Zone numbers on aircraft blueprints are used to", "opts": [{"L": "A", "ko": "대형 도면에서 부품·단면·뷰의 위치 찾기", "en": "Locate parts, sections, and views on large drawings"}, {"L": "B", "ko": "항공기 구역 표시", "en": "Different sections of the aircraf .html", "qk": "헬리콥터 무게평형에 관한 옳은 설명은?", "qe": "Which statement is true regarding helicopter weight and balance?", "opts": [{"L": "A", "ko": "가로축 CG는 무관", "en": "Lateral CG is not a factor"}, {"L": "B", "ko": "꼬리 부품 모멘트는 상시 변동", "en": "Tail moments constantly change"}, {"L": "C", "ko": "비행기 절차가 헬리콥터에도 적용된다", "en": "Airplane procedures also apply to helicopters"}], "ans": "C", "expk": "절차 동일, 다만 헬기는 CG가 더 임계적. [ASA 8164]", "expe": "Same procedures; effects more critical. [ASA 8164]"}, {"id": "c6q43", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "자중·자중CG 계산에 쓰는 연료량은?", "qe": "The amount of fuel used for computing empty weight and CG is", "opts": [{"L": "A", "ko": "빈 탱크", "en": "Empty fuel tanks"}, {"L": "B", "ko": "불사용 연료", "en": "Unusable fuel"}, {"L": "C", "ko": "30분 운항분", "en": "Fuel for 1/2 hour"}], "ans": "B", "expk": "불사용 연료 무게·아암은 TCDS에. [ASA 8176]", "expe": "Unusable fuel; data in the TCDS. [ASA 8176]"}, {"id": "c6q44", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "모멘트의 (+)·(−) 부호를 결정하는 것은?", "qe": "What determines whether a moment is preceded by a plus or minus sign?", "opts": [{"L": "A", "ko": "기준선 기준 무게 위치만", "en": "Location relative to datum only"}, {"L": "B", "ko": "기준선 기준 위치와 추가/제거 여부", "en": "The location relative to the datum and whether it is being removed or added"}, {"L": "C", "ko": "CG 기준 기준선 위치", "en": "Datum location relative to CG"}], "ans": "B", "expk": "부호 = 아암 부호 × 무게 부호. [ASA 8162]", "expe": "Sign of arm × sign of weight. [ASA 8162]"}, {"id": "c6q45", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "기준선을 기수(Nose)에 두면 아암은?", "qe": "If the reference datum is placed at the nose,", "opts": [{"L": "A", "ko": "모두 음수", "en": "All negative"}, {"L": "B", "ko": "모두 양수", "en": "All measurement arms will be in positive numbers"}, {"L": "C", "ko": "혼재", "en": "Either sign"}], "ans": "B", "expk": "모든 위치가 기준선 뒤 → 전부 (+), 계산 단순. [ASA 8166]", "expe": "Everything is aft of datum — all positive. [ASA 8166]"}, {"id": "c6q46", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "10lb 상자(CG 뒤 4ft)와 5lb 상자(뒤 2ft)를 실었다. CG 불변을 위해 20lb 상자는 CG 앞 몇 ft에?", "qe": "Boxes of 10 lb (4 ft aft) and 5 lb (2 ft aft) are loaded. How far forward must a 20-lb box go so CG is unchanged?", "opts": [{"L": "A", "ko": "3 ft", "en": "3 feet"}, {"L": "B", "ko": "2.5 ft", "en": "2.5 feet"}, {"L": "C", "ko": "8 ft", "en": "8 feet"}], "ans": "B", "expk": "후방 모멘트 50 lb-ft ÷ 20 lb = 2.5ft. [ASA 8179]", "expe": "50 lb-ft ÷ 20 lb = 2.5 ft. [ASA 8179]"}, {"id": "c6q47", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "40lb 발전기가 기준축에 +1,400 in-lb 모멘트를 가하면 위치는?", "qe": "A 40-lb generator applying +1,400 in-lb is located", "opts": [{"L": "A", "ko": "축에서 −35", "en": "−35 from the axis"}, {"L": "B", "ko": "축에서 +35", "en": "+35 from the axis"}, {"L": "C", "ko": "축에서 +25", "en": "+25 from the axis"}], "ans": "B", "expk": "1,400÷40=35, 모멘트가 (+)이므로 +35. [ASA 8182]", "expe": "1,400 ÷ 40 = +35. [ASA 8182]"}, {"id": "c6q48", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "항공기 최대 중량의 구성은?", "qe": "The maximum weight of an aircraft is the", "opts": [{"L": "A", "ko": "자중+승무원+최대연료+화물", "en": "Empty + crew + max fuel + cargo"}, {"L": "B", "ko": "자중+승무원+승객+고정장비", "en": "Empty + crew + passengers + fixed equipment"}, {"L": "C", "ko": "자중 + 유용하중", "en": "Empty weight plus useful load"}], "ans": "C", "expk": "최대중량 = 자중 + 유용하중. [ASA 8163]", "expe": "Max weight = empty weight + useful load. [ASA 8163]"}, {"id": "c6q49", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "측정 기록지(Weighing Form)에 명확히 표시할 것은?", "qe": "What should be clearly indicated on the aircraft weighing form?", "opts": [{"L": "A", "ko": "최소 총중량", "en": "Minimum gross weight"}, {"L": "B", "ko": "불사용연료 무게", "en": "Unusable fuel weight"}, {"L": "C", "ko": "측정점(Weighing Points)", "en": "Weighing points"}], "ans": "C", "expk": "레벨링 수단과 측정점 위치를 명시. [ASA 8165]", "expe": "Leveling means and weighing point locations. [ASA 8165]"}, {"id": "c6q50", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "연료 만재로 측정했다면 저울값에서 빼는 연료는?", "qe": "If weighed with full fuel, all fuel weight must be subtracted", "opts": [{"L": "A", "ko": "최소연료 제외", "en": "Except minimum fuel"}, {"L": "B", "ko": "불사용연료 포함", "en": "Including unusable"}, {"L": "C", "ko": "불사용연료 제외", "en": "Except unusable fuel"}], "ans": "C", "expk": "불사용 연료는 자중에 남긴다. [ASA 8167-1]", "expe": "Unusable fuel stays in empty weight. [ASA 8167-1]"}, {"id": "c6q51", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "자중 산출 방법으로 옳은 것은?", "qe": "The empty weight of an airplane is determined by", "opts": [{"L": "A", "ko": "각 측정점 무게 합×기준선 거리", "en": "Adding weights × distance"}, {"L": "B", "ko": "저울값에서 Tare를 빼고 각 측정점 순중량을 합산", "en": "Subtracting tare and adding the net weight of each point"}, {"L": "C", "ko": "거리×(저울값−Tare) 합", "en": "Distance × (scale−tare)"}], "ans": "B", "expk": "순중량(저울−Tare)의 총합 = 자중. [ASA 8168]", "expe": "Sum of net weights equals empty weight. [ASA 8168]"}, {"id": "c6q52", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "만석·만재·연료만재 시 현대 항공기의 중량 상태는?", "qe": "With all seats, baggage, and tanks full, most modern aircraft will be", "opts": [{"L": "A", "ko": "최대이륙중량 초과", "en": "In excess of maximum takeoff weight"}, {"L": "B", "ko": "최대 기본운항중량", "en": "At max basic operating weight"}, {"L": "C", "ko": "최대 램프중량", "en": "At max ramp weight"}], "ans": "A", "expk": "설계상 전부 만재하면 과적이 됨. [ASA 8169-2]", "expe": "Grossly overloaded by design. [ASA 8169-2]"}, {"id": "c6q53", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "항공기 노후에 따른 중량 변화의 주 원인은?", "qe": "The major source of weight change as aircraft age is", "opts": [{"L": "A", "ko": "오물 축적·습기 흡수", "en": "Grime and moisture"}, {"L": "B", "ko": "수리와 개조", "en": "Repairs and alterations"}, {"L": "C", "ko": "도장·하드웨어 추가", "en": "Paint and hardware"}], "ans": "B", "expk": "수리·개조(장비 추가)가 주 원인. [ASA 8169-3]", "expe": "Repairs and alterations. [ASA 8169-3]"}, {"id": "c6q54", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "최대 전방 CG 계산 시 후방 유용하중 품목의 처리?", "qe": "When computing maximum forward CG, use minimum weights for useful load items located aft of the", "opts": [{"L": "A", "ko": "후방 CG 한계", "en": "Rearward CG limit"}, {"L": "B", "ko": "전방 CG 한계", "en": "Forward CG limit"}, {"L": "C", "ko": "기준선", "en": "Datum"}], "ans": "B", "expk": "전방한계 앞 품목은 최대, 뒤 품목은 최소로. [ASA 8190]", "expe": "Max ahead of, min behind, the forward limit. [ASA 8190]"}, {"id": "c6q55", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "적재 항공기가 '평형(In Balance)'인 조건은?", "qe": "An airplane is considered to be in balance when", "opts": [{"L": "A", "ko": "적재기의 평균 모멘트 아암이 CG 범위 안에 있을 때", "en": "The average moment arm of the loaded airplane falls within its CG range"}, {"L": "B", "ko": "모든 아암이 범위 안", "en": "All arms in range"}, {"L": "C", "ko": "승객 이동이 무영향", "en": "Passenger movement has no effect"}], "ans": "A", "expk": "평균 모멘트 아암(적재CG)이 범위 내. [ASA 8153]", "expe": "The loaded CG within its range. [ASA 8153]"}, {"id": "c6q56", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "단일로터 헬리콥터의 CG 범위는 비행기 대비?", "qe": "The CG range in single-rotor helicopters is", "opts": [{"L": "A", "ko": "훨씬 넓다", "en": "Much greater"}, {"L": "B", "ko": "비슷하다", "en": "About the same"}, {"L": "C", "ko": "훨씬 제한적이다", "en": "More restricted than for airplanes"}], "ans": "C", "expk": "3인치 이내인 경우도 있음. [ASA 8175]", "expe": "Sometimes less than three inches. [ASA 8175]"}, {"id": "c6q57", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "CG 뒤 품목을 제거하면 CG는?", "qe": "If an item aft of the CG is removed, the CG change will be", "opts": [{"L": "A", "ko": "무게·위치 비례해 뒤로", "en": "Aft in proportion"}, {"L": "B", "ko": "무게·위치에 비례해 앞으로", "en": "Forward in proportion to the weight and location"}, {"L": "C", "ko": "위치 무관 앞으로", "en": "Forward regardless of location"}], "ans": "B", "expk": "(+아암)×(−무게)=(−모멘트) → 전방 이동. [ASA 8183-1]", "expe": "Negative moment moves CG forward proportionally. [ASA 8183-1]"}, {"id": "c6q58", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "헬리콥터 CG 한계 초과 적재가 위험한 이유는?", "qe": "Improper helicopter loading exceeding CG limits is hazardous due to", "opts": [{"L": "A", "ko": "사이클릭 피치 조종 여유 상실", "en": "Reduction or loss of effective cyclic pitch control"}, {"L": "B", "ko": "코리올리 효과", "en": "Coriolis effect"}, {"L": "C", "ko": "컬렉티브 피치 상실", "en": "Loss of collective"}], "ans": "A", "expk": "사이클릭으로 불평형을 못 이기게 됨. [ASA 8172]", "expe": "Cyclic cannot overcome the imbalance. [ASA 8172]"}, {"id": "c6q59", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "후방 한계 점검 시 최소 무게로 계산할 품목은?", "qe": "For a rearward W&B check, items computed at minimum weights are those located forward of the", "opts": [{"L": "A", "ko": "전방 CG 한계", "en": "Forward CG limit"}, {"L": "B", "ko": "기준선", "en": "Datum"}, {"L": "C", "ko": "후방 CG 한계", "en": "Rearward CG limit"}], "ans": "C", "expk": "후방한계 뒤=최대, 앞=최소. [ASA 8185]", "expe": "Max behind, min ahead of the rear limit. [ASA 8185]"}, {"id": "c6q60", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "자중CG가 자중CG 한계 내에 있으면?", "qe": "If the empty weight CG lies within the empty weight CG limits,", "opts": [{"L": "A", "ko": "극한 계산 필요", "en": "Extremes must be calculated"}, {"L": "B", "ko": "극한(전·후방) CG 계산이 불필요하다", "en": "It is not necessary to calculate CG extremes"}, {"L": "C", "ko": "최소연료 점검 필요", "en": "Min-fuel checks required"}], "ans": "B", "expk": "합법적으로 한계를 벗어나게 적재할 수 없음. [ASA 8189]", "expe": "The aircraft cannot legally be loaded out of limits. [ASA 8189]"}, {"id": "c6q61", "ch": 6, "chko": "무게와 평형", "file": "ch06_weight_balance.html", "qk": "발라스트 필요량 공식은? (적재중량 4,954lb, CG 30.5→32.0 이동, 밸러스트 아암 +162)", "qe": "Ballast needed: 4,954 lb at CG 30.5; forward limit 32.0; ballast arm +162. Minimum ballas t is not subject to rotation"}], "ans": "C", "expk": "회전 조인트에는 사용 금지. [ASA 8260-1]", "expe": "Not at joints that rotate. [ASA 8260-1]"}, {"id": "c7q48", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "클레비스 볼트의 용도는?", "qe": "Where is an AN clevis bolt used in an airplane?", "opts": [{"L": "A", "ko": "인장·전단 겸용", "en": "Tension and shear"}, {"L": "B", "ko": "외부 인장 하중부", "en": "External tension"}, {"L": "C", "ko": "전단 하중 전용", "en": "Only for shear load applications"}], "ans": "C", "expk": "인장 설계 아님 — 조종계통 연결 등 전단부. [ASA 8271]", "expe": "Not designed for tension. [ASA 8271]"}, {"id": "c7q49", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "항공기 볼트의 일반 나사 등급(Fit)은?", "qe": "Aircraft bolts are usually manufactured with a", "opts": [{"L": "A", "ko": "1급(헐거움)", "en": "Class 1"}, {"L": "B", "ko": "2급(자유)", "en": "Class 2"}, {"L": "C", "ko": "3급(중간 끼워맞춤)", "en": "Class 3 fit for the threads"}], "ans": "C", "expk": "표준 항공볼트=Class 3 medium fit. [ASA 8275]", "expe": "Class-3 medium fit. [ASA 8275]"}, {"id": "c7q50", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "섬유형 락너트의 잠금 원리는?", "qe": "How is the locking feature of the fiber-type locknut obtained?", "opts": [{"L": "A", "ko": "나사산 없는 섬유 인서트", "en": "By the use of an unthreaded fiber locking insert"}, {"L": "B", "ko": "하중부 바닥의 섬유", "en": "Fiber at load base"}, {"L": "C", "ko": "인서트 나사를 작게", "en": "Smaller insert threads"}], "ans": "A", "expk": "볼트가 섬유를 뚫고 나가며 마찰 잠금. [ASA 8277]", "expe": "The bolt forces through unthreaded fiber. [ASA 8277]"}, {"id": "c7q51", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "2차 구조물 캐슬너트의 허용 안전장치는?", "qe": "An acceptable safety device for a castle nut on secondary structures is a", "opts": [{"L": "A", "ko": "스타 와셔", "en": "Star washer"}, {"L": "B", "ko": "락 와셔", "en": "Lockwasher"}, {"L": "C", "ko": "코터핀", "en": "Cotter pin"}], "ans": "C", "expk": "캐슬너트엔 코터핀(또는 안전결선). [ASA 8261-1]", "expe": "Cotter pin (or safety wire). [ASA 8261-1]"}, {"id": "c7q52", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "캐슬너트 코터핀 구멍 정렬의 시작 기준은?", "qe": "When installing a castle nut, start alignment with the cotter pin hole at", "opts": [{"L": "A", "ko": "마찰 토크 제외 최소 권장 토크", "en": "Minimum torque without friction drag"}, {"L": "B", "ko": "최대 권장 토크−마찰 토크", "en": "Max minus friction"}, {"L": "C", "ko": "최소 권장 토크+마찰 항력 토크", "en": "Minimum recommended torque plus friction drag torque"}], "ans": "C", "expk": "최소+마찰에서 시작, 최대+마찰 초과 금지. [ASA 8261-2]", "expe": "Start at min plus drag; never exceed max plus drag. [ASA 8261-2]"}, {"id": "c7q53", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "자기 컴퍼스 부근에 쓰는 코터핀 재질은?", "qe": "Cotter pins used near magnetic compasses are made of", "opts": [{"L": "A", "ko": "내식강(비자성)", "en": "Corrosion resisting steel"}, {"L": "B", "ko": "아노다이징 알루미늄", "en": "Anodized aluminum"}, {"L": "C", "ko": "카드뮴 도금 저탄소강", "en": "Cadmium-plated steel"}], "ans": "A", "expk": "보기 중 비자성 금속은 내식강. [ASA 8262-1]", "expe": "The nonmagnetic choice is CRES. [ASA 8262-1]"}, {"id": "c7q54", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "손가락 힘만으로 인서트를 통과해 조여지는 락너트는?", "qe": "A fiber/nylon insert locknut that can be threaded through the insert with fingers only should be", "opts": [{"L": "A", "ko": "자주 재토크", "en": "Re-torqued frequently"}, {"L": "B", "ko": "폐기(Rejected)", "en": "Rejected"}, {"L": "C", "ko": "다른 위치에 재사용", "en": "Reused elsewhere"}], "ans": "B", "expk": "진동 저항 상실 → 폐기. [ASA 8263-1]", "expe": "It can no longer resist vibration. [ASA 8263-1]"}, {"id": "c7q55", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "토크 범위 내 정렬 실패 시 허용되는 조치는?", "qe": "If the cotter pin hole does not align within the recommended torque range, the acceptable practice is to", "opts": [{"L": "A", "ko": "10% 이내 초과", "en": "Exceed by 10 percent"}, {"L": "B", "ko": "범위 아래로 조임", "en": "Tighten below range"}, {"L": "C", "ko": "와셔를 바꿔 다시 시도", "en": "Change washers and try again"}], "ans": "C", "expk": "하드웨어 교체 후 재정렬. [ASA 8268]", "expe": "Remove hardware and realign. [ASA 8268]"}, {"id": "c7q56", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "포크엔드 케이블 터미널의 클레비스 볼트 고정 방법은?", "qe": "How is a clevis bolt with a fork-end cable terminal secured?", "opts": [{"L": "A", "ko": "전단너트를 밀착(무응력)으로 조이고 코터핀 고정", "en": "Shear nut snug with no strain on the fork, safetied with a cotter pin"}, {"L": "B", "ko": "포크가 약간 물릴 때까지 캐슬너트 조임", "en": "Castle nut until binding"}, {"L": "C", "ko": "얇은 자동잠금너트로 회전 방지", "en": "Thin self-locking nut"}], "ans": "A", "expk": "포크에 응력 없이 스너그+코터핀. [ASA 8270]", "expe": "Snug, no fork strain, cotter pinned. [ASA 8270]"}, {"id": "c7q57", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "항공기 부품 자분탐상에 가장 많이 쓰는 방식은?", "qe": "What method of magnetic particle inspection is used most often?", "opts": [{"L": "A", "ko": "잔류법", "en": "Residual"}, {"L": "B", "ko": "유도법", "en": "Inductance"}, {"L": "C", "ko": "연속법(Continuous)", "en": "Continuous"}], "ans": "C", "expk": "자화 전류를 흘리며 검사 — 가장 강한 자장. [ASA 8223]", "expe": "Current flows during inspection — strongest field. [ASA 8223]"}, {"id": "c7q58", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "자분탐상 시험 매체(자분)의 자기 특성은?", "qe": "The testing medium in magnetic particle inspection has", "opts": [{"L": "A", "ko": "높은 투자율·낮은 잔류자기", "en": "High permeability and low retentivity"}, {"L": "B", "ko": "낮은 투자율·높은 잔류자기", "en": "Low permeability, high retentivity"}, {"L": "C", "ko": "높은 투자율·높은 잔류자기", "en": "High both"}], "ans": "A", "expk": "미세 산화철: 잘 끌리고 뭉치지 않음. [ASA 8225]", "expe": "Fine iron oxide: high permeability, low retentivity. [ASA 8225]"}, {"id": "c7q59", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "잔류법(Residual) 자분탐상에 관한 옳은 설명은?", "qe": "Which statement relating to the residual magnetizing inspection method is true?", "opts": [{"L": "A", "ko": "내부 결함이 쉽게 드러난다", "en": "Subsurface flaws readily apparent"}, {"L": "B", "ko": "모든 자화 절차에 사용", "en": "Used in all procedures"}, {"L": "C", "ko": "응력용으로 열처리된 강(고잔류자기)에 사용 가능", "en": "It may be used with steels heat treated for stressed applications"}], "ans": "C", "expk": "잔류자기가 높은 강에 적용. [ASA 8226]", "expe": "For high-retentivity heat-treated steels. [ASA 8226]"}, {"id": "c7q60", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "자분탐상의 두 가지 지시 매체 방식은?", "qe": "What two types of indicating mediums are available for magnetic particle inspection?", "opts": [{"L": "A", "ko": "철·페라이트 산화물", "en": "Iron and ferric oxides"}, {"L": "B", "ko": "습식과 건식", "en": "Wet and dry process materials"}, {"L": "C", "ko": "고잔류·저투자율 재료", "en": "High retentivity material"}], "ans": "B", "expk": "건식 분말 또는 등유 현탁 습식. [ASA 8228]", "expe": "Dry powder or wet suspension. [ASA 8228]"}, {"id": "c7q61", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "자분탐상으로 검사 가능한 재료는?", "qe": "Which materials may be inspected using magnetic particle inspection?", "opts": [{"L": "A", "ko": "구리 합금", "en": "Copper alloys"}, {"L": "B", "ko": "알루미늄 합금", "en": "Aluminum alloys"}, {"L": "C", "ko": "철 합금", "en": "Iron alloys"}], "ans": "C", "expk": "자화 가능한 재료만. [ASA 8229]", "expe": "Only magnetizable metals. [ASA 8229]"}, {"id": "c7q62", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "qk": "알루미늄 단조품·주물의 표면 균열 검출법은?", "qe": "Which methods detect surface cracks in aluminum forgings and castings?", "opts": [{"L": "A", "ko": "침투탐상과 와전류 검사", "en": "Dye penetrant and eddy current inspection"}, {"L": "B", "ko": "침투탐상과 자분탐상", "en": "Penetrant and magnetic particle"}, {"L": "C", "ko": "자분탐상과 금속링 검사", "en": "Magnetic and metallic ring"}], "ans": "A", "expk": "자분은 철금속 전용. [ASA 8232]", "expe": "Magnetic particle is for ferrous only. [ASA 8232]"}, {"id": "c7q63", "ch": 7, "chko": "재료와 공정", "file": "ch07_materials_processes.html", "q  8199]"}, {"id": "c9q28", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "플레어 피팅에 관한 옳은 설명은? (1.AN은 나사와 콘 사이 숄더 존재 2.AC·AN은 재질·색만 다름 3.호환 재질이면 AN·AC 호환)", "qe": "Regarding flare fittings: (1) AN fittings have a shoulder between threads and cone; (2)(3) AC/AN interchangeability claims.", "opts": [{"L": "A", "ko": "1만 옳다", "en": "1"}, {"L": "B", "ko": "1과 3", "en": "1 and 3"}, {"L": "C", "ko": "1·2·3 모두", "en": "1, 2, and 3"}], "ans": "A", "expk": "AN·AC는 나사가 달라 호환 불가 — 1만 참. [ASA 8200]", "expe": "AN and AC are not interchangeable; only 1 is true. [ASA 8200]"}, {"id": "c9q29", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "엔드피팅 간 거리 50인치일 때 호스 최소 길이는?", "qe": "With 50 inches between end fittings, the minimum hose length is", "opts": [{"L": "A", "ko": "54-1/2 in", "en": "54-1/2 inches"}, {"L": "B", "ko": "51-1/2 in", "en": "51-1/2 inches"}, {"L": "C", "ko": "52-1/2 in", "en": "52-1/2 inches"}], "ans": "C", "expk": "5~8% 여유: 50×1.05=52.5\". [ASA 8202]", "expe": "At least 5 percent longer: 52.5 inches. [ASA 8202]"}, {"id": "c9q30", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "3/4인치 OD, 벽두께 0.072의 5052-0 튜브 내경은?", "qe": "A 3/4-inch 0.072-wall 5052-0 tube has an inside dimension of", "opts": [{"L": "A", "ko": "0.606 in", "en": "0.606 inch"}, {"L": "B", "ko": "0.688 in", "en": "0.688 inch"}, {"L": "C", "ko": "0.750 in", "en": "0.750 inch"}], "ans": "A", "expk": "ID=OD−2×벽=0.750−0.144=0.606. [ASA 8204]", "expe": "0.750 − 2(0.072) = 0.606. [ASA 8204]"}, {"id": "c9q31", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "슬리브+너트 2피스 커넥터의 장점은?", "qe": "Two-piece (sleeve and nut) tube connectors eliminate", "opts": [{"L": "A", "ko": "플레어 작업 자체", "en": "The flaring operation"}, {"L": "B", "ko": "조임 시 플레어가 닳아 얇아질 가능성", "en": "The possibility of reducing flare thickness by wiping/ironing"}, {"L": "C", "ko": "렌치 손상", "en": "Wrench damage"}], "ans": "B", "expk": "슬리브가 플레어와 함께 돌아 마모 방지. [ASA 8205]", o expand and shift"}, {"L": "C", "ko": "너트가 걸리면 당겨 맞춰도 된다", "en": "May pull into line"}], "ans": "B", "expk": "굽힘을 넣고, 플레어가 자연스럽게 안착해야. [ASA 8214]", "expe": "Use bends; flares must seat without strain. [ASA 8214]"}, {"id": "c9q36", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "PHDAN 표기가 붙은 라인의 의미는?", "qe": "A line marked with the letters PHDAN is", "opts": [{"L": "A", "ko": "정상·비상 겸용 라인", "en": "Dual-purpose line"}, {"L": "B", "ko": "인체에 위험한 물질 운반", "en": "Used to carry a hazardous substance"}, {"L": "C", "ko": "배출 라인", "en": "A drain line"}], "ans": "B", "expk": "Physically Hazardous/Dangerous. [ASA 8215]", "expe": "Physically hazardous and dangerous. [ASA 8215]"}, {"id": "c9q37", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "배관 식별 색 밴드의 구성은?", "qe": "Identifying color-code bands on aircraft plumbing are composed of", "opts": [{"L": "A", "ko": "단일 색상", "en": "Single colors"}, {"L": "B", "ko": "흰 바탕 검정만", "en": "Black on white only"}, {"L": "C", "ko": "내용물에 따른 1~3가지 대비색", "en": "One to three contrasting colors according to line content"}], "ans": "C", "expk": "색맹 대비 흑색 기호 흰 밴드도 병용. [ASA 8215-1]", "expe": "Plus black geometric symbols for the color-blind. [ASA 8215-1]"}, {"id": "c9q38", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "가압 시 호스의 거동은?", "qe": "Under pressure, a flexible hose", "opts": [{"L": "A", "ko": "길이·지름 모두 팽창", "en": "Expands in both"}, {"L": "B", "ko": "길이 팽창·지름 수축", "en": "Expands length, contracts diameter"}, {"L": "C", "ko": "길이는 수축하고 지름은 팽창한다", "en": "Contracts in length and expands in diameter"}], "ans": "C", "expk": "그래서 설치 시 여유(slack)가 필요. [ASA 8197]", "expe": "Hence the required installation slack. [ASA 8197]"}, {"id": "c9q39", "ch": 9, "chko": "유체 라인과 피팅", "file": "ch09_fluid_lines.html", "qk": "'콜드 플로우(Cold Flow)'란?", "qe": "The term 'cold flow' is generally associated with", "opts": [{"L": "A", "ko": "저온 유체의 영향", "en": "Low-temperature fluid effects"}, {"L": "B", "ko" )입니다.", "expe": "Parts Manufacturer Approval."}, {"id": "c11q10", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "정비 간행물 사용 시 원칙은?", "qe": "When using publications, you must use the:", "opts": [{"L": "A", "ko": "가장 오래된 판", "en": "Oldest edition"}, {"L": "B", "ko": "최신 개정본", "en": "Current revision"}, {"L": "C", "ko": "임의 판", "en": "Any edition"}, {"L": "D", "ko": "번역본만", "en": "Translations only"}], "ans": "B", "expk": "항상 최신 개정본을 사용합니다.", "expe": "Always the current revision."}, {"id": "c11q11", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "인가정비조직(Repair Station)을 규정하는 Part는?", "qe": "Repair stations are certificated under:", "opts": [{"L": "A", "ko": "Part 145", "en": "Part 145"}, {"L": "B", "ko": "Part 61", "en": "Part 61"}, {"L": "C", "ko": "Part 121", "en": "Part 121"}, {"L": "D", "ko": "Part 137", "en": "Part 137"}], "ans": "A", "expk": "Part 145가 인가정비조직을 규정합니다.", "expe": "Part 145 governs repair stations."}, {"id": "c11q12", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "항공정비학교(AMTS)를 규정하는 Part는?", "qe": "Aviation maintenance technician schools are under:", "opts": [{"L": "A", "ko": "Part 147", "en": "Part 147"}, {"L": "B", "ko": "Part 43", "en": "Part 43"}, {"L": "C", "ko": "Part 91", "en": "Part 91"}, {"L": "D", "ko": "Part 39", "en": "Part 39"}], "ans": "A", "expk": "Part 147이 정비학교를 규정합니다.", "expe": "Part 147 governs AMT schools."}, {"id": "c11q13", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "예방정비 목록이 있는 곳은?", "qe": "The list of preventive maintenance items is in:", "opts": [{"L": "A", "ko": "Part 43 Appendix A", "en": "Part 43 Appendix A"}, {"L": "B", "ko": "Part 65 본문", "en": "Part 65 body"}, {"L": "C", "ko": "AC 20-5", "en": "AC 20-5"}, {"L": "D", "ko": "TCDS", "en": "TCDS"}], "ans": "A", "expk": "Part 43 부록 A에 대수리·대개조·예방정비 목록이 있습니다.", "expe": "Part 43 Appendix A lists them."}, {"id": "c11q14", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "100시간 검사의 범위(Scope)를 정한 곳은?", "qe": "The scope of the 100-hour inspection is defined in:", "opts": [{"L": "A", "ko": "Part 43 Appendix D", "en": "Part 43 Appendix D"}, {"L": "B", "ko": "Part 21", "en": "Part 21"}, {"L": "C", "ko": "Part 39", "en": "Part 39"}, {"L": "D", "ko": "POH", "en": "POH"}], "ans": "A", "expk": "Appendix D가 연차·100시간 검사 항목을 규정합니다.", "expe": "Appendix D lists annual/100-hour items."}, {"id": "c11q15", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "100시간 검사는 어떤 항공기에 요구되는가?", "qe": "A 100-hour inspection is required for aircraft:", "opts": [{"L": "A", "ko": "유상 운송·교습 사용", "en": "Carrying persons for hire or flight instruction"}, {"L": "B", "ko": "모든 개인 항공기", "en": "All private aircraft"}, {"L": "C", "ko": "군용기", "en": "Military"}, {"L": "D", "ko": "글라이더만", "en": "Gliders only"}], "ans": "A", "expk": "유상 운송·유상 교습에 쓰이는 항공기에 적용됩니다.", "expe": "For hire or for-hire instruction aircraft."}, {"id": "c11q16", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "100시간 검사의 초과 허용은?", "qe": "The 100-hour limit may be exceeded by:", "opts": [{"L": "A", "ko": "검사장소 이동 목적 최대 10시간", "en": "Up to 10 hours to reach the inspection place"}, {"L": "B", "ko": "무제한", "en": "Unlimited"}, {"L": "C", "ko": "불허", "en": "Never"}, {"L": "D", "ko": "50시간", "en": "50 hours"}], "ans": "A", "expk": "검사 장소까지 이동 목적으로 최대 10시간 초과 가능(다음 주기에서 차감).", "expe": "Up to 10 hours en route; excess deducted from next interval."}, {"id": "c11q17", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "항공기 감항증명서의 유효 조건은?", "qe": "An airworthiness certificate remains valid as long as:", "opts": [{"L": "A", "ko": "규정 정비·검사로 감항성 유지", "en": "The aircraft is maintained per regulations"}, {"L": "B", "ko": "1년마다 재발급", "en": "Renewed yearly"}, {"L": "C", "ko": "도색 유지", "en": "Paint kept"}, {"L": "D", "ko": "연료 만재", "en": "Fuel full"}], "ans": "A", "expk": "규정에 따라 정비·검사되어 감항성이 유지되는 동안 유효합니다.", "expe": "Valid while maintained/inspected per the regulations."}, {"id": "c11q18", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "TSO(기술표준품 승인)의 의미는?", "qe": "A TSO (Technical Standard Order) approval means the article:", "opts": [{"L": "A", "ko": "최소 성능 표준 충족", "en": "Meets minimum performance standards"}, {"L": "B", "ko": "장착 승인 자동 부여", "en": "Automatic installation approval"}, {"L": "C", "ko": "무상 제공", "en": "Free issue"}, {"L": "D", "ko": "군용 전용", "en": "Military only"}], "ans": "A", "expk": "TSO는 부품 성능 표준 충족 증명이며, 장착 승인은 별도입니다.", "expe": "TSO shows performance standard compliance; installation approval is separate."}, {"id": "c11q19", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "특별감항정보회보(SAIB)의 성격은?", "qe": "A Special Airworthiness Information Bulletin (SAIB) is:", "opts": [{"L": "A", "ko": "정보 제공(비강제)", "en": "Informational, not mandatory"}, {"L": "B", "ko": "법적 강제", "en": "Mandatory"}, {"L": "C", "ko": "AD와 동일", "en": "Same as an AD"}, {"L": "D", "ko": "형식증명", "en": "A type certificate"}], "ans": "A", "expk": "SAIB는 안전 정보 제공용으로 강제성이 없습니다.", "expe": "SAIBs share safety info; they are not regulatory."}, {"id": "c11q20", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "14 CFR에서 'shall'과 'may'의 차이는?", "qe": "In regulations, 'shall' vs 'may' means:", "opts": [{"L": "A", "ko": "의무 vs 재량", "en": "Mandatory vs discretionary"}, {"L": "B", "ko": "같은 뜻", "en": "Same meaning"}, {"L": "C", "ko": "권장 vs 금지", "en": "Advice vs ban"}, {"L": "D", "ko": "과거 vs 미래", "en": "Past vs future"}], "ans": "A", "expk": "shall=의무, may=재량(허용)입니다.", "expe": "'Shall' is mandatory; 'may' is permissive."}, {"id": "c11q21", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "'항공기 대수리(major repair)'의 승인·복귀는 누가 할 수 있는가?", "qe": "A major repair may be approved for return to service by", "opts": [{"L": "A", "ko": "적절한 등급 IA 또는 인가받은 수리시설", "en": "An appropriately rated IA or certificated repair station"}, {"L": "B", "ko": "모든 A&P 정비사", "en": "Any certificated A&P mechanic"}, {"L": "C", "ko": "기장(PIC)", "en": "The pilot in command"}], "ans": "A", "expk": "대수리 복귀는 IA(감독검사관) 또는 인가 수리시설 권한. [ASA 8506]", "expe": "Major repairs require an IA or repair station. [ASA 8506]"}, {"id": "c11q22", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "14 CFR Part 1 에서 '시간(time in service)'의 정의는?", "qe": "'Time in service,' with respect to maintenance records, means the time from the moment", "opts": [{"L": "A", "ko": "엔진 시동 시각부터 정지까지", "en": "engine start until shutdown"}, {"L": "B", "ko": "항공기가 이륙을 위해 지면을 떠난 순간부터 착륙 접지까지", "en": "an aircraft leaves the ground until it touches down"}, {"L": "C", "ko": "블록아웃부터 블록인까지", "en": "block-out to block-in"}], "ans": "B", "expk": "이륙 접지 이탈~착륙 접지 시간. [ASA 8443]", "expe": "Wheels-off to wheels-on. [ASA 8443]"}, {"id": "c11q23", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "'정비(maintenance)'에 포함되지 않는 것은?", "qe": "Which is NOT included in the definition of maintenance?", "opts": [{"L": "A", "ko": "예방정비(preventive maintenance)", "en": "preventive maintenance"}, {"L": "B", "ko": "점검·수리·개조·오버홀", "en": "inspection, repair, alteration, overhaul"}, {"L": "C", "ko": "제작사의 초기 제조 공정", "en": "the original manufacturing process"}], "ans": "A", "expk": "정비 정의는 검사·오버홀·수리·보전·개조 — 예방정비는 별도 정의. [ASA 8446]", "expe": "Maintenance excludes preventive maintenance (defined separately). [ASA 8446]"}, {"id": "c11q24", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "형식증명자료표(TCDS)에서 확인할 수 있는 것은?", "qe": "The Type Certificate Data Sheet (TCDS) provides", "opts": [{"L": "A", "ko": "해당 기종의 AD 목록", "en": "a list of ADs for the model"}, {"L": "B", "ko": "정비사 자격 요건", "en": "mechanic certification requirements"}, {"L": "C", "ko": "기종의 인증 한계·제원(엔진·연료·한계 등)", "en": "the certification limitations and specifications for the type"}], "ans": "C", "expk": "TCDS는 승인 엔진·연료등급·무게·CG한계 등 형식 제원. [ASA 8492]", "expe": "TCDS lists approved engines, fuel, limits, CG range. [ASA 8492]"}, {"id": "c11q25", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "TCDS 에 명시되는 항목은?", "qe": "Which item is listed on a Type Certificate Data Sheet?", "opts": [{"L": "A", "ko": "최근 AD 발효일", "en": "latest AD effective date"}, {"L": "B", "ko": "항공사 운항 스케줄", "en": "operator schedules"}, {"L": "C", "ko": "엔진 한계 및 승인 프로펠러", "en": "engine limits and approved propellers"}], "ans": "C", "expk": "승인 엔진·프로펠러·한계 등 형식 제원 수록. [ASA 8493]", "expe": "Approved engine/propeller and limits. [ASA 8493]"}, {"id": "c11q26", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "TCDS 상 '기준선(datum)'의 위치는 무엇을 위한 것인가?", "qe": "The datum shown on a TCDS is used as a reference for", "opts": [{"L": "A", "ko": "무게중심(CG) 및 아암 계산의 기준점", "en": "weight-and-balance arm and CG computations"}, {"L": "B", "ko": "연료 용량 측정", "en": "fuel quantity"}, {"L": "C", "ko": "전기 접지 기준", "en": "electrical ground"}], "ans": "C", "expk": "Datum은 W&B 아암·CG 산정 기준(정답 표기 C). [ASA 8495]", "expe": "Datum is the W&B reference point. [ASA 8495]"}, {"id": "c11q27", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "내구성 검사·수리 시 승인된 자료가 없을 때 사용할 수 있는 허용 데이터는?", "qe": "When no manufacturer data exists, acceptable data for a repair may be found in", "opts": [{"L": "A", "ko": "기장 로그북", "en": "the pilot logbook"}, {"L": "B", "ko": "AC 43.13-1B/2B (승인 시 approved data)", "en": "AC 43.13-1B/2B (approved when accepted by FAA)"}, {"L": "C", "ko": "항공사 광고 자료", "en": "operator advertising"}], "ans": "B", "expk": "AC 43.13은 허용 데이터, FSDO 승인 시 승인 데이터로 사용. [ASA 8496]", "expe": "AC 43.13 is acceptable data, approved when FAA accepts it. [ASA 8496]"}, {"id": "c11q28", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "감항성 개선지시(AD)의 준수 책임은 최종적으로 누구에게 있는가?", "qe": "Ultimate responsibility for AD compliance rests with the", "opts": [{"L": "A", "ko": "항공기 제작사", "en": "aircraft manufacturer"}, {"L": "B", "ko": "FAA", "en": "FAA"}, {"L": "C", "ko": "항공기 소유자/운용자", "en": "aircraft owner/operator"}], "ans": "C", "expk": "소유자·운용자가 AD 준수의 최종 책임. [ASA 8500]", "expe": "The owner/operator is responsible for AD compliance. [ASA 8500]"}, {"id": "c11q29", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "AD 는 언제 준수해야 하는가?", "qe": "Compliance with an Airworthiness Directive is", "opts": [{"L": "A", "ko": "권고사항으로 선택적", "en": "optional, advisory only"}, {"L": "B", "ko": "제작사 동의 시에만", "en": "only if the manufacturer agrees"}, {"L": "C", "ko": "AD에 명시된 시기·조건에 따라 의무적으로", "en": "mandatory as specified in the AD"}], "ans": "C", "expk": "AD는 규정으로 의무 준수. [ASA 8501]", "expe": "ADs are regulatory and mandatory. [ASA 8501]"}, {"id": "c11q30", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "정비 후 사용가능 복귀(return to service) 기록에 반드시 포함되는 것은?", "qe": "An approval for return to service after maintenance must include", "opts": [{"L": "A", "ko": "작업 내용·날짜·서명·자격증 종류 및 번호", "en": "description, date, signature, certificate type and number"}, {"L": "B", "ko": "소유자 주소만", "en": "owner address only"}, {"L": "C", "ko": "다음 검사 예정일만", "en": "next due date only"}], "ans": "B", "expk": "작업설명·완료일·서명·자격번호 필수(정답 표기 B). [ASA 8449]", "expe": "Record needs description, date, signature, certificate number. [ASA 8449]"}, {"id": "c11q31", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "연차검사(annual inspection)를 수행·승인할 수 있는 사람은?", "qe": "An annual inspection may be performed and approved by", "opts": [{"L": "A", "ko": "A&P 정비사", "en": "an A&P mechanic"}, {"L": "B", "ko": "IA(감독검사관 자격 보유 정비사)", "en": "a mechanic holding Inspection Authorization"}, {"L": "C", "ko": "반복정비 자격 소지자", "en": "a repairman"}], "ans": "B", "expk": "연차검사는 IA만 승인 가능. [ASA 8510]", "expe": "Only an IA can approve an annual. [ASA 8510]"}, {"id": "c11q32", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "100시간 검사(100-hour inspection)를 수행·승인할 수 있는 사람은?", "qe": "A 100-hour inspection may be approved for return to service by", "opts": [{"L": "A", "ko": "IA만", "en": "an IA only"}, {"L": "B", "ko": "적절한 등급의 A&P 정비사", "en": "an appropriately rated A&P mechanic"}, {"L": "C", "ko": "반복정비사만", "en": "a repairman only"}], "ans": "B", "expk": "100시간 검사는 A&P가 승인 가능(연차와 달리 IA 불필요). [ASA 8511]", "expe": "An A&P (not necessarily IA) may approve a 100-hour. [ASA 8511]"}, {"id": "c11q33", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "100시간 검사 시한은 최대 몇 시간까지 초과 비행이 허용되며, 초과분은 어떻게 처리하는가?", "qe": "The 100-hour limit may be exceeded by not more than 10 hours to reach a place of inspection, and the excess time", "opts": [{"L": "A", "ko": "다음 100시간에 가산하지 않는다", "en": "is not counted"}, {"L": "B", "ko": "다음 100시간 도래 시각을 계산할 때 차감한다", "en": "must be included in computing the next 100 hours"}, {"L": "C", "ko": "무시한다", "en": "is ignored"}], "ans": "B", "expk": "초과 10시간은 다음 주기 계산에서 차감. [ASA 8508]", "expe": "Overflown time is deducted from the next interval. [ASA 8508]"}, {"id": "c11q34", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "항공기 감항성(airworthy) 판정의 두 조건은?", "qe": "For an aircraft to be considered airworthy, it must", "opts": [{"L": "A", "ko": "형식설계에 합치하고 안전운항 상태일 것", "en": "conform to type design and be in condition for safe operation"}, {"L": "B", "ko": "도장 상태가 양호할 것", "en": "have good paint"}, {"L": "C", "ko": "보험이 유효할 것", "en": "have valid insurance"}], "ans": "B", "expk": "형식설계 합치 + 안전운항 가능 상태(정답 표기 B). [ASA 8462]", "expe": "Conforms to type design and is safe to operate. [ASA 8462]"}, {"id": "c11q35", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "예방정비(preventive maintenance)에 해당하는 작업은?", "qe": "Which is classified as preventive maintenance?", "opts": [{"L": "A", "ko": "엔진 실린더 교환", "en": "replacing an engine cylinder"}, {"L": "B", "ko": "랜딩기어 타이어 교체 등 Part 43 부록 A(c) 목록 작업", "en": "tasks listed in Part 43, Appendix A(c) such as replacing tires"}, {"L": "C", "ko": "날개 대수리", "en": "major wing repair"}], "ans": "B", "expk": "예방정비는 Part 43 부록 A(c)에 열거된 단순 작업. [ASA 8504]", "expe": "Preventive maintenance is limited to Part 43 App. A(c) items. [ASA 8504]"}, {"id": "c11q36", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "항공기 '대개조(major alteration)'로 분류되는 것은?", "qe": "A major alteration is one that", "opts": [{"L": "A", "ko": "제작사 승인 키트로 규정대로 수행되는 개조", "en": "is done per manufacturer kit"}, {"L": "B", "ko": "무게·평형·구조강도·성능 등에 상당한 영향을 주고 규정대로 수행되지 않으면 감항성에 영향", "en": "appreciably affects weight, balance, structural strength, or performance"}, {"L": "C", "ko": "좌석 커버 교체", "en": "seat cover change"}], "ans": "B", "expk": "무게·평형·구조·성능에 상당 영향 → 대개조. [ASA 8505]", "expe": "Major alterations appreciably affect weight, balance, structure, performance. [ASA 8505]"}, {"id": "c11q37", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "대수리/대개조 완료 시 작성하는 서식은?", "qe": "A major repair or major alteration is recorded on", "opts": [{"L": "A", "ko": "FAA Form 8130-3", "en": "FAA Form 8130-3"}, {"L": "B", "ko": "FAA Form 337", "en": "FAA Form 337"}, {"L": "C", "ko": "기체 로그북만", "en": "the airframe logbook only"}], "ans": "C", "expk": "대수리·대개조는 Form 337 작성(정답 표기 C 매핑). [ASA 8503-1]", "expe": "Major repairs/alterations use Form 337. [ASA 8503-1]"}, {"id": "c11q38", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "AC 43.13-1B 의 성격은?", "qe": "Advisory Circular 43.13-1B is", "opts": [{"L": "A", "ko": "의무 규정", "en": "mandatory regulation"}, {"L": "B", "ko": "제작사 정비교범", "en": "manufacturer manual"}, {"L": "C", "ko": "허용 가능한(그러나 필수는 아닌) 정비 기법·기준 자료", "en": "acceptable methods, techniques, and practices — not mandatory"}], "ans": "C", "expk": "AC 43.13은 허용 기법 안내서(의무 아님). [ASA 8535]", "expe": "AC 43.13 gives acceptable, non-mandatory methods. [ASA 8535]"}, {"id": "c11q39", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "AD 준수 후 반드시 기록해야 하는 항목이 아닌 것은?", "qe": "Which is NOT required in an AD compliance record entry?", "opts": [{"L": "A", "ko": "AD 번호와 개정판", "en": "AD number and revision"}, {"L": "B", "ko": "준수 방법 및 날짜", "en": "method and date of compliance"}, {"L": "C", "ko": "항공기 도장 색상", "en": "the aircraft paint color"}], "ans": "C", "expk": "AD 기록엔 번호·방법·날짜·반복주기 필요, 도장색은 무관. [ASA 8537]", "expe": "AD record needs number, method, date — not paint color. [ASA 8537]"}, {"id": "c11q40", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "경정비(minor repair)를 승인·복귀할 수 있는 사람은?", "qe": "A minor repair may be approved for return to service by", "opts": [{"L": "A", "ko": "적절한 등급의 A&P 정비사", "en": "an appropriately rated A&P mechanic"}, {"L": "B", "ko": "IA만", "en": "an IA only"}, {"L": "C", "ko": "조종사", "en": "a pilot"}], "ans": "A", "expk": "경수리는 A&P 정비사가 승인 가능. [ASA 8520]", "expe": "A minor repair may be signed off by an A&P. [ASA 8520]"}, {"id": "c11q41", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "항공기 감항증명서(Airworthiness Certificate)는 언제까지 유효한가?", "qe": "A standard airworthiness certificate remains valid", "opts": [{"L": "A", "ko": "1년", "en": "one year"}, {"L": "B", "ko": "엔진 오버홀 시까지", "en": "until engine overhaul"}, {"L": "C", "ko": "정비·검사·유지관리 요건을 충족하는 한 무기한", "en": "as long as maintenance, inspection, and registration requirements are met"}], "ans": "C", "expk": "요건 충족 시 무기한 유효. [ASA 8447]", "expe": "Valid indefinitely while requirements are met. [ASA 8447]"}, {"id": "c11q42", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "14 CFR Part 43 이 적용되지 않는 항공기는?", "qe": "Part 43 does NOT apply to", "opts": [{"L": "A", "ko": "표준 감항증명 항공기", "en": "standard airworthiness aircraft"}, {"L": "B", "ko": "실험용(experimental) 등 특정 항공기", "en": "aircraft holding certain experimental certificates"}, {"L": "C", "ko": "모든 등록 항공기", "en": "all registered aircraft"}], "ans": "C", "expk": "Part 43은 실험분류 등 일부 예외(정답 표기 C 매핑). [ASA 8521]", "expe": "Part 43 has exceptions such as certain experimental aircraft. [ASA 8521]"}, {"id": "c11q43", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "정비 기록에서 개조 후 무게·평형 변경 시 갱신해야 하는 것은?", "qe": "After an alteration that changes weight and balance, the mechanic must update the", "opts": [{"L": "A", "ko": "현재 자중·자중 CG 및 장비목록", "en": "current empty weight, empty-weight CG, and equipment list"}, {"L": "B", "ko": "연료 등급표", "en": "fuel grade chart"}, {"L": "C", "ko": "AD 목록만", "en": "AD list only"}], "ans": "A", "expk": "W&B 변화 시 자중·CG·장비목록 갱신. [ASA 8522]", "expe": "Update empty weight, CG, and equipment list. [ASA 8522]"}, {"id": "c11q44", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "정비 규정상 '오버홀(overhaul)'의 의미는?", "qe": "To 'overhaul' a component means to", "opts": [{"L": "A", "ko": "외관만 재도장", "en": "repaint only"}, {"L": "B", "ko": "분해·세척·검사·수리·재조립하여 승인 기준에 맞게 복원", "en": "disassemble, clean, inspect, repair as necessary, and reassemble to approved standards"}, {"L": "C", "ko": "신품으로 교체", "en": "replace with new"}], "ans": "C", "expk": "오버홀은 분해·검사·수리·재조립 후 시험(정답 표기 C 매핑). [ASA 8527]", "expe": "Overhaul = disassemble, inspect, repair, reassemble, test. [ASA 8527]"}, {"id": "c11q45", "ch": 11, "chko": "규정과 정비 간행물", "file": "ch11_regulations.html", "qk": "'재생(rebuilt)' 엔진을 신품 한계로 복원·인증할 수 있는 자는?", "qe": "An engine may be described as 'rebuilt' only when reconditioned to new limits by", "opts": [{"L": "A", "ko": "임의의 A&P 정비사", "en": "any A&P mechanic"}, {"L": "B", "ko": "IA", "en": "an IA"}, {"L": "C", "ko": "제작사 또는 제작사 승인 기관", "en": "the manufacturer or an agency approved by the manufacturer"}], "ans": "C", "expk": "Rebuilt 인증은 제작사(또는 승인기관)만. [ASA 8530]", "expe": "Only the manufacturer (or approved agency) may certify 'rebuilt.' [ASA 8530]"}, {"id": "c12q1", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "A&P가 단독으로 최종 승인할 수 없는 것은?", "qe": "Which can an A&P NOT approve alone?", "opts": [{"L": "A", "ko": "소수리", "en": "Minor repair"}, {"L": "B", "ko": "대개조 최종 승인", "en": "Major alteration final approval"}, { ivileges.html", "qk": "정비사가 작업을 감독할 때 지켜야 할 원칙은?", "qe": "A mechanic supervising others must", "opts": [{"L": "A", "ko": "현장을 떠나도 된다", "en": "may leave the area"}, {"L": "B", "ko": "감독 대상 작업을 스스로 수행할 능력이 있어야 한다", "en": "be able to perform the work being supervised"}, {"L": "C", "ko": "서류만 확인하면 된다", "en": "only review paperwork"}], "ans": "B", "expk": "감독하려면 본인이 그 작업을 수행할 능력이 있어야 함. [ASA 8532]", "expe": "Supervisor must be able to do the supervised work. [ASA 8532]"}, {"id": "c12q30", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사가 자신의 등급(rating)을 벗어난 작업을 하면?", "qe": "A mechanic performing work outside the scope of his rating", "opts": [{"L": "A", "ko": "해당 등급 자격자의 감독 없이는 승인·복귀할 수 없다", "en": "may not approve it for return to service without proper authority"}, {"L": "B", "ko": "자유롭게 승인 가능", "en": "may freely approve it"}, {"L": "C", "ko": "조종사 승인만 받으면 된다", "en": "needs only pilot approval"}], "ans": "A", "expk": "등급 밖 작업은 권한 밖 — 적절 자격자 필요. [ASA 8533]", "expe": "Work outside a rating can't be signed off without authority. [ASA 8533]"}, {"id": "c12q31", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사 필기시험(knowledge test) 합격 유효기간은?", "qe": "A passed mechanic knowledge test result is valid for", "opts": [{"L": "A", "ko": "무기한", "en": "indefinitely"}, {"L": "B", "ko": "12개월", "en": "12 months"}, {"L": "C", "ko": "24개월 이내에 실기·구술을 완료해야 함", "en": "24 months within which the oral and practical must be completed"}], "ans": "C", "expk": "필기 합격 후 24개월 내 실기·구술 완료 필요. [ASA 8598]", "expe": "Oral/practical must be done within 24 months of the written. [ASA 8598]"}, {"id": "c12q32", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "정비사 자격 취득 최소 연령은?", "qe": "The minimum age to be issued a mechanic certificate is", "opts": [{"L": "A", "ko": "16세", "en": "16"}, {"L": "B", "ko": "18세", "en": "18"}, {"L": "C", "ko": "21세", "en": "21"}], "ans": "B", "expk": "만 18세 이상. [ASA 8516-5]", "expe": "Must be at least 18 years old. [ASA 8516-5]"}, {"id": "c12q33", "ch": 12, "chko": "정비사 권한과 한계", "file": "ch12_privileges.html", "qk": "A&P 정비사가 예방정비를 수행할 수 있는 대상은?", "qe": "An A&P mechanic may perform preventive maintenance on", "opts": [{"L": "A", "ko": "자신이 작업 자격을 가진 항공기 및 부품", "en": "aircraft/appliances for which he is rated"}, {"L": "B", "ko": "오직 자신 소유 항공기", "en": "only aircraft he owns"}, {"L": "C", "ko": "조종사 동승 시에만", "en": "only with a pilot aboard"}], "ans": "B", "expk": "등급 범위 내 항공기·부품에 예방정비 수행(정답 표기 B 매핑). [ASA 8520-1]", "expe": "May do preventive maintenance within his rating. [ASA 8520-1]"}, {"id": "c13q1", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "정비 기록에 포함되지 않아도 되는 것은?", "qe": "Which is NOT required in a maintenance record?", "opts": [{"L": "A", "ko": "작업 설명", "en": "Work description"}, {"L": "B", "ko": "완료일", "en": "Completion date"}, {"L": "C", "ko": "정비사 급여", "en": "Mechanic's salary"}, {"L": "D", "ko": "서명·자격번호", "en": "Signature/cert number"}], "ans": "C", "expk": "급여는 기록 요건이 아닙니다.", "expe": "Salary is not required."}, {"id": "c13q2", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "대수리·대개조를 문서화하는 서식은?", "qe": "Which form documents a major repair/alteration?", "opts": [{"L": "A", "ko": "Form 337", "en": "Form 337"}, {"L": "B", "ko": "Form 8130", "en": "Form 8130"}, {"L": "C", "ko": "Form 1", "en": "Form 1"}, {"L": "D", "ko": "W-2", "en": "W-2"}], "ans": "A", "expk": "FAA Form 337입니다.", "expe": "FAA Form 337."}, {"id": "c13q3", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "소개조(Minor Alteration)의 통상 기록 방법은?", "qe": "A minor alteration is usually recorded by:", "opts": [{"L": "A", "ko": "Form 337", "en": "Form 337"}, {"L": "B", "ko": "항공일지 기재", "en": "Logbook entry"}, {"L": "C", "ko": "기록 불필요", "en": "No record"}, {"L": "D", "ko": "FAA 방문", "en": "FAA visit"}], "ans": "B", "expk": "항공일지 기재로 충분합니다.", "expe": "A logbook entry suffices."}, {"id": "c13q4", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "AD 준수 기록에 없어도 되는 것은?", "qe": "Which is NOT needed in an AD record?", "opts": [{"L": "A", "ko": "AD 번호", "en": "AD number"}, {"L": "B", "ko": "준수 방법", "en": "Method of compliance"}, {"L": "C", "ko": "준수일/시간", "en": "Date/time"}, {"L": "D", "ko": "조종사 이름", "en": "Pilot's name"}], "ans": "D", "expk": "조종사 이름은 필요 없습니다.", "expe": "The pilot's name is not required."}, {"id": "c13q5", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "항공기 수명 내내 보존해야 하는 기록은?", "qe": "Which record is kept for the life of the aircraft?", "opts": [{"L": "A", "ko": "영구 기록(AD·수명한계 등)", "en": "Permanent (AD, life limits)"}, {"L": "B", "ko": "일일 청소 기록", "en": "Daily cleaning log"}, {"L": "C", "ko": "급유 영수증", "en": "Fuel receipts"}, {"L": "D", "ko": "임시 메모", "en": "Scratch notes"}], "ans": "A", "expk": "AD·수명한계·개조 등 영구 기록입니다.", "expe": "Permanent records like ADs and life limits."}, {"id": "c13q6", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "일반 정비 기록의 최소 보존은?", "qe": "Minimum retention of routine records is:", "opts": [{"L": "A", "ko": "1년 또는 대체 시까지", "en": "1 year or until superseded"}, {"L": "B", "ko": "1일", "en": "1 day"}, {"L": "C", "ko": "10년", "en": "10 years"}, {"L": "D", "ko": "영구", "en": "Forever"}], "ans": "A", "expk": "대체되거나 최소 1년입니다.", "expe": "Until superseded or at least one year."}, {"id": "c13q7", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "항공일지 오기 정정 시 올바른 방법은?", "qe": "Correct way to fix a logbook error:", "opts": [{"L": "A", "ko": "지우개로 삭제", "en": "Erase it"}, {"L": "B", "ko": "한 줄 긋고 정정·서명", "en": "Single line, re-enter, sign"}, {"L": "C", "ko": "페이지 찢기", "en": "Tear the page"}, {"L": "D", "ko": "덧칠", "en": "Paint over"}], "ans": "B", "expk": "원문이 보이도록 한 줄 긋고 정정·서명합니다.", "expe": "Line through, re-enter, and sign."}, {"id": "c13q8", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "매각 시 영구 기록은?", "qe": "On sale, permanent records:", "opts": [{"L": "A", "ko": "폐기", "en": "Are discarded"}, {"L": "B", "ko": "새 소유자에게 인계", "en": "Transfer to new owner"}, {"L": "C", "ko": "정비사 보관", "en": "Kept by mechanic"}, {"L": "D", "ko": "FAA 파기", "en": "Destroyed by FAA"}], "ans": "B", "expk": "새 소유자에게 인계합니다.", "expe": "They go to the new owner."}, {"id": "c13q9", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "수명한계(Life-Limited) 부품 기록에서 추적하는 것은?", "qe": "For life-limited parts, records track:", "opts": [{"L": "A", "ko": "색상", "en": "Color"}, {"L": "B", "ko": "잔여 시간/사이클", "en": "Remaining time/cycles"}, {"L": "C", "ko": "가격", "en": "Price"}, {"L": "D", "ko": "무게", "en": "Weight"}], "ans": "B", "expk": "잔여 사용 시간/사이클을 추적합니다.", "expe": "Remaining time or cycles."}, {"id": "c13q10", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "기록 서명이 확인하는 것은?", "qe": "A record signature affirms the work was:", "opts": [{"L": "A", "ko": "빠르게 됨", "en": "Done fast"}, {"L": "B", "ko": "감항성 있게 수행됨", "en": "Done in an airworthy manner"}, {"L": "C", "ko": "저렴함", "en": "Cheap"}, {"L": "D", "ko": "외주됨", "en": "Outsourced"}], "ans": "B", "expk": "감항성 있게 수행되었음을 확인합니다.", "expe": "Performed in an airworthy manner."}, {"id": "c13q11", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "검사 후 감항성 없다고 판정되면 정비사는?", "qe": "If an inspection finds the aircraft unairworthy, the mechanic:", "opts": [{"L": "A", "ko": "결함 목록을 소유자에게 제공", "en": "Gives the owner a list of discrepancies"}, {"L": "B", "ko": "비밀 유지", "en": "Keeps it secret"}, {"L": "C", "ko": "무조건 복귀 승인", "en": "Approves anyway"}, {"L": "D", "ko": "항공기 압류", "en": "Seizes the aircraft"}], "ans": "A", "expk": "미결 결함 목록을 소유자에게 서면 제공합니다.", "expe": "Provide a signed list of discrepancies to the owner."}, {"id": "c13q12", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "연차검사 기록 서명에 필요한 문구는?", "qe": "An annual inspection entry must state the aircraft was:", "opts": [{"L": "A", "ko": "검사 범위·감항 여부 판정", "en": "Inspected per annual scope with airworthiness determination"}, {"L": "B", "ko": "세척 완료", "en": "Washed"}, {"L": "C", "ko": "급유 완료", "en": "Fueled"}, {"L": "D", "ko": "도색 완료", "en": "Painted"}], "ans": "A", "expk": "검사 종류와 감항성 판정 문구를 포함해야 합니다.", "expe": "It must identify the inspection and the airworthiness determination."}, {"id": "c13q13", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "Form 337 사본의 FAA 제출 기한은?", "qe": "A copy of Form 337 must go to the FAA within:", "opts": [{"L": "A", "ko": "48시간", "en": "48 hours"}, {"L": "B", "ko": "30일", "en": "30 days"}, {"L": "C", "ko": "1년", "en": "1 year"}, {"L": "D", "ko": "불필요", "en": "Never"}], "ans": "A", "expk": "작업 완료 후 48시간 이내 제출합니다.", "expe": "Within 48 hours of completing the work."}, {"id": "c13q14", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "연료탱크 내부 수리(대수리) 시 Form 337의 특별 규정은?", "qe": "For fuel tank interior repairs, Form 337:", "opts": [{"L": "A", "ko": "사본 1부를 항공기 내 비치", "en": "An extra copy stays in the aircraft"}, {"L": "B", "ko": "작성 불필요", "en": "Not required"}, {"L": "C", "ko": "조종사 보관", "en": "Pilot keeps it"}, {"L": "D", "ko": "즉시 폐기", "en": "Discarded"}], "ans": "A", "expk": "연료탱크·연료계통 대수리는 사본을 기내 비치합니다.", "expe": "A copy must be kept in the aircraft."}, {"id": "c13q15", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "작업 기록에서 '설명'은 어느 정도여야 하는가?", "qe": "The work description in a record must be:", "opts": [{"L": "A", "ko": "작업 파악에 충분한 상세", "en": "Detailed enough to identify the work"}, {"L": "B", "ko": "한 단어", "en": "One word"}, {"L": "C", "ko": "생략 가능", "en": "Optional"}, {"L": "D", "ko": "암호", "en": "Coded"}], "ans": "A", "expk": "수행 작업을 특정할 수 있을 만큼 상세해야 합니다.", "expe": "Sufficient detail to identify what was done."}, {"id": "c13q16", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "부품 이력 추적에 쓰이는 태그는?", "qe": "Part history is documented with:", "opts": [{"L": "A", "ko": "8130-3 등 릴리스 서류", "en": "Release documents like 8130-3"}, {"L": "B", "ko": "가격표", "en": "Price tags"}, {"L": "C", "ko": "우편 라벨", "en": "Mail labels"}, {"L": "D", "ko": "없음", "en": "Nothing"}], "ans": "A", "expk": "Form 8130-3 등 릴리스 태그로 추적합니다.", "expe": "Release tags such as Form 8130-3."}, {"id": "c13q17", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "전자 정비기록의 인정 여부는?", "qe": "Electronic maintenance records are:", "opts": [{"L": "A", "ko": "요건 충족 시 인정", "en": "Acceptable if requirements are met"}, {"L": "B", "ko": "금지", "en": "Prohibited"}, {"L": "C", "ko": "종이만 인정", "en": "Paper only"}, {"L": "D", "ko": "비공식", "en": "Informal only"}], "ans": "A", "expk": "내용 요건을 충족하면 전자 기록도 인정됩니다.", "expe": "Acceptable when content requirements are met."}, {"id": "c13q18", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "이월(Deferred)된 결함의 관리 방법은?", "qe": "Deferred discrepancies must be:", "opts": [{"L": "A", "ko": "목록화·표시·기한 관리", "en": "Listed, placarded, time-tracked"}, {"L": "B", "ko": "숨김", "en": "Hidden"}, {"L": "C", "ko": "즉시 삭제", "en": "Deleted"}, {"L": "D", "ko": "무시", "en": "Ignored"}], "ans": "A", "expk": "MEL 조건에 따라 목록·플래카드·기한을 관리합니다.", "expe": "Managed per MEL with placards and time limits."}, {"id": "c13q19", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "총사용시간(Time in Service)의 기준은?", "qe": "'Time in service' is measured from:", "opts": [{"L": "A", "ko": "이륙부터 착륙까지", "en": "Takeoff to landing"}, {"L": "B", "ko": "시동부터 정지", "en": "Start to shutdown"}, {"L": "C", "ko": "격납고 출발", "en": "Hangar out"}, {"L": "D", "ko": "연료 주입", "en": "Fueling"}], "ans": "A", "expk": "바퀴가 땅에서 떨어진 때부터 접지까지입니다.", "expe": "Wheels-off to wheels-on."}, {"id": "c13q20", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "소유자 변경 시 정비기록은?", "qe": "When an aircraft is sold, maintenance records:", "opts": [{"L": "A", "ko": "새 소유자에게 이전", "en": "Transfer to the buyer"}, {"L": "B", "ko": "판매자 보관", "en": "Stay with seller"}, {"L": "C", "ko": "FAA 반납", "en": "Return to FAA"}, {"L": "D", "ko": "폐기", "en": "Discarded"}], "ans": "A", "expk": "기록은 항공기와 함께 새 소유자에게 넘어갑니다.", "expe": "They transfer with the aircraft."}, {"id": "c13q21", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "정비 기록의 유지 책임은 누구에게 있는가?", "qe": "Responsibility for maintaining aircraft maintenance records rests with the", "opts": [{"L": "A", "ko": "정비사", "en": "mechanic"}, {"L": "B", "ko": "소유자 또는 운용자", "en": "owner or operator"}, {"L": "C", "ko": "FAA", "en": "FAA"}], "ans": "B", "expk": "기록 보존 책임은 소유자·운용자. [ASA 8444]", "expe": "The owner/operator must keep the records. [ASA 8444]"}, {"id": "c13q22", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "영구 보존해야 하는(항공기 매각 시 이관) 기록은?", "qe": "Which records must be retained and transferred with the aircraft when sold?", "opts": [{"L": "A", "ko": "30일 지난 일상점검 기록", "en": "daily checks over 30 days old"}, {"L": "B", "ko": "총 사용시간·현재 검사 상태·AD 준수·대수리·대개조 기록", "en": "total time, current inspection status, AD compliance, major repairs/alterations"}, {"L": "C", "ko": "연료 급유 전표", "en": "fuel receipts"}], "ans": "C", "expk": "영구 기록: 총시간·검사상태·AD·대수리/대개조(정답 표기 C 매핑). [ASA 8448]", "expe": "Permanent records: total time, inspection status, ADs, major work. [ASA 8448]"}, {"id": "c13q23", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "일반 정비 기록(작업 내용 등)은 최소 얼마 동안 보존하는가?", "qe": "General maintenance records must be kept for at least", "opts": [{"L": "A", "ko": "1년 또는 작업이 상위 작업으로 대체될 때까지", "en": "1 year or until the work is repeated/superseded"}, {"L": "B", "ko": "30일", "en": "30 days"}, {"L": "C", "ko": "영구", "en": "forever"}], "ans": "A", "expk": "1년 또는 상위 작업으로 대체될 때까지 보존. [ASA 8450]", "expe": "Kept 1 year or until superseded. [ASA 8450]"}, {"id": "c13q24", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "정비 기록 기재사항으로 반드시 포함되는 것은?", "qe": "A maintenance record entry must include", "opts": [{"L": "A", "ko": "작업 설명, 완료일, 서명·자격증 종류 및 번호", "en": "description of work, date completed, signature and certificate type/number"}, {"L": "B", "ko": "다음 소유자 이름", "en": "the next owner's name"}, {"L": "C", "ko": "작업 시작 시각만", "en": "only the start time"}], "ans": "A", "expk": "작업설명·완료일·서명·자격번호 필수. [ASA 8458]", "expe": "Description, date, signature, certificate number. [ASA 8458]"}, {"id": "c13q25", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "대개조(major alteration) 완료 시 FAA에 사본을 제출하는 서식과 기한은?", "qe": "After a major alteration, a copy of FAA Form 337 must be forwarded to the FAA within", "opts": [{"L": "A", "ko": "30일 (해당 FSDO)", "en": "48 hours"}, {"L": "B", "ko": "즉시", "en": "immediately"}, {"L": "C", "ko": "작업 완료 후 48시간 이내 소유자에게, 사본은 FSDO 제출", "en": "48 hours to the owner; copy to the FSDO within 48 hours"}], "ans": "C", "expk": "Form 337 사본을 48시간 내 FSDO 제출(정답 표기 C 매핑). [ASA 8459]", "expe": "Form 337 copy to FSDO within 48 hours. [ASA 8459]"}, {"id": "c13q26", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "불합격(감항성 불량) 상태로 검사 종료 시 정비사가 소유자에게 제공하는 것은?", "qe": "When an inspection discloses an unairworthy condition, the mechanic must give the owner", "opts": [{"L": "A", "ko": "결함 목록(서명된)", "en": "a signed list of discrepancies"}, {"L": "B", "ko": "구두 통보만", "en": "only verbal notice"}, {"L": "C", "ko": "아무 것도", "en": "nothing"}], "ans": "A", "expk": "결함(불합격) 항목 서명 목록을 소유자에게 제공. [ASA 8452-1]", "expe": "Provide the owner a signed list of discrepancies. [ASA 8452-1]"}, {"id": "c13q27", "ch": 13, "chko": "정비 기록과 서식", "file": "ch13_forms_records.html", "qk": "검사 후 감항성 있음으로 판정 시 기록에 기재하는 문구에 포함되는 것은?", "qe": "An approval-for-return-to-service entry after a required inspection must state that the aircraft is", "opts": [{"L": "A", "ko": "'감항성 있음(airworthy)'과 검사 종류·날짜·서명·자격번호", "en": "'airworthy' with inspection type, date, signature, certificate number"}, {"L": "B", "ko": "도장 완료", "en": "freshly painted"}, {"L": "C", "ko": "세척 완료", "en": "cleaned"}], "ans": "A" ile": "ch15_entering_field.html", "qk": "허위 기록의 결과는?", "qe": "Falsifying records can result in:", "opts": [{"L": "A", "ko": "포상", "en": "A reward"}, {"L": "B", "ko": "자격 취소", "en": "Certificate revocation"}, {"L": "C", "ko": "무관", "en": "No effect"}, {"L": "D", "ko": "승진", "en": "Promotion"}], "ans": "B", "expk": "자격 취소 등 처벌 대상입니다.", "expe": "Revocation and penalties."}, {"id": "c15q10", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "정비사가 평생학습을 해야 하는 이유는?", "qe": "Why must mechanics keep learning?", "opts": [{"L": "A", "ko": "기술이 계속 발전", "en": "Technology keeps evolving"}, {"L": "B", "ko": "규정이 없어서", "en": "No regulations"}, {"L": "C", "ko": "취미로", "en": "As a hobby"}, {"L": "D", "ko": "불필요", "en": "It's unnecessary"}], "ans": "A", "expk": "복합재·전기추진 등 신기술 때문입니다.", "expe": "Because of new tech like composites/electric."}, {"id": "c15q11", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "지식시험 합격의 유효기간은?", "qe": "A passed knowledge test remains valid for:", "opts": [{"L": "A", "ko": "24개월", "en": "24 months"}, {"L": "B", "ko": "12개월", "en": "12 months"}, {"L": "C", "ko": "60개월", "en": "60 months"}, {"L": "D", "ko": "무기한", "en": "Forever"}], "ans": "A", "expk": "24개월 내에 구술·실기를 마쳐야 합니다.", "expe": "Oral/practical must be completed within 24 months."}, {"id": "c15q12", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "구술·실기 시험 불합격 후 재응시는?", "qe": "After failing the oral/practical, retesting requires:", "opts": [{"L": "A", "ko": "30일 대기 또는 추가교육 증명", "en": "30 days or evidence of additional training"}, {"L": "B", "ko": "즉시 무제한", "en": "Immediate unlimited"}, {"L": "C", "ko": "1년 대기", "en": "1-year wait"}, {"L": "D", "ko": "영구 불가", "en": "Never again"}], "ans": "A", "expk": "30일 경과 또는 교관의 추가 교육 확인서가 필요합니다.", "expe": "Wait 30 days or present an instructor's statement of additional instruction."}, {"id": "c15q13", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "군 정비 경력의 인정  "자격·기종 경험·특수 기술", "en": "Certificates, type experience, special skills"}, {"L": "B", "ko": "취미만", "en": "Hobbies only"}, {"L": "C", "ko": "무관 경력", "en": "Unrelated jobs"}, {"L": "D", "ko": "공백기", "en": "Gaps"}], "ans": "A", "expk": "자격증, 기종·계통 경험, NDT 등 특수 기술을 강조합니다.", "expe": "Certificates, aircraft experience, and specialties like NDT."}, {"id": "c15q18", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "항공정비 인력 시장의 현재 추세는?", "qe": "The current AMT labor market shows:", "opts": [{"L": "A", "ko": "숙련 인력 부족·수요 증가", "en": "Shortage of skilled technicians, rising demand"}, {"L": "B", "ko": "공급 과잉", "en": "Oversupply"}, {"L": "C", "ko": "산업 축소", "en": "Shrinking industry"}, {"L": "D", "ko": "자격 불필요", "en": "No certification needed"}], "ans": "A", "expk": "전 세계적으로 정비 인력 수요가 공급을 앞섭니다.", "expe": "Global demand exceeds supply."}, {"id": "c15q19", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "평생학습이 필요한 신기술 분야가 아닌 것은?", "qe": "Which is NOT a growing technology area for AMTs?", "opts": [{"L": "A", "ko": "복합재", "en": "Composites"}, {"L": "B", "ko": "전기추진", "en": "Electric propulsion"}, {"L": "C", "ko": "무인기", "en": "UAS/drones"}, {"L": "D", "ko": "증기기관", "en": "Steam engines"}], "ans": "D", "expk": "증기기관은 항공정비 신기술이 아닙니다.", "expe": "Steam engines are not an aviation growth area."}, {"id": "c15q20", "ch": 15, "chko": "항공정비 취업 입문", "file": "ch15_entering_field.html", "qk": "'의심되면 확인한다'가 뜻하는 태도는?", "qe": "'When in doubt, check it out' reflects:", "opts": [{"L": "A", "ko": "안전 우선·검증 문화", "en": "A safety-first verification culture"}, {"L": "B", "ko": "속도 우선", "en": "Speed first"}, {"L": "C", "ko": "비용 우선", "en": "Cost first"}, {"L": "D", "ko": "무시", "en": "Ignoring doubt"}], "ans": "A", "expk": "불확실하면 자료·측정으로 반드시 확인하는 문화입니다.", "expe": "Verify with data and measurement whenever uncertain."}];
var CHS = [{"no": 1, "ko": "항공 입문", "n": 20}, {"no": 2, "ko": "항공 수학", "n": 81}, {"no": 3, "ko": "기초 물리", "n": 20}, {"no": 4, "ko": "기초 전기", "n": 90}, {"no": 5, "ko": "항공기 도면", "n": 50}, {"no": 6, "ko": "무게와 평형", "n": 63}, {"no": 7, "ko": "재료와 공정", "n": 89}, {"no": 8, "ko": "세척과 부식방지", "n": 67}, {"no": 9, "ko": "유체 라인과 피팅", "n": 54}, {"no": 10, "ko": "지상 운용과 정비지원", "n": 59}, {"no": 11, "ko": "규정과 정비 간행물", "n": 45}, {"no": 12, "ko": "정비사 권한과 한계", "n": 33}, {"no": 13, "ko": "정비 기록과 서식", "n": 30}, {"no": 14, "ko": "정비 공구", "n": 20}, {"no": 15, "ko": "항공정비 취업 입문", "n": 20}];
document.getElementById('bankN').textContent = BANK.length;

var selN = 30, selCh = {}, order = [], answers = {}, cur = 0, timeLeft = 0, tick = null, examSet = [];

var chg = document.getElementById('chgrid');
CHS.forEach(function(c){
  var d = document.createElement('div');
  d.className = 'chbox'; d.textContent = 'Ch.' + c.no + ' ' + c.ko + ' (' + c.n + ')';
  d.onclick = function(){ selCh[c.no] = !selCh[c.no]; d.classList.toggle('sel', !!selCh[c.no]); };
  chg.appendChild(d);
});
document.querySelectorAll('.mode').forEach(function(m){
  m.onclick = function(){
    document.querySelectorAll('.mode').forEach(function(x){x.classList.remove('sel');});
    m.classList.add('sel'); selN = parseInt(m.dataset.n);
  };
});

function getWrong(){ try{return JSON.parse(localStorage.getItem('gen_wrong')||'[]');}catch(e){return [];} }
function setWrong(a){ try{localStorage.setItem('gen_wrong', JSON.stringify(a));}catch(e){} }
(function(){
  var w = getWrong();
  if(w.length){ document.getElementById('wrongCard').style.display='';
    document.getElementById('wrongStat').textContent = '저장된 오답 ' + w.length + '문항 — 다시 풀어 완전히 익히세요.'; }
})();
function clearWrong(){ setWrong([]); location.reload(); }

function shuffle(a){ for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }

function startExam(){
  var pool = BANK.filter(function(q){
    var any = Object.keys(selCh).some(function(k){return selCh[k];});
    return !any || selCh[q.ch];
  });
  if(!pool.length){ alert('선택한 챕터에 문항이 없습니다.'); return; }
  examSet = shuffle(pool.slice()).slice(0, Math.min(selN, pool.length));
  begin();
}
function startWrong(){
  var ids = getWrong();
  var pool = BANK.filter(function(q){ return ids.indexOf(q.id) >= 0; });
  if(!pool.length){ alert('저장된 오답이 없습니다.'); return; }
  examSet = shuffle(pool.slice());
  document.getElementById('result').classList.add('hidden');
  begin();
}
function begin(){
  answers = {}; cur = 0;
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('exam').classList.remove('hidden');
  document.body.classList.toggle('eng-only', document.getElementById('engOnly').checked);
  if(document.getElementById('timerOn').checked){
    timeLeft = Math.round(examSet.length * 72);
    tick = setInterval(function(){
      timeLeft--;
      renderTimer();
      if(timeLeft <= 0){ clearInterval(tick); submitExam(); }
    }, 1000);
  } else { document.getElementById('timer').style.display='none'; }
  renderTimer(); renderDots(); renderQ();
  window.scrollTo(0,0);
}
function renderTimer(){
  if(!document.getElementById('timerOn').checked) return;
  var m = Math.floor(timeLeft/60), s = timeLeft%60;
  var el = document.getElementById('timer');
  el.textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  el.classList.toggle('low', timeLeft < 120);
}
function renderDots(){
  var d = document.getElementById('dots'); d.innerHTML='';
  examSet.forEach(function(q,i){
    var b = document.createElement('div');
    b.className = 'dot' + (answers[q.id]?' answered':'') + (i===cur?' cur':'');
    b.textContent = i+1;
    b.onclick = function(){ cur=i; renderQ(); renderDots(); };
    d.appendChild(b);
  });
}
function renderQ(){
  var q = examSet[cur];
  document.getElementById('prog').textContent = (cur+1) + ' / ' + examSet.length + '  ·  Ch.' + q.ch;
  var h = '<span class="qno-tag">Q' + (cur+1) + ' · CH.' + q.ch + '</span>'
    + '<div class="qtext ko-txt">' + q.qk + '</div>'
    + '<div class="qtext-en">' + q.qe + '</div><ul class="opts">';
  q.opts.forEach(function(o){
    h += '<li data-l="' + o.L + '"' + (answers[q.id]===o.L?' class="sel"':'') + ' onclick="pick(this)">'
      + '<span class="ko-opt">' + o.L + '. ' + o.ko + '</span><span class="en">' + o.L + '. ' + o.en + '</span></li>';
  });
  h += '</ul>';
  document.getElementById('qcard').innerHTML = h;
}
function pick(li){
  var q = examSet[cur];
  answers[q.id] = li.dataset.l;
  renderQ(); renderDots();
  if(cur < examSet.length-1){ setTimeout(function(){ cur++; renderQ(); renderDots(); window.scrollTo(0,0); }, 220); }
}
function move(d){ cur = Math.max(0, Math.min(examSet.length-1, cur+d)); renderQ(); renderDots(); }

function submitExam(){
  if(tick) clearInterval(tick);
  var unanswered = examSet.filter(function(q){return !answers[q.id];}).length;
  if(unanswered && timeLeft > 0){
    if(!confirm('미응답 ' + unanswered + '문항이 있습니다. 채점할까요?')) return;
  }
  var right = 0, wrongIds = getWrong();
  examSet.forEach(function(q){
    if(answers[q.id] === q.ans){ right++;
      var idx = wrongIds.indexOf(q.id); if(idx>=0) wrongIds.splice(idx,1);
    } else { if(wrongIds.indexOf(q.id) < 0) wrongIds.push(q.id); }
  });
  setWrong(wrongIds);
  var pct = Math.round(right/examSet.length*100);
  var pass = pct >= 70;
  document.getElementById('exam').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('scoreBig').textContent = pct + '%';
  document.getElementById('scoreBig').className = 'score-big ' + (pass?'pass':'fail');
  document.getElementById('passTxt').textContent = pass ? '🎉 합격 (PASS) — 합격선 70%' : '불합격 (FAIL) — 합격선 70%';
  document.getElementById('passTxt').style.color = pass ? 'var(--green)' : 'var(--red)';
  document.getElementById('scoreDetail').textContent = '정답 ' + right + ' / ' + examSet.length + '문항 · 오답노트에 ' + getWrong().length + '문항 저장됨';
  var rv = document.getElementById('review'); rv.innerHTML='';
  examSet.forEach(function(q,i){
    var ok = answers[q.id] === q.ans;
    var your = answers[q.id] || '무응답';
    var ansTxt = ''; q.opts.forEach(function(o){ if(o.L===q.ans) ansTxt = o.ko; });
    var d = document.createElement('div');
    d.className = 'rv ' + (ok?'right':'wrong');
    d.innerHTML = '<div class="q">' + (ok?'✅':'❌') + ' Q' + (i+1) + '. ' + q.qk + '</div>'
      + '<div class="meta">내 답: ' + your + ' · 정답: ' + q.ans + ' (' + ansTxt + ') · Ch.' + q.ch + ' ' + q.chko + '</div>'
      + '<div class="exp">' + q.expk + '</div>'
      + '<a href="' + q.file + '">→ Ch.' + q.ch + ' 교재 보기</a>';
    rv.appendChild(d);
  });
  window.scrollTo(0,0);
}
</script>
</body>
