<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FAA General 필기 모의고사 — Exam Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F172A;--panel:#13203b;--panel2:#1a2a4a;--cyan:#60A5FA;--gold:#FBBF24;--green:#34D399;--red:#F87171;
--t1:#F1F5F9;--t2:#CBD5E1;--t3:#7c8db0;--line:rgba(96,165,250,.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t1);font-family:'Noto Sans KR',sans-serif;line-height:1.6;
background-image:linear-gradient(rgba(96,165,250,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(96,165,250,.04) 1px,transparent 1px);background-size:44px 44px;}
a{color:inherit;text-decoration:none;}
.wrap{max-width:860px;margin:0 auto;padding:40px 20px 90px;}
.kicker{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);letter-spacing:3px;}
h1{font-family:'Space Grotesk',sans-serif;font-size:34px;margin:10px 0 4px;}
.sub{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:14px;margin-bottom:26px;}
.card{background:rgba(19,32,59,.95);border:1px solid var(--line);border-radius:14px;padding:24px;margin-bottom:16px;}
.btn{display:inline-block;background:var(--cyan);color:#0F172A;font-weight:700;border:none;border-radius:9px;
padding:12px 22px;font-size:15px;cursor:pointer;font-family:'Noto Sans KR';transition:.15s;}
.btn:hover{transform:translateY(-2px);}
.btn.gold{background:var(--gold);} .btn.ghost{background:transparent;color:var(--t2);border:1px solid var(--line);}
.btn.sm{padding:8px 14px;font-size:13px;}
.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0;}
@media(max-width:640px){.modes{grid-template-columns:1fr;}}
.mode{background:var(--panel2);border:1.5px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;text-align:center;transition:.15s;}
.mode:hover,.mode.sel{border-color:var(--cyan);background:rgba(96,165,250,.12);}
.mode b{font-size:26px;font-family:'Space Grotesk',sans-serif;color:var(--cyan);display:block;}
.mode span{font-size:12.5px;color:var(--t3);}
.chgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
@media(max-width:640px){.chgrid{grid-template-columns:repeat(2,1fr);}}
.chbox{font-size:12.5px;padding:9px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:.12s;}
.chbox.sel{border-color:var(--gold);color:var(--gold);background:rgba(251,191,36,.08);}
.opt-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-top:14px;}
.toggle{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--t2);cursor:pointer;}
.toggle input{accent-color:var(--cyan);width:16px;height:16px;}
/* exam */
.exam-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.timer{font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--gold);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:8px 16px;}
.timer.low{color:var(--red);border-color:var(--red);}
.prog{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--t3);}
.qno-tag{font-family:'Space Grotesk',sans-serif;color:var(--gold);font-size:13px;letter-spacing:1px;}
.qtext{font-size:18px;font-weight:700;margin:8px 0 2px;}
.qtext-en{font-size:13.5px;color:var(--t3);font-style:italic;margin-bottom:16px;}
.opts{list-style:none;}
.opts li{background:var(--panel2);border:1.5px solid var(--line);border-radius:10px;padding:13px 16px;margin-bottom:9px;cursor:pointer;transition:.12s;font-size:15px;}
.opts li:hover{border-color:var(--cyan);}
.opts li.sel{border-color:var(--cyan);background:rgba(96,165,250,.14);}
.opts li .en{display:block;font-size:12px;color:var(--t3);}
.nav-row{display:flex;justify-content:space-between;margin-top:18px;gap:10px;flex-wrap:wrap;}
.dots{display:flex;flex-wrap:wrap;gap:5px;margin-top:16px;}
.dot{width:26px;height:26px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);font-size:11px;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}
.dot.answered{background:rgba(96,165,250,.25);color:var(--cyan);border-color:var(--cyan);}
.dot.cur{outline:2px solid var(--gold);}
/* result */
.score-big{font-family:'Space Grotesk',sans-serif;font-size:56px;font-weight:700;line-height:1;}
.pass{color:var(--green);} .fail{color:var(--red);}
.rv{border-left:3px solid var(--line);padding:12px 16px;margin:12px 0;background:var(--panel2);border-radius:0 10px 10px 0;}
.rv.wrong{border-left-color:var(--red);}
.rv.right{border-left-color:var(--green);}
.rv .q{font-weight:700;font-size:14.5px;}
.rv .meta{font-size:12px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.rv .exp{font-size:13.5px;color:var(--t2);margin-top:7px;}
.rv a{color:var(--cyan);font-size:12.5px;}
.hidden{display:none;}
.top-link{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--cyan);}
.stat-line{font-size:13.5px;color:var(--t3);margin-top:8px;}
.eng-only .ko-txt{display:none;}
.eng-only .qtext-en{font-size:17px;color:var(--t1);font-style:normal;font-weight:700;}
.eng-only .opts li .en{font-size:14.5px;color:var(--t1);}
.eng-only .opts li .ko-opt{display:none;}
</style>
</head>
<body>
<div class="wrap">
<a class="top-link" href="index.html">← 전체 목차 (Master Index)</a>
<div class="kicker" style="margin-top:14px">FAA-H-8083-30B · GENERAL WRITTEN EXAM</div>
<h1>✍️ 필기 모의고사</h1>
<div class="sub">General Exam Simulator — 문제은행 <b id="bankN"></b>문항</div>

<!-- SETUP -->
<div id="setup">
  <div class="card">
    <b style="font-size:17px">출제 방식</b>
    <div class="modes">
      <div class="mode sel" data-n="30"><b>30</b><span>문항 · 36분<br>실전 압축</span></div>
      <div class="mode" data-n="50"><b>50</b><span>문항 · 60분<br>표준 모의고사</span></div>
      <div class="mode" data-n="100"><b>100</b><span>문항 · 120분<br>전 범위 총정리</span></div>
    </div>
    <div class="opt-row">
      <label class="toggle"><input type="checkbox" id="engOnly"> English Only (실전 모드)</label>
      <label class="toggle"><input type="checkbox" id="timerOn" checked> 타이머 사용 (1.2분/문항)</label>
    </div>
  </div>
  <div class="card">
    <b style="font-size:17px">챕터 선택</b> <span style="font-size:12.5px;color:var(--t3)">(미선택 시 전체 챕터에서 무작위)</span>
    <div class="chgrid" id="chgrid"></div>
  </div>
  <div class="card" id="wrongCard" style="display:none">
    <b style="font-size:17px">📕 오답노트</b>
    <div class="stat-line" id="wrongStat"></div>
    <div class="opt-row">
      <button class="btn gold sm" onclick="startWrong()">오답만 다시 풀기</button>
      <button class="btn ghost sm" onclick="clearWrong()">오답노트 비우기</button>
    </div>
  </div>
  <button class="btn" style="font-size:17px;padding:14px 34px" onclick="startExam()">시험 시작 →</button>
</div>

<!-- EXAM -->
<div id="exam" class="hidden">
  <div class="exam-head">
    <span class="prog" id="prog"></span>
    <span class="timer" id="timer">--:--</span>
  </div>
  <div class="card" id="qcard"></div>
  <div class="nav-row">
    <button class="btn ghost" onclick="move(-1)">← 이전</button>
    <button class="btn gold" onclick="submitExam()">채점하기 ✓</button>
    <button class="btn ghost" onclick="move(1)">다음 →</button>
  </div>
  <div class="dots" id="dots"></div>
</div>

<!-- RESULT -->
<div id="result" class="hidden">
  <div class="card" style="text-align:center">
    <div class="score-big" id="scoreBig"></div>
    <div id="passTxt" style="font-size:19px;font-weight:700;margin:6px 0"></div>
    <div class="stat-line" id="scoreDetail"></div>
    <div style="margin-top:16px">
      <button class="btn" onclick="location.reload()">새 시험 보기</button>
      <button class="btn gold" onclick="startWrong()" id="retryWrongBtn">틀린 문제 다시 풀기</button>
    </div>
  </div>
  <div class="card"><b style="font-size:17px">문항 리뷰</b><div id="review"></div></div>
</div>
</div>

<script>
var BANK = [{"id": "c1q1", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "항공기 '조종(Control)'의 기본 문제를 해결한 사람은?", "qe": "Who solved the basic problem of aircraft control?", "opts": [{"L": "A", "ko": "커티스", "en": "Curtiss"}, {"L": "B", "ko": "라이트 형제", "en": "The Wright brothers"}, {"L": "C", "ko": "린드버그", "en": "Lindbergh"}, {"L": "D", "ko": "보잉", "en": "Boeing"}], "ans": "B", "expk": "1903년 라이트 형제가 조종 문제를 해결해 동력 비행을 실현했습니다.", "expe": "In 1903 the Wright brothers solved control and achieved powered flight."}, {"id": "c1q2", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "General 자격은 무엇의 기초인가?", "qe": "The General certificate is the basis for which ratings?", "opts": [{"L": "A", "ko": "조종사 자격", "en": "Pilot certificates"}, {"L": "B", "ko": "관제 자격", "en": "Controller ratings"}, {"L": "C", "ko": "Airframe·Powerplant 자격", "en": "Airframe & Powerplant"}, {"L": "D", "ko": "제조 승인", "en": "Production approval"}], "ans": "C", "expk": "General은 A·P 두 자격의 공통 기초입니다.", "expe": "General is the common foundation for both A and P ratings."}, {"id": "c1q3", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "'더티더즌'은 몇 가지 인적요인인가?", "qe": "How many human factors are in the 'Dirty Dozen'?", "opts": [{"L": "A", "ko": "10", "en": "10"}, {"L": "B", "ko": "12", "en": "12"}, {"L": "C", "ko": "6", "en": "6"}, {"L": "D", "ko": "24", "en": "24"}], "ans": "B", "expk": "정비 실수를 유발하는 12가지 인적요인입니다.", "expe": "Twelve human factors that cause maintenance errors."}, {"id": "c1q4", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "SHEL 모델에서 'L'이 뜻하는 것은?", "qe": "In the SHEL model, what does 'L' stand for?", "opts": [{"L": "A", "ko": "Logic", "en": "Logic"}, {"L": "B", "ko": "Liveware(사람)", "en": "Liveware (people)"}, {"L": "C", "ko": "Location", "en": "Location"}, {"L": "D", "ko": "Load", "en": "Load"}], "ans": "B", "expk": "Liveware는 사람으로, 모델의 중심입니다.", "expe": "Liveware means people and is the center of the model."}, {"id": "c1q5", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "AD(감항성 개선명령)의 준수 성격은?", "qe": "What is the nature of AD compliance?", "opts": [{"L": "A", "ko": "권장 사항", "en": "Recommended"}, {"L": "B", "ko": "법적 강제", "en": "Legally mandatory"}, {"L": "C", "ko": "선택 사항", "en": "Optional"}, {"L": "D", "ko": "제작사 재량", "en": "Manufacturer's discretion"}], "ans": "B", "expk": "AD는 반드시 준수해야 하는 법적 강제 사항입니다.", "expe": "ADs are legally mandatory and must be complied with."}, {"id": "c1q6", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "제작사 정비교범을 뜻하는 약어는?", "qe": "Which abbreviation means the manufacturer's maintenance manual?", "opts": [{"L": "A", "ko": "AMM", "en": "AMM"}, {"L": "B", "ko": "POH", "en": "POH"}, {"L": "C", "ko": "MEL", "en": "MEL"}, {"L": "D", "ko": "TCDS", "en": "TCDS"}], "ans": "A", "expk": "AMM = Aircraft Maintenance Manual.", "expe": "AMM = Aircraft Maintenance Manual."}, {"id": "c1q7", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "1927~1939년 항공기 구조의 주된 변화는?", "qe": "What was the main structural change during 1927–1939?", "opts": [{"L": "A", "ko": "복합재 도입", "en": "Composites introduced"}, {"L": "B", "ko": "목재·우포에서 전금속으로", "en": "Wood/fabric to all-metal"}, {"L": "C", "ko": "제트엔진 상용화", "en": "Jet engines commercialized"}, {"L": "D", "ko": "여압객실 표준화", "en": "Pressurization standardized"}], "ans": "B", "expk": "황금기에 전금속 구조가 목재·우포를 대체했습니다.", "expe": "During the Golden Age all-metal replaced wood and fabric."}, {"id": "c1q8", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "현대기의 자가진단 시스템이 아닌 것은?", "qe": "Which is NOT a modern self-diagnostic system?", "opts": [{"L": "A", "ko": "FADEC", "en": "FADEC"}, {"L": "B", "ko": "BITE", "en": "BITE"}, {"L": "C", "ko": "EICAS", "en": "EICAS"}, {"L": "D", "ko": "VOR", "en": "VOR"}], "ans": "D", "expk": "VOR은 항법(무선) 시설이며 자가진단 시스템이 아닙니다.", "expe": "VOR is a radio navigation aid, not a self-diagnostic system."}, {"id": "c1q9", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "안일함(Complacency)에 대한 안전망으로 가장 적절한 것은?", "qe": "Best safety net against complacency?", "opts": [{"L": "A", "ko": "점검표 사용", "en": "Use checklists"}, {"L": "B", "ko": "작업 속도 향상", "en": "Work faster"}, {"L": "C", "ko": "혼자 작업", "en": "Work alone"}, {"L": "D", "ko": "기록 생략", "en": "Skip records"}], "ans": "A", "expk": "점검표는 익숙한 작업의 누락을 막습니다.", "expe": "Checklists prevent omissions in familiar tasks."}, {"id": "c1q10", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "실제 정비 시 사용해야 하는 자료로 부적절한 것은?", "qe": "Which is NOT appropriate maintenance data?", "opts": [{"L": "A", "ko": "AMM", "en": "AMM"}, {"L": "B", "ko": "AC 43.13-1B", "en": "AC 43.13-1B"}, {"L": "C", "ko": "확인되지 않은 인터넷 게시글", "en": "Unverified internet posts"}, {"L": "D", "ko": "AD", "en": "AD"}], "ans": "C", "expk": "승인·수용 가능한 자료만 사용해야 합니다.", "expe": "Only approved or acceptable data may be used."}, {"id": "c1q11", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "'더티더즌' 중 '관행(Norms)'이 위험한 이유는?", "qe": "Why are 'norms' among the Dirty Dozen dangerous?", "opts": [{"L": "A", "ko": "항상 규정과 일치해서", "en": "They always match regulations"}, {"L": "B", "ko": "비공식 관행이 승인 절차를 대체하기 때문", "en": "Unwritten habits replace approved procedures"}, {"L": "C", "ko": "문서화되어 있어서", "en": "They are documented"}, {"L": "D", "ko": "FAA가 승인해서", "en": "FAA approves them"}], "ans": "B", "expk": "'늘 이렇게 해왔다'는 관행은 승인 절차를 대체할 수 없습니다.", "expe": "'We've always done it this way' can never replace approved procedures."}, {"id": "c1q12", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "스위스치즈 모델이 설명하는 것은?", "qe": "The Swiss cheese model explains that accidents occur when:", "opts": [{"L": "A", "ko": "한 번의 큰 실수", "en": "One big error"}, {"L": "B", "ko": "여러 방어벽의 구멍이 일렬로 겹침", "en": "Holes in multiple defenses line up"}, {"L": "C", "ko": "장비 고장만", "en": "Equipment failure only"}, {"L": "D", "ko": "기상 악화", "en": "Bad weather"}], "ans": "B", "expk": "여러 방어층의 결함이 우연히 관통될 때 사고가 발생합니다.", "expe": "Accidents happen when defects in several defense layers align."}, {"id": "c1q13", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "감항성(Airworthiness)의 두 조건은?", "qe": "The two conditions of airworthiness are:", "opts": [{"L": "A", "ko": "형식설계 부합 + 안전한 운항 상태", "en": "Conforms to type design + safe for operation"}, {"L": "B", "ko": "도색 + 세척", "en": "Paint + cleaning"}, {"L": "C", "ko": "연료 만재 + 정비사 탑승", "en": "Full fuel + mechanic on board"}, {"L": "D", "ko": "신품 부품 + 저비행시간", "en": "New parts + low time"}], "ans": "A", "expk": "형식설계 부합과 안전 운항 상태를 모두 만족해야 합니다.", "expe": "It must conform to type design and be in condition for safe operation."}, {"id": "c1q14", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "주의산만(Distraction) 후 작업 재개 시 권장되는 안전망은?", "qe": "A safety net for resuming work after distraction is:", "opts": [{"L": "A", "ko": "기억나는 곳부터 계속", "en": "Continue from memory"}, {"L": "B", "ko": "마지막 3단계를 되짚어 확인", "en": "Go back three steps and verify"}, {"L": "C", "ko": "처음부터 전부 재작업", "en": "Redo everything"}, {"L": "D", "ko": "다른 사람에게 인계", "en": "Hand off silently"}], "ans": "B", "expk": "작업 재개 시 마지막 몇 단계를 되짚는 것이 표준 대책입니다.", "expe": "Re-checking the last few steps when resuming is the standard countermeasure."}, {"id": "c1q15", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "정비 오류의 대부분은 무엇에서 비롯되는가?", "qe": "Most maintenance errors stem from:", "opts": [{"L": "A", "ko": "기술 부족", "en": "Lack of skill"}, {"L": "B", "ko": "인적요인", "en": "Human factors"}, {"L": "C", "ko": "공구 부족", "en": "Lack of tools"}, {"L": "D", "ko": "날씨", "en": "Weather"}], "ans": "B", "expk": "기술이 아닌 인적요인이 대부분의 원인입니다.", "expe": "Human factors, not skill, cause most errors."}, {"id": "c1q16", "ch": 1, "chko": "항공 입문", "file": "ch01_intro_aviation.html", "qk": "항공 사고의 약 80%가 관련된 요인은?", "qe": "About 80 percent of aviation accidents involve:", "opts": [{"L": "A", "ko": "구조 결함", "en": "Structural failure"}, : [{"L": "A", "ko": "절차 생략", "en": "Skip procedures"}, {"L": "B", "ko": "절차를 지키고 필요 시 도움·시간 요청", "en": "Follow procedures; ask for help or time"}, {"L": "C", "ko": "기록 생략", "en": "Skip records"}, {"L": "D", "ko": "검사 생략", "en": "Skip inspection"}], "ans": "B", "expk": "압박 속에서도 절차 준수가 원칙이며 자원을 요청해야 합니다.", "expe": "Follow procedures and request resources despite pressure."}, {"id": "c2q1", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "분수 덧셈에서 반드시 필요한 것은?", "qe": "What is required to add fractions?", "opts": [{"L": "A", "ko": "공통분모", "en": "A common denominator"}, {"L": "B", "ko": "역수", "en": "A reciprocal"}, {"L": "C", "ko": "제곱근", "en": "A square root"}, {"L": "D", "ko": "교차곱", "en": "Cross-multiplication"}], "ans": "A", "expk": "덧셈·뺄셈은 통분(공통분모)이 필요합니다.", "expe": "Addition/subtraction requires a common denominator."}, {"id": "c2q2", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "5/8을 소수로 바꾸면?", "qe": "5/8 as a decimal is:", "opts": [{"L": "A", "ko": "0.625", "en": "0.625"}, {"L": "B", "ko": "0.58", "en": "0.58"}, {"L": "C", "ko": "0.85", "en": "0.85"}, {"L": "D", "ko": "1.6", "en": "1.6"}], "ans": "A", "expk": "5÷8 = 0.625.", "expe": "5 ÷ 8 = 0.625."}, {"id": "c2q3", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "원의 넓이 공식은?", "qe": "Area of a circle is:", "opts": [{"L": "A", "ko": "2πr", "en": "2πr"}, {"L": "B", "ko": "πr²", "en": "πr²"}, {"L": "C", "ko": "πd", "en": "πd"}, {"L": "D", "ko": "½bh", "en": "½bh"}], "ans": "B", "expk": "넓이=πr², 둘레=2πr입니다.", "expe": "Area = πr²; circumference = 2πr."}, {"id": "c2q4", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "옴의 법칙 E=IR에서 I를 구하면?", "qe": "From E=IR, I equals:", "opts": [{"L": "A", "ko": "E×R", "en": "E×R"}, {"L": "B", "ko": "E÷R", "en": "E÷R"}, {"L": "C", "ko": "R÷E", "en": "R÷E"}, {"L": "D", "ko": "E+R", "en": "E+R"}], "ans": "B", "expk": "I = E ÷ R.", "expe": "I = E ÷ R."}, {"id": "c2q5", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics. , "ko": "0.625", "en": "0.625"}], "ans": "A", "expk": "5÷16 = 0.3125.", "expe": "5 ÷ 16 = 0.3125."}, {"id": "c2q15", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "직각삼각형에서 두 변이 3과 4일 때 빗변은?", "qe": "A right triangle with legs 3 and 4 has a hypotenuse of:", "opts": [{"L": "A", "ko": "5", "en": "5"}, {"L": "B", "ko": "7", "en": "7"}, {"L": "C", "ko": "6", "en": "6"}, {"L": "D", "ko": "12", "en": "12"}], "ans": "A", "expk": "√(9+16)=√25=5 (피타고라스).", "expe": "√(9+16)=5 (Pythagorean theorem)."}, {"id": "c2q16", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "1인치는 몇 mm인가?", "qe": "One inch equals how many millimeters?", "opts": [{"L": "A", "ko": "25.4", "en": "25.4"}, {"L": "B", "ko": "2.54", "en": "2.54"}, {"L": "C", "ko": "254", "en": "254"}, {"L": "D", "ko": "12.7", "en": "12.7"}], "ans": "A", "expk": "1 in = 25.4 mm.", "expe": "1 inch = 25.4 mm."}, {"id": "c2q17", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "어떤 수의 30%가 90이면 그 수는?", "qe": "If 30 percent of a number is 90, the number is:", "opts": [{"L": "A", "ko": "270", "en": "270"}, {"L": "B", "ko": "300", "en": "300"}, {"L": "C", "ko": "30", "en": "30"}, {"L": "D", "ko": "2700", "en": "2700"}], "ans": "B", "expk": "90÷0.30 = 300.", "expe": "90 ÷ 0.30 = 300."}, {"id": "c2q18", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "2⁵의 값은?", "qe": "2⁵ equals:", "opts": [{"L": "A", "ko": "10", "en": "10"}, {"L": "B", "ko": "32", "en": "32"}, {"L": "C", "ko": "25", "en": "25"}, {"L": "D", "ko": "64", "en": "64"}], "ans": "B", "expk": "2×2×2×2×2 = 32.", "expe": "2×2×2×2×2 = 32."}, {"id": "c2q19", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "원기둥 연료탱크(반지름 1ft, 길이 4ft)의 부피는 약?", "qe": "A cylindrical tank (radius 1 ft, length 4 ft) holds about:", "opts": [{"L": "A", "ko": "12.6 ft³", "en": "12.6 ft³"}, {"L": "B", "ko": "4 ft³", "en": "4 ft³"}, {"L": "C", "ko": "25.1 ft³", "en": "25.1 ft³"}, {"L": "D", "ko": "8 ft³", "en": "8 ft³"}], "ans": "A", "expk": "π×1²×4 = 12.57 ft³.", "expe": "π×1²×4 = 12.57 ft³."}, {"id": "c2q20", "ch": 2, "chko": "항공 수학", "file": "ch02_mathematics.html", "qk": "날개 종횡비(Aspect Ratio)는 무엇의 비인가?", "qe": "Wing aspect ratio is the ratio of:", "opts": [{"L": "A", "ko": "스팬÷평균시위", "en": "Span ÷ mean chord"}, {"L": "B", "ko": "무게÷양력", "en": "Weight ÷ lift"}, {"L": "C", "ko": "두께÷시위", "en": "Thickness ÷ chord"}, {"L": "D", "ko": "면적÷무게", "en": "Area ÷ weight"}], "ans": "A", "expk": "종횡비 = 날개폭(스팬) ÷ 평균시위.", "expe": "Aspect ratio = span ÷ mean chord."}, {"id": "c3q1", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "밀폐 유체에 가한 압력이 모든 방향으로 동일하게 전달된다는 원리는?", "qe": "Which principle states confined fluid pressure transmits equally in all directions?", "opts": [{"L": "A", "ko": "베르누이", "en": "Bernoulli"}, {"L": "B", "ko": "파스칼", "en": "Pascal"}, {"L": "C", "ko": "보일", "en": "Boyle"}, {"L": "D", "ko": "샤를", "en": "Charles"}], "ans": "B", "expk": "파스칼의 원리로 유압계통의 기초입니다.", "expe": "Pascal's law, the basis of hydraulics."}, {"id": "c3q2", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "압력의 공식은?", "qe": "The formula for pressure is:", "opts": [{"L": "A", "ko": "힘×면적", "en": "Force×Area"}, {"L": "B", "ko": "힘÷면적", "en": "Force÷Area"}, {"L": "C", "ko": "면적÷힘", "en": "Area÷Force"}, {"L": "D", "ko": "힘×거리", "en": "Force×Distance"}], "ans": "B", "expk": "P = F ÷ A.", "expe": "P = F ÷ A."}, {"id": "c3q3", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "해수면 표준 대기압에 가장 가까운 값은?", "qe": "Standard sea-level atmospheric pressure is about:", "opts": [{"L": "A", "ko": "14.7 psi", "en": "14.7 psi"}, {"L": "B", "ko": "100 psi", "en": "100 psi"}, {"L": "C", "ko": "1 psi", "en": "1 psi"}, {"L": "D", "ko": "29.7 psi", "en": "29.7 psi"}], "ans": "A", "expk": "약 14.7 psi(29.92 inHg)입니다.", "expe": "About 14.7 psi (29.92 inHg)."}, {"id": "c3q4", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "익형 윗면에서 공기 속도가 빨라지면 정압은?", "qe": "As airflow speeds up over an airfoil's upper surface, static pressure:", "opts": [{"L": "A", "ko": "증가", "en": "Increases"}, {"L": "B", "ko": "감소", "en": "Decreases"}, {"L": "C", "ko": "불변", "en": "Unchanged"}, {"L": "D", "ko": "0이 됨", "en": "Becomes zero"}], "ans": "B", "expk": "베르누이 정리에 따라 정압이 낮아집니다.", "expe": "By Bernoulli, static pressure decreases."}, {"id": "c3q5", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "1 마력(hp)은?", "qe": "One horsepower equals:", "opts": [{"L": "A", "ko": "550 ft·lb/s", "en": "550 ft·lb/s"}, {"L": "B", "ko": "550 ft·lb/min", "en": "550 ft·lb/min"}, {"L": "C", "ko": "33 ft·lb/s", "en": "33 ft·lb/s"}, {"L": "D", "ko": "746 ft·lb/s", "en": "746 ft·lb/s"}], "ans": "A", "expk": "550 ft·lb/s = 33,000 ft·lb/min.", "expe": "550 ft·lb/s = 33,000 ft·lb/min."}, {"id": "c3q6", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "일(Work)의 정의는?", "qe": "Work is defined as:", "opts": [{"L": "A", "ko": "힘×거리", "en": "Force×Distance"}, {"L": "B", "ko": "힘÷시간", "en": "Force÷Time"}, {"L": "C", "ko": "질량×가속도", "en": "Mass×Acceleration"}, {"L": "D", "ko": "압력×면적", "en": "Pressure×Area"}], "ans": "A", "expk": "일 = 힘 × 거리.", "expe": "Work = force × distance."}, {"id": "c3q7", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "온도가 일정할 때 P₁V₁=P₂V₂인 법칙은?", "qe": "Which law gives P₁V₁=P₂V₂ at constant temperature?", "opts": [{"L": "A", "ko": "샤를", "en": "Charles"}, {"L": "B", "ko": "보일", "en": "Boyle"}, {"L": "C", "ko": "파스칼", "en": "Pascal"}, {"L": "D", "ko": "뉴턴", "en": "Newton"}], "ans": "B", "expk": "보일의 법칙입니다.", "expe": "Boyle's law."}, {"id": "c3q8", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "열 전달 방식이 아닌 것은?", "qe": "Which is NOT a mode of heat transfer?", "opts": [{"L": "A", "ko": "전도", "en": "Conduction"}, {"L": "B", "ko": "대류", "en": "Convection"}, {"L": "C", "ko": "복사", "en": "Radiation"}, {"L": "D", "ko": "마찰", "en": "Friction"}], "ans": "D", "expk": "열 전달은 전도·대류·복사입니다.", "expe": "Heat transfers by conduction, convection, radiation."}, {"id": "c3q9", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "기계적 이점(MA)의 정의는?", "qe": "Mechanical advantage (MA) is:", "opts": [{"L": "A", "ko": "입력÷출력", "en": "Input÷Output"}, {"L": "B", "ko": "출력힘÷입력힘", "en": "Output force÷Input force"}, {"L": "C", "ko": "거리×힘", "en": "Distance×Force"}, {"L": "D", "ko": "일÷시간", "en": "Work÷Time"}], "ans": "B", "expk": "MA = 출력힘 ÷ 입력힘.", "expe": "MA = output force ÷ input force."}, {"id": "c3q10", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "뉴턴 제3법칙으로 설명되는 것은?", "qe": "Which is explained by Newton's third law?", "opts": [{"L": "A", "ko": "열팽창", "en": "Thermal expansion"}, {"L": "B", "ko": "제트 추력", "en": "Jet thrust"}, {"L": "C", "ko": "부식", "en": "Corrosion"}, {"L": "D", "ko": "자기장", "en": "Magnetic field"}], "ans": "B", "expk": "배기(작용)–추력(반작용)입니다.", "expe": "Exhaust (action) and thrust (reaction)."}, {"id": "c3q11", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "면적 2in² 피스톤에 1,000psi가 작용하면 힘은?", "qe": "1,000 psi on a 2 in² piston produces a force of:", "opts": [{"L": "A", "ko": "500 lb", "en": "500 lb"}, {"L": "B", "ko": "2,000 lb", "en": "2,000 lb"}, {"L": "C", "ko": "1,000 lb", "en": "1,000 lb"}, {"L": "D", "ko": "4,000 lb", "en": "4,000 lb"}], "ans": "B", "expk": "F = P×A = 1,000×2 = 2,000 lb.", "expe": "F = P×A = 1,000×2 = 2,000 lb."}, {"id": "c3q12", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "실린더 부피가 절반이 되면(온도 일정) 압력은?", "qe": "If gas volume is halved at constant temperature, pressure:", "opts": [{"L": "A", "ko": "절반", "en": "Halves"}, {"L": "B", "ko": "2배", "en": "Doubles"}, {"L": "C", "ko": "불변", "en": "Unchanged"}, {"L": "D", "ko": "4배", "en": "Quadruples"}], "ans": "B", "expk": "보일의 법칙: P₁V₁=P₂V₂ → 2배.", "expe": "Boyle's law: pressure doubles."}, {"id": "c3q13", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "제1종 지레의 받침점 위치는?", "qe": "In a first-class lever, the fulcrum is located:", "opts": [{"L": "A", "ko": "힘과 하중 사이", "en": "Between effort and load"}, {"L": "B", "ko": "하중 끝", "en": "At the load end"}, {"L": "C", "ko": "힘 끝", "en": "At the effort end"}, {"L": "D", "ko": "존재하지 않음", "en": "There is none"}], "ans": "A", "expk": "1종 지레는 받침점이 힘과 하중 사이에 있습니다.", "expe": "First-class: fulcrum between effort and load."}, {"id": "c3q14", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "물체를 300lb 힘으로 10ft 옮기면 한 일은?", "qe": "Moving an object 10 ft with 300 lb of force does how much work?", "opts": [{"L": "A", "ko": "30 ft·lb", "en": "30 ft·lb"}, {"L": "B", "ko": "3,000 ft·lb", "en": "3,000 ft·lb"}, {"L": "C", "ko": "310 ft·lb", "en": "310 ft·lb"}, {"L": "D", "ko": "0.03 ft·lb", "en": "0.03 ft·lb"}], "ans": "B", "expk": "일 = 300×10 = 3,000 ft·lb.", "expe": "Work = 300×10 = 3,000 ft·lb."}, {"id": "c3q15", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "움직도르래 1개의 기계적 이점은?", "qe": "A single movable pulley gives a mechanical advantage of:", "opts": [{"L": "A", "ko": "1", "en": "1"}, {"L": "B", "ko": "2", "en": "2"}, {"L": "C", "ko": "4", "en": "4"}, {"L": "D", "ko": "0.5", "en": "0.5"}], "ans": "B", "expk": "움직도르래는 MA=2 (고정도르래는 1).", "expe": "Movable pulley MA=2 (fixed pulley is 1)."}, {"id": "c3q16", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "음속에 가장 큰 영향을 주는 요소는?", "qe": "The speed of sound in air depends mainly on:", "opts": [{"L": "A", "ko": "기압", "en": "Pressure"}, {"L": "B", "ko": "온도", "en": "Temperature"}, {"L": "C", "ko": "습도", "en": "Humidity"}, {"L": "D", "ko": "고도계 설정", "en": "Altimeter setting"}], "ans": "B", "expk": "음속은 공기 온도에 좌우됩니다.", "expe": "It depends primarily on air temperature."}, {"id": "c3q17", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "구조 부재에 작용하는 5가지 응력이 아닌 것은?", "qe": "Which is NOT one of the five stresses on structures?", "opts": [{"L": "A", "ko": "인장", "en": "Tension"}, {"L": "B", "ko": "압축", "en": "Compression"}, {"L": "C", "ko": "비틀림", "en": "Torsion"}, {"L": "D", "ko": "부식", "en": "Corrosion"}], "ans": "D", "expk": "5대 응력: 인장·압축·전단·비틀림·굽힘. 부식은 응력이 아님.", "expe": "Five stresses: tension, compression, shear, torsion, bending."}, {"id": "c3q18", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "리벳이 주로 받는 응력은?", "qe": "Rivets are designed primarily to carry:", "opts": [{"L": "A", "ko": "전단", "en": "Shear"}, {"L": "B", "ko": "비틀림", "en": "Torsion"}, {"L": "C", "ko": "굽힘", "en": "Bending"}, {"L": "D", "ko": "복사", "en": "Radiation"}], "ans": "A", "expk": "리벳은 전단 하중을 담당합니다.", "expe": "Rivets carry shear loads."}, {"id": "c3q19", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "상대습도 100%가 뜻하는 것은?", "qe": "A relative humidity of 100 percent means the air:", "opts": [{"L": "A", "ko": "포화 상태", "en": "Is saturated"}, {"L": "B", "ko": "완전 건조", "en": "Is completely dry"}, {"L": "C", "ko": "산소 100%", "en": "Is 100% oxygen"}, {"L": "D", "ko": "진공", "en": "Is a vacuum"}], "ans": "A", "expk": "공기가 수증기로 포화된 상태입니다.", "expe": "The air holds all the vapor it can — saturated."}, {"id": "c3q20", "ch": 3, "chko": "기초 물리", "file": "ch03_basic_physics.html", "qk": "헬리콥터 전진 비행 시 양력 비대칭의 해결책은?", "qe": "Dissymmetry of lift in forward flight is corrected by:", "opts": [{"L": "A", "ko": "블레이드 플래핑", "en": "Blade flapping"}, {"L": "B", "ko": "연료 이송", "en": "Fuel transfer"}, {"L": "C", "ko": "기어 변경", "en": "Gear change"}, {"L": "D", "ko": "테일로터 정지", "en": "Stopping tail rotor"}], "ans": "A", "expk": "블레이드 플래핑(상하 운동)이 양력차를 보상합니다.", "expe": "Blade flapping equalizes lift across the disk."}, {"id": "c4q1", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "옴의 법칙 E=I×R에서 저항 R을 구하면?", "qe": "From E=I×R, solve for R:", "opts": [{"L": "A", "ko": "E×I", "en": "E×I"}, {"L": "B", "ko": "E÷I", "en": "E÷I"}, {"L": "C", "ko": "I÷E", "en": "I÷E"}, {"L": "D", "ko": "I×R", "en": "I×R"}], "ans": "B", "expk": "R = E ÷ I.", "expe": "R = E ÷ I."}, {"id": "c4q2", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전류의 단위는?", "qe": "The unit of current is:", "opts": [{"L": "A", "ko": "볼트", "en": "Volt"}, {"L": "B", "ko": "옴", "en": "Ohm"}, {"L": "C", "ko": "암페어", "en": "Ampere"}, {"L": "D", "ko": "와트", "en": "Watt"}], "ans": "C", "expk": "전류는 암페어(A)로 측정합니다.", "expe": "Current is measured in amperes (A)."}, {"id": "c4q3", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "직렬회로의 총저항은?", "qe": "Total resistance of a series circuit is:", "opts": [{"L": "A", "ko": "각 저항의 합", "en": "The sum of resistances"}, {"L": "B", "ko": "가장 작은 저항보다 작음", "en": "Less than the smallest"}, {"L": "C", "ko": "항상 0", "en": "Always zero"}, {"L": "D", "ko": "전압÷전력", "en": "Voltage÷Power"}], "ans": "A", "expk": "직렬은 저항을 더합니다.", "expe": "Series resistances add."}, {"id": "c4q4", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "병렬회로에서 각 가지에 걸리는 전압은?", "qe": "Voltage across each branch of a parallel circuit is:", "opts": [{"L": "A", "ko": "서로 다름", "en": "Different"}, {"L": "B", "ko": "모두 같음", "en": "The same"}, {"L": "C", "ko": "항상 0", "en": "Always zero"}, {"L": "D", "ko": "전류에 비례", "en": "Proportional to current"}], "ans": "B", "expk": "병렬은 전압이 모두 같습니다.", "expe": "Parallel branches share the same voltage."}, {"id": "c4q5", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전력 공식으로 옳은 것은?", "qe": "Which is a correct power formula?", "opts": [{"L": "A", "ko": "P=E÷I", "en": "P=E÷I"}, {"L": "B", "ko": "P=E×I", "en": "P=E×I"}, {"L": "C", "ko": "P=R÷I", "en": "P=R÷I"}, {"L": "D", "ko": "P=E+I", "en": "P=E+I"}], "ans": "B", "expk": "P = E × I (와트).", "expe": "P = E × I (watts)."}, {"id": "c4q6", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "납산 배터리의 충전상태는 무엇으로 확인하는가?", "qe": "Lead-acid state of charge is checked by:", "opts": [{"L": "A", "ko": "비중", "en": "Specific gravity"}, {"L": "B", "ko": "색상", "en": "Color"}, {"L": "C", "ko": "무게", "en": "Weight"}, {"L": "D", "ko": "냄새", "en": "Smell"}], "ans": "A", "expk": "비중계로 전해액 비중을 측정합니다.", "expe": "By electrolyte specific gravity with a hydrometer."}, {"id": "c4q7", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "Ni-Cd 배터리 특유의 위험은?", "qe": "A hazard unique to Ni-Cd batteries is:", "opts": [{"L": "A", "ko": "열폭주", "en": "Thermal runaway"}, {"L": "B", "ko": "황산 누출", "en": "Sulfuric acid leak"}, {"L": "C", "ko": "자기장", "en": "Magnetism"}, {"L": "D", "ko": "정전기", "en": "Static"}], "ans": "A", "expk": "Ni-Cd는 열폭주 위험이 있습니다.", "expe": "Ni-Cd can suffer thermal runaway."}, {"id": "c4q8", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "대형 항공기 교류 계통의 대표 규격은?", "qe": "Typical large-aircraft AC system is:", "opts": [{"L": "A", "ko": "28V DC", "en": "28 V DC"}, {"L": "B", "ko": "115V 400Hz AC", "en": "115 V 400 Hz AC"}, {"L": "C", "ko": "12V DC", "en": "12 V DC"}, {"L": "D", "ko": "220V 60Hz", "en": "220 V 60 Hz"}], "ans": "B", "expk": "115V 400Hz 교류를 많이 사용합니다.", "expe": "115 V 400 Hz AC is common."}, {"id": "c4q9", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "회로차단기·퓨즈의 정격은 무엇을 보호하도록 정하는가?", "qe": "CB/fuse ratings are set to protect:", "opts": [{"L": "A", "ko": "부하", "en": "The load"}, {"L": "B", "ko": "배선", "en": "The wiring"}, {"L": "C", "ko": "배터리", "en": "The battery"}, {"L": "D", "ko": "스위치", "en": "The switch"}], "ans": "B", "expk": "전선(배선)을 보호하도록 정합니다.", "expe": "They protect the wiring."}, {"id": "c4q10", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "자유전자가 많아 전류가 잘 흐르는 물질은?", "qe": "A material with many free electrons that conducts well is a:", "opts": [{"L": "A", "ko": "부도체", "en": "Insulator"}, {"L": "B", "ko": "도체", "en": "Conductor"}, {"L": "C", "ko": "유전체", "en": "Dielectric"}, {"L": "D", "ko": "절연체", "en": "Insulator"}], "ans": "B", "expk": "도체(구리·알루미늄)입니다.", "expe": "A conductor (copper, aluminum)."}, {"id": "c4q11", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "24V 회로에 저항 8Ω이면 전류는?", "qe": "A 24 V circuit with 8 Ω of resistance draws:", "opts": [{"L": "A", "ko": "3 A", "en": "3 A"}, {"L": "B", "ko": "192 A", "en": "192 A"}, {"L": "C", "ko": "0.33 A", "en": "0.33 A"}, {"L": "D", "ko": "32 A", "en": "32 A"}], "ans": "A", "expk": "I = 24÷8 = 3A.", "expe": "I = 24÷8 = 3 A."}, {"id": "c4q12", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "28V·10A 부하의 소비 전력은?", "qe": "A 28 V, 10 A load consumes:", "opts": [{"L": "A", "ko": "2.8 W", "en": "2.8 W"}, {"L": "B", "ko": "280 W", "en": "280 W"}, {"L": "C", "ko": "38 W", "en": "38 W"}, {"L": "D", "ko": "0.36 W", "en": "0.36 W"}], "ans": "B", "expk": "P = 28×10 = 280W.", "expe": "P = 28×10 = 280 W."}, {"id": "c4q13", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "4Ω 저항 두 개를 병렬 연결하면 합성저항은?", "qe": "Two 4 Ω resistors in parallel give:", "opts": [{"L": "A", "ko": "8 Ω", "en": "8 Ω"}, {"L": "B", "ko": "2 Ω", "en": "2 Ω"}, {"L": "C", "ko": "4 Ω", "en": "4 Ω"}, {"L": "D", "ko": "16 Ω", "en": "16 Ω"}], "ans": "B", "expk": "같은 값 2개 병렬 = 절반: 2Ω.", "expe": "Two equal resistors in parallel = half: 2 Ω."}, {"id": "c4q14", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전선이 길어지면 저항은?", "qe": "As wire length increases, its resistance:", "opts": [{"L": "A", "ko": "증가", "en": "Increases"}, {"L": "B", "ko": "감소", "en": "Decreases"}, {"L": "C", "ko": "불변", "en": "Unchanged"}, {"L": "D", "ko": "0이 됨", "en": "Becomes zero"}], "ans": "A", "expk": "저항은 길이에 비례합니다.", "expe": "Resistance is proportional to length."}, {"id": "c4q15", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "납산 배터리 완충 시 셀당 비중은 약?", "qe": "A fully charged lead-acid cell has a specific gravity of about:", "opts": [{"L": "A", "ko": "1.275", "en": "1.275"}, {"L": "B", "ko": "1.000", "en": "1.000"}, {"L": "C", "ko": "2.000", "en": "2.000"}, {"L": "D", "ko": "0.850", "en": "0.850"}], "ans": "A", "expk": "완충 시 약 1.275~1.300입니다.", "expe": "About 1.275–1.300 when fully charged."}, {"id": "c4q16", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "12셀 납산 배터리의 공칭 전압은?", "qe": "A 12-cell lead-acid battery has a nominal voltage of:", "opts": [{"L": "A", "ko": "12 V", "en": "12 V"}, {"L": "B", "ko": "24 V", "en": "24 V"}, {"L": "C", "ko": "6 V", "en": "6 V"}, {"L": "D", "ko": "48 V", "en": "48 V"}], "ans": "B", "expk": "셀당 2V × 12 = 24V.", "expe": "2 V per cell × 12 = 24 V."}, {"id": "c4q17", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "다이오드의 기본 기능은?", "qe": "The basic function of a diode is to:", "opts": [{"L": "A", "ko": "한 방향으로만 전류 통과", "en": "Pass current in one direction"}, {"L": "B", "ko": "전압 증폭", "en": "Amplify voltage"}, {"L": "C", "ko": "에너지 저장", "en": "Store energy"}, {"L": "D", "ko": "빛 감지", "en": "Sense light"}], "ans": "A", "expk": "다이오드는 정류(한 방향 통과) 소자입니다.", "expe": "A diode conducts one way — rectification."}, {"id": "c4q18", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "교류를 직류로 바꾸는 장치는?", "qe": "AC is converted to DC by a:", "opts": [{"L": "A", "ko": "인버터", "en": "Inverter"}, {"L": "B", "ko": "정류기", "en": "Rectifier"}, {"L": "C", "ko": "변압기", "en": "Transformer"}, {"L": "D", "ko": "축전기", "en": "Capacitor"}], "ans": "B", "expk": "정류기(Rectifier)가 AC→DC 변환합니다. 인버터는 반대.", "expe": "A rectifier converts AC to DC; an inverter does the opposite."}, {"id": "c4q19", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "변압기가 작동하는 전원은?", "qe": "A transformer works on:", "opts": [{"L": "A", "ko": "직류만", "en": "DC only"}, {"L": "B", "ko": "교류만", "en": "AC only"}, {"L": "C", "ko": "둘 다", "en": "Both"}, {"L": "D", "ko": "정전기", "en": "Static"}], "ans": "B", "expk": "변압기는 변화하는 자속이 필요하므로 교류 전용입니다.", "expe": "Transformers need changing flux — AC only."}, {"id": "c4q20", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "발전기 출력 전압을 일정하게 유지하는 것은?", "qe": "Generator output voltage is held constant by the:", "opts": [{"L": "A", "ko": "전압조절기", "en": "Voltage regulator"}, {"L": "B", "ko": "시동기", "en": "Starter"}, {"L": "C", "ko": "점화플러그", "en": "Spark plug"}, {"L": "D", "ko": "퓨즈", "en": "Fuse"}], "ans": "A", "expk": "전압조절기가 계자 전류를 조절해 출력 전압을 유지합니다.", "expe": "The voltage regulator adjusts field current to hold voltage."}, {"id": "c4q21", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "서로 다른 용량의 커패시터를 직렬 연결하면 총 정전용량은?", "qe": "When different rated capacitors are connected in series, the total capacitance is", "opts": [{"L": "A", "ko": "가장 작은 용량보다 작다", "en": "Less than the capacitance of the lowest rated capacitor"}, {"L": "B", "ko": "가장 큰 용량보다 크다", "en": "Greater than the highest rated capacitor"}, {"L": "C", "ko": "모든 용량의 합", "en": "Equal to the sum of all the capacitances"}], "ans": "A", "expk": "직렬 연결 시 총 용량은 최소 용량보다 작습니다. [ASA 8006]", "expe": "In series, total capacitance is less than the lowest. [ASA 8006]"}, {"id": "c4q22", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "커패시터가 DC 회로에 쓰이는 목적은?", "qe": "Capacitors are sometimes used in DC circuits to", "opts": [{"L": "A", "ko": "특정 위치의 유도 리액턴스 상쇄", "en": "Counteract inductive reactance"}, {"L": "B", "ko": "전류/전압의 미세한 맥동 완화", "en": "Smooth out slight pulsations in current/voltage"}, {"L": "C", "ko": "전압·전류 승압 보조", "en": "Assist in stepping voltage up/down"}], "ans": "B", "expk": "커패시터는 맥동을 평활(smoothing)합니다. [ASA 8006-1]", "expe": "They smooth out pulsations. [ASA 8006-1]"}, {"id": "c4q23", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "커패시터 저장 전기량은 무엇에 비례하는가?", "qe": "The amount of electricity a capacitor can store is directly proportional to the", "opts": [{"L": "A", "ko": "극판 거리(면적 무관)", "en": "Distance between plates"}, {"L": "B", "ko": "극판 면적(거리 무관)", "en": "Plate area, unaffected by distance"}, {"L": "C", "ko": "극판 면적에 비례, 극판 거리에 반비례", "en": "Plate area and inversely to plate distance"}], "ans": "C", "expk": "면적↑·간격↓·유전율↑일수록 용량 증가. [ASA 8008]", "expe": "Area up, distance down, dielectric constant up. [ASA 8008]"}, {"id": "c4q24", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": ".02, .05, .10μF 커패시터를 직렬 연결한 총 용량은?", "qe": "Total capacitance of .02, .05, and .10 microfarad capacitors in series is", "opts": [{"L": "A", "ko": ".170 μF", "en": ".170 μF"}, {"L": "B", "ko": "0.125 μF", "en": "0.125 μF"}, {"L": "C", "ko": ".0125 μF", "en": ".0125 μF"}], "ans": "C", "expk": "1/CT=1/.02+1/.05+1/.10 → CT=0.0125μF. [ASA 8009]", "expe": "Reciprocal formula gives 0.0125 μF. [ASA 8009]"}, {"id": "c4q25", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": ".02, .05, .10μF를 병렬 연결한 총 용량은?", "qe": "Total capacitance of .02, .05, and .10 microfarad capacitors in parallel is", "opts": [{"L": "A", "ko": ".170 μF", "en": ".170 μF"}, {"L": "B", "ko": "0.125 μF", "en": "0.125 μF"}, {"L": "C", "ko": ".0125 μF", "en": ".0125 μF"}], "ans": "A", "expk": "병렬은 합: .02+.05+.10=.170μF. [ASA 8009-1]", "expe": "Parallel adds: .170 μF. [ASA 8009-1]"}, {"id": "c4q26", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "패럿을 마이크로패럿으로 변환하려면?", "qe": "Convert farads to microfarads by", "opts": [{"L": "A", "ko": "10⁶을 곱한다", "en": "Multiplying farads by 10 to the power of 6"}, {"L": "B", "ko": "피코패럿에 10⁶을 곱한다", "en": "Multiplying picofarads by 10^6"}, {"L": "C", "ko": "10⁻⁶을 곱한다", "en": "Multiplying by 10^-6"}], "ans": "A", "expk": "1F = 10⁶μF. [ASA 8009-2]", "expe": "1 F = 10^6 microfarads. [ASA 8009-2]"}, {"id": "c4q27", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전하량 측정에서 문자 Q가 뜻하는 단위는?", "qe": "What does the letter Q symbolize when measuring electrical charge?", "opts": [{"L": "A", "ko": "패럿", "en": "Farad"}, {"L": "B", "ko": "전자", "en": "Electron"}, {"L": "C", "ko": "쿨롱", "en": "Coulomb"}], "ans": "C", "expk": "C=Q/E에서 Q는 쿨롱 단위의 전하량. [ASA 8029-2]", "expe": "Q is charge in coulombs. [ASA 8029-2]"}, {"id": "c4q28", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "회로의 유도 리액턴스를 증가시키는 요소는?", "qe": "An increase in which factors will increase the inductive reactance of a circuit?", "opts": [{"L": "A", "ko": "인덕턴스와 주파수", "en": "Inductance and frequency"}, {"L": "B", "ko": "저항과 전압", "en": "Resistance and voltage"}, {"L": "C", "ko": "저항과 용량 리액턴스", "en": "Resistance and capacitive reactance"}], "ans": "A", "expk": "XL=2πfL — 주파수·인덕턴스에 비례. [ASA 8005]", "expe": "XL = 2πfL. [ASA 8005]"}, {"id": "c4q29", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "인덕터를 직렬 연결하면(자기결합 없음) 총 인덕턴스는?", "qe": "Inductors in series (no coupling) give a total inductance", "opts": [{"L": "A", "ko": "최소값보다 작다", "en": "Less than the lowest"}, {"L": "B", "ko": "최대값과 같다", "en": "Equal to the highest"}, {"L": "C", "ko": "각 인덕턴스의 합", "en": "Equal to the sum of the individual inductances"}], "ans": "C", "expk": "직렬 인덕턴스는 합산. [ASA 8012]", "expe": "Series inductances add. [ASA 8012]"}, {"id": "c4q30", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "서로 다른 인덕터를 병렬 연결하면 총 인덕턴스는?", "qe": "Inductors of different values in parallel give a total inductance", "opts": [{"L": "A", "ko": "최소 인덕턴스보다 작다", "en": "Less than the lowest rated inductor"}, {"L": "B", "ko": "최대와 같다", "en": "Equal to the highest"}, {"L": "C", "ko": "합과 같다", "en": "Equal to the sum"}], "ans": "A", "expk": "병렬은 최소값보다 작아집니다. [ASA 8013]", "expe": "Parallel is less than the lowest. [ASA 8013]"}, {"id": "c4q31", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전기 에너지가 전선 연결 없이 다른 회로로 전달되는 현상은?", "qe": "Transfer of electric energy from one circuit to another without electrical connections is called", "opts": [{"L": "A", "ko": "유도(Induction)", "en": "Induction"}, {"L": "B", "ko": "정전용량", "en": "Capacitance"}, {"L": "C", "ko": "저항", "en": "Resistance"}], "ans": "A", "expk": "변화하는 자기장이 인접 도체에 전압을 유도. [ASA 8041]", "expe": "A changing field induces voltage in adjacent conductors. [ASA 8041]"}, {"id": "c4q32", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "AC 회로의 합성 저항력(저항+리액턴스)을 뜻하는 용어는?", "qe": "The term that describes the combined resistive forces in an AC circuit is", "opts": [{"L": "A", "ko": "저항", "en": "Resistance"}, {"L": "B", "ko": "리액턴스", "en": "Reactance"}, {"L": "C", "ko": "임피던스", "en": "Impedance"}], "ans": "C", "expk": "Z=√(R²+X²), 단위는 옴. [ASA 8002]", "expe": "Z = √(R²+X²). [ASA 8002]"}, {"id": "c4q33", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "역기전력(EMF)이 만드는 교류 흐름 방해를 무엇이라 하는가?", "qe": "Opposition to AC flow produced by an EMF with generated back voltage is called", "opts": [{"L": "A", "ko": "유도 리액턴스", "en": "Inductive reactance"}, {"L": "B", "ko": "용량 리액턴스", "en": "Capacitive reactance"}, {"L": "C", "ko": "상호 인덕턴스", "en": "Mutual inductance"}], "ans": "A", "expk": "역기전력에 의한 방해 = 유도 리액턴스(XL). [ASA 8002-1]", "expe": "Back-EMF opposition is inductive reactance. [ASA 8002-1]"}, {"id": "c4q34", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "AC 회로의 실효 전압은 최대 순시 전압과 비교하면?", "qe": "In an AC circuit, the effective voltage is", "opts": [{"L": "A", "ko": "최대 순시 전압과 같다", "en": "Equal to maximum instantaneous voltage"}, {"L": "B", "ko": "최대보다 크다", "en": "Greater than maximum"}, {"L": "C", "ko": "최대 순시 전압보다 작다", "en": "Less than the maximum instantaneous voltage"}], "ans": "C", "expk": "실효값(RMS)=피크의 0.707배. [ASA 8007]", "expe": "RMS = 0.707 × peak. [ASA 8007]"}, {"id": "c4q35", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "별도 명시가 없으면 AC 전류·전압 값은 무엇으로 간주하는가?", "qe": "Unless otherwise specified, AC current/voltage values are assumed to be", "opts": [{"L": "A", "ko": "순시값", "en": "Instantaneous values"}, {"L": "B", "ko": "실효값", "en": "Effective values"}, {"L": "C", "ko": "최대값", "en": "Maximum values"}], "ans": "B", "expk": "계측기 대부분이 실효값(RMS)을 표시. [ASA 8010]", "expe": "Meters read effective (rms) values. [ASA 8010]"}, {"id": "c4q36", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "XL=10Ω, XC=4Ω, R=8Ω인 AC 직렬회로의 임피던스는?", "qe": "Impedance of an AC series circuit with XL=10, XC=4, R=8 ohms is", "opts": [{"L": "A", "ko": "22 Ω", "en": "22 ohms"}, {"L": "B", "ko": "5.29 Ω", "en": "5.29 ohms"}, {"L": "C", "ko": "10 Ω", "en": "10 ohms"}], "ans": "C", "expk": "X=10−4=6, Z=√(8²+6²)=10Ω. [ASA 8024]", "expe": "X=6; Z=√(64+36)=10. [ASA 8024]"}, {"id": "c4q37", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "병렬 DC 회로에서 옳은 것은?", "qe": "In a parallel DC circuit, which statement is true?", "opts": [{"L": "A", "ko": "전류가 모든 부분에서 같다", "en": "Current equal everywhere"}, {"L": "B", "ko": "총 전류는 각 가지 전류의 합", "en": "Total current equals the sum of branch currents"}, {"L": "C", "ko": "전류=전원전압÷저항의 합", "en": "Current = source voltage ÷ sum of resistances"}], "ans": "B", "expk": "키르히호프 전류법칙. [ASA 8039]", "expe": "Kirchhoff's current law. [ASA 8039]"}, {"id": "c4q38", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "가장 많은 전력을 소비하는 것은? (1hp=746W)", "qe": "Which requires the most electrical power? (1 hp = 746 W)", "opts": [{"L": "A", "ko": "12V·8A 모터 (96W)", "en": "A 12-volt motor requiring 8 amperes"}, {"L": "B", "ko": "12V 병렬 30W 램프 4개 (120W)", "en": "Four 30-watt lamps in a 12-volt parallel circuit"}, {"L": "C", "ko": "24V·3A 조명 2개 (144W)", "en": "Two 24-volt lights requiring 3 amperes each"}], "ans": "C", "expk": "96W vs 120W vs 144W. [ASA 8015]", "expe": "96 vs 120 vs 144 watts. [ASA 8015]"}, {"id": "c4q39", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "시험용 전압계의 올바른 연결 방법은?", "qe": "The correct way to connect a test voltmeter in a circuit is", "opts": [{"L": "A", "ko": "장치와 직렬", "en": "In series with a unit"}, {"L": "B", "ko": "전원과 부하 사이", "en": "Between the source and the load"}, {"L": "C", "ko": "장치와 병렬", "en": "In parallel with a unit"}], "ans": "C", "expk": "전압계는 항상 병렬 연결. [ASA 8029]", "expe": "Voltmeters connect in parallel. [ASA 8029]"}, {"id": "c4q40", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전원이 켜진 회로에서 닫힌 스위치 양단의 전압계 지시값은?", "qe": "A voltmeter across a closed switch in a powered circuit reads", "opts": [{"L": "A", "ko": "부품 전압강하", "en": "Component voltage drop"}, {"L": "B", "ko": "계통 전압", "en": "System voltage"}, {"L": "C", "ko": "0 볼트", "en": "Zero voltage"}], "ans": "C", "expk": "양호한 스위치 양단은 0V(최대 0.2V 허용). [ASA 8029-1]", "expe": "A good closed switch drops ~zero volts. [ASA 8029-1]"}, {"id": "c4q41", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": ".001 암페어를 뜻하는 용어는?", "qe": "Which term means .001 ampere?", "opts": [{"L": "A", "ko": "마이크로암페어", "en": "Microampere"}, {"L": "B", "ko": "킬로암페어", "en": "Kiloampere"}, {"L": "C", "ko": "밀리암페어", "en": "Milliampere"}], "ans": "C", "expk": "milli- = 1/1000. [ASA 8030]", "expe": "Milli- means one thousandth. [ASA 8030]"}, {"id": "c4q42", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": ".002 kV는 몇 볼트인가?", "qe": ".002 kV equals", "opts": [{"L": "A", "ko": "20 V", "en": "20 volts"}, {"L": "B", "ko": "2.0 V", "en": "2.0 volts"}, {"L": "C", "ko": ".2 V", "en": ".2 volt"}], "ans": "B", "expk": "1kV=1,000V → .002kV=2V. [ASA 8033]", "expe": ".002 × 1,000 = 2 volts. [ASA 8033]"}, {"id": "c4q43", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전기량(전하)의 기본 단위는?", "qe": "What is the basic unit of electrical quantity?", "opts": [{"L": "A", "ko": "기전력", "en": "Electromotive force"}, {"L": "B", "ko": "암페어", "en": "Ampere"}, {"L": "C", "ko": "쿨롱", "en": "Coulomb"}], "ans": "C", "expk": "1쿨롱 = 6.28×10¹⁸ 전자. [ASA 8037-1]", "expe": "One coulomb = 6.28×10^18 electrons. [ASA 8037-1]"}, {"id": "c4q44", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "절연된 두 도체 사이의 전위차 측정 단위는?", "qe": "The potential difference between two insulated conductors is measured in", "opts": [{"L": "A", "ko": "볼트", "en": "Volts"}, {"L": "B", "ko": "암페어", "en": "Amperes"}, {"L": "C", "ko": "쿨롱", "en": "Coulombs"}], "ans": "A", "expk": "전위차(전기 압력)는 볼트. [ASA 8020]", "expe": "Potential difference is in volts. [ASA 8020]"}, {"id": "c4q45", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "24V 전원에 같은 값 저항 4개 병렬 — 각 저항 양단 전압은?", "qe": "A 24-volt source with four equal parallel resistors — voltage across each is", "opts": [{"L": "A", "ko": "12 V", "en": "12 volts"}, {"L": "B", "ko": "6 V", "en": "6 volts"}, {"L": "C", "ko": "24 V", "en": "24 volts"}], "ans": "C", "expk": "병렬은 전원 전압 전체가 각 저항에 걸림. [ASA 8021]", "expe": "Each parallel resistor sees full source voltage. [ASA 8021]"}, {"id": "c4q46", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "저항이 일정한 회로의 전압강하를 결정하는 것은?", "qe": "The voltage drop in a circuit of known resistance depends on", "opts": [{"L": "A", "ko": "회로 전압", "en": "The circuit voltage"}, {"L": "B", "ko": "도체 저항만", "en": "Conductor resistance only"}, {"L": "C", "ko": "회로의 전류(암페어)", "en": "The amperage of the circuit"}], "ans": "C", "expk": "E=IR — 저항 고정 시 전류가 강하를 결정. [ASA 8055]", "expe": "E=IR; with fixed R, amperage sets the drop. [ASA 8055]"}, {"id": "c4q47", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "28V에 6Ω 램프 3개 + 5Ω 램프 2개 병렬 — 총 전류는?", "qe": "A 28-volt generator supplying five parallel lamps (three 6-ohm, two 5-ohm) must furnish", "opts": [{"L": "A", "ko": "1.11 A", "en": "1.11 amperes"}, {"L": "B", "ko": "1 A", "en": "1 ampere"}, {"L": "C", "ko": "25.23 A", "en": "25.23 amperes"}], "ans": "C", "expk": "4.67×3 + 5.6×2 ≈ 25.2A. [ASA 8018]", "expe": "3×4.67 + 2×5.6 ≈ 25.2 A. [ASA 8018]"}, {"id": "c4q48", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "12V 배터리에 6Ω 저항 3개 병렬 — 총 전류는?", "qe": "Three 6-ohm resistors in parallel across a 12-volt battery draw a total of", "opts": [{"L": "A", "ko": "2 A", "en": "2 amps"}, {"L": "B", "ko": "6 A", "en": "6 amps"}, {"L": "C", "ko": "12 A", "en": "12 amps"}], "ans": "B", "expk": "RT=2Ω, I=12/2=6A. [ASA 8049-1]", "expe": "RT=2 Ω; I=6 A. [ASA 8049-1]"}, {"id": "c4q49", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "24V·48W를 공급하는 같은 값 저항 2개 병렬 — 각 저항값은?", "qe": "A 24-volt source furnishing 48 watts to two equal parallel resistors — each resistor is", "opts": [{"L": "A", "ko": "24 Ω", "en": "24 ohms"}, {"L": "B", "ko": "12 Ω", "en": "12 ohms"}, {"L": "C", "ko": "6 Ω", "en": "6 ohms"}], "ans": "A", "expk": "RT=24²/48=12Ω → 각 24Ω. [ASA 8035]", "expe": "RT=12 Ω, so each is 24 Ω. [ASA 8035]"}, {"id": "c4q50", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "28V용 30W 전구의 작동 저항은?", "qe": "The operating resistance of a 30-watt light bulb in a 28-volt system is", "opts": [{"L": "A", "ko": "1.07 Ω", "en": "1.07 ohms"}, {"L": "B", "ko": "26 Ω", "en": "26 ohms"}, {"L": "C", "ko": "0.93 Ω", "en": "0.93 ohm"}], "ans": "B", "expk": "R=E²/P=784/30≈26.1Ω. [ASA 8038]", "expe": "R = 28²/30 ≈ 26 Ω. [ASA 8038]"}, {"id": "c4q51", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "병렬 조명회로에서 전구 하나를 제거하면 총 저항은?", "qe": "If one of three bulbs in a parallel circuit is removed, total resistance", "opts": [{"L": "A", "ko": "변화 없음", "en": "Unchanged"}, {"L": "B", "ko": "커진다", "en": "Becomes greater"}, {"L": "C", "ko": "작아진다", "en": "Becomes smaller"}], "ans": "B", "expk": "전류 경로가 줄어 총 저항 증가. [ASA 8047]", "expe": "Fewer paths → greater resistance. [ASA 8047]"}, {"id": "c4q52", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "1/5hp 모터(효율75%) + 20W 조명 3개 + 5A 히터 + 3A 충돌방지등, 24V 계통 — 발전기 총 부하는 약?", "qe": "A 24-V system with a 1/5-hp motor (75% eff), three 20-W lights, a 5-A heater, and a 3-A light needs about", "opts": [{"L": "A", "ko": "402 W", "en": "402 watts"}, {"L": "B", "ko": "385 W", "en": "385 watts"}, {"L": "C", "ko": "450 W", "en": "450 watts"}], "ans": "C", "expk": "199+60+120+72=451W. [ASA 8016]", "expe": "199+60+120+72 = 451 W. [ASA 8016]"}, {"id": "c4q53", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "12V·1hp 모터 입력 1,000W — 같은 효율의 24V·1hp 모터 입력은?", "qe": "A 12-V 1-hp motor takes 1,000 W input. A 24-V 1-hp motor at the same efficiency requires", "opts": [{"L": "A", "ko": "1,000 W", "en": "1,000 watts"}, {"L": "B", "ko": "2,000 W", "en": "2,000 watts"}, {"L": "C", "ko": "500 W", "en": "500 watts"}], "ans": "A", "expk": "효율 동일 → 입력 동일(전류만 절반). [ASA 8017]", "expe": "Same efficiency → same input power. [ASA 8017]"}, {"id": "c4q54", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "리액티브 AC 회로에서 유효 전력(True Power)은?", "qe": "In a reactive AC circuit, the true power is", "opts": [{"L": "A", "ko": "피상 전력보다 크다", "en": "More than apparent power"}, {"L": "B", "ko": "용량성에서 크고 유도성에서 작다", "en": "Less in reactive, more in inductive"}, {"L": "C", "ko": "피상 전력보다 작다", "en": "Less than the apparent power"}], "ans": "C", "expk": "위상차 때문에 유효<피상. [ASA 8022]", "expe": "True power is always less than apparent in reactive circuits. [ASA 8022]"}, {"id": "c4q55", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전력을 나타내는 단위는?", "qe": "What unit is used to express electrical power?", "opts": [{"L": "A", "ko": "볼트", "en": "Volt"}, {"L": "B", "ko": "와트", "en": "Watt"}, {"L": "C", "ko": "암페어", "en": "Ampere"}], "ans": "B", "expk": "전력=와트. [ASA 8037]", "expe": "Power is in watts. [ASA 8037]"}, {"id": "c4q56", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "1:4 승압 변압기에서 전류는?", "qe": "In a 1-to-4 voltage step-up transformer, the current is", "opts": [{"L": "A", "ko": "1:4로 감소", "en": "Stepped down by a 1 to 4 ratio"}, {"L": "B", "ko": "1:4로 증가", "en": "Stepped up by 1 to 4"}, {"L": "C", "ko": "변화 없음", "en": "Unchanged"}], "ans": "A", "expk": "전력 보존: 전압 4배→전류 1/4. [ASA 8048]", "expe": "Power in = power out: current is one-fourth. [ASA 8048]"}, {"id": "c4q57", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "0.05A가 흐르는 14Ω 저항의 소비 전력은?", "qe": "A 14-ohm resistor carrying .05 ampere dissipates", "opts": [{"L": "A", "ko": "최소 0.70mW", "en": "At least .70 milliwatt"}, {"L": "B", "ko": "최소 35mW", "en": "At least 35 milliwatts"}, {"L": "C", "ko": "0.035W 미만", "en": "Less than .035 watt"}], "ans": "B", "expk": "P=I²R=0.0025×14=0.035W=35mW. [ASA 8032]", "expe": "P = I²R = 35 mW. [ASA 8032]"}, {"id": "c4q58", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "30V 전원에 10Ω+20Ω 직렬 — 10Ω 양단 전압강하는?", "qe": "30 volts applied to a 10-ohm and 20-ohm resistor in series — drop across the 10-ohm is", "opts": [{"L": "A", "ko": "10 V", "en": "10 volts"}, {"L": "B", "ko": "20 V", "en": "20 volts"}, {"L": "C", "ko": "30 V", "en": "30 volts"}], "ans": "A", "expk": "I=1A → 10Ω에 10V. [ASA 8043]", "expe": "1 A × 10 Ω = 10 V. [ASA 8043]"}, {"id": "c4q59", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "병렬 회로에 관한 올바른 설명은?", "qe": "Which is correct concerning a parallel circuit?", "opts": [{"L": "A", "ko": "총 저항은 최소 저항보다 작다", "en": "Total resistance is smaller than the smallest resistor"}, {"L": "B", "ko": "저항 하나 제거 시 총 저항 감소", "en": "Total resistance decreases when one is removed"}, {"L": "C", "ko": "총 전압강하=총 저항", "en": "Total voltage drop equals total resistance"}], "ans": "A", "expk": "경로가 많을수록 저항 감소. [ASA 8054]", "expe": "More paths, less resistance. [ASA 8054]"}, {"id": "c4q60", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "셀당 2V일 때 12셀 납산 배터리 정격은?", "qe": "If each series cell equals 2 volts, a 12-cell lead-acid battery is rated at", "opts": [{"L": "A", "ko": "24 V", "en": "24 volts"}, {"L": "B", "ko": "12 V", "en": "12 volts"}, {"L": "C", "ko": "6 V", "en": "6 volts"}], "ans": "A", "expk": "12×2V=24V. [ASA 8045-2]", "expe": "12 × 2 = 24 volts. [ASA 8045-2]"}, {"id": "c4q61", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "셀당 무부하 2.1V, 12셀 배터리가 2Ω 부하에 10A 공급 — 내부저항은?", "qe": "A 12-cell battery (2.1 V/cell no-load) supplies 10 A to a 2-ohm load. Its internal resistance is", "opts": [{"L": "A", "ko": "0.52 Ω", "en": "0.52 ohm"}, {"L": "B", "ko": "2.52 Ω", "en": "2.52 ohms"}, {"L": "C", "ko": "5.0 Ω", "en": "5.0 ohms"}], "ans": "A", "expk": "(25.2−20)/10=0.52Ω. [ASA 8085]", "expe": "(25.2−20)÷10 = 0.52 Ω. [ASA 8085]"}, {"id": "c4q62", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "배터리실에 납산 전해액이 엎질러졌을 때 조치는?", "qe": "If lead-acid electrolyte is spilled in the battery compartment,", "opts": [{"L": "A", "ko": "붕산 용액 후 물 세척", "en": "Boric acid then water rinse"}, {"L": "B", "ko": "깨끗한 물로만 세척", "en": "Rinse with clean water only"}, {"L": "C", "ko": "중탄산소다 용액 후 물 세척", "en": "Apply sodium bicarbonate solution, then water rinse"}], "ans": "C", "expk": "산은 베이킹소다로 중화 후 세척. [ASA 8086]", "expe": "Neutralize acid with baking soda, then rinse. [ASA 8086]"}, {"id": "c4q63", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "완충된 납산 배터리가 잘 얼지 않는 이유는?", "qe": "A fully charged lead-acid battery will not freeze easily because", "opts": [{"L": "A", "ko": "산이 극판 속에 있어 비중 증가", "en": "Acid in plates raises specific gravity"}, {"L": "B", "ko": "산 대부분이 전해액(용액) 속에 있음", "en": "Most of the acid is in the solution"}, {"L": "C", "ko": "내부저항 발열로 결빙 방지", "en": "Internal heat prevents freezing"}], "ans": "B", "expk": "완충 시 황산이 용액에 있어 어는점이 낮음. [ASA 8088]", "expe": "Charged electrolyte (acid in solution) freezes much lower. [ASA 8088]"}, {"id": "c4q64", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "정전압 충전 시 배터리로 흐르는 전류를 결정하는 것은?", "qe": "With a constant-voltage source, charging current is determined by", "opts": [{"L": "A", "ko": "극판 총면적", "en": "Total plate area"}, {"L": "B", "ko": "배터리의 충전 상태", "en": "The state-of-charge of the battery"}, {"L": "C", "ko": "암페어시 용량", "en": "Ampere-hour capacity"}], "ans": "B", "expk": "방전 상태일수록 전류 크고, 충전되며 감소. [ASA 8089]", "expe": "Low charge draws high current, tapering as it charges. [ASA 8089]"}, {"id": "c4q65", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "니켈-카드뮴 배터리의 급속 충전 방식은?", "qe": "The method used to rapidly charge a nickel-cadmium battery utilizes", "opts": [{"L": "A", "ko": "정전류·정전압", "en": "Constant current and constant voltage"}, {"L": "B", "ko": "정전류·가변전압", "en": "Constant current, varying voltage"}, {"L": "C", "ko": "정전압·가변전류", "en": "Constant voltage and varying current"}], "ans": "C", "expk": "Ni-Cd 급속충전=정전압+가변전류. [ASA 8091]", "expe": "Constant voltage with varying current. [ASA 8091]"}, {"id": "c4q66", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "납산 배터리 셀 바닥에 공간을 두는 이유는?", "qe": "The space underneath the plates in a lead-acid cell is to", "opts": [{"L": "A", "ko": "침전물이 극판에 닿아 단락되는 것 방지", "en": "Keep sediment from shorting the plates"}, {"L": "B", "ko": "전해액 대류 냉각", "en": "Electrolyte convection cooling"}, {"L": "C", "ko": "전해액 비율 확보", "en": "Electrolyte quantity ratio"}], "ans": "A", "expk": "침전물 축적 공간 → 단락 방지. [ASA 8092]", "expe": "Sediment collects there without touching plates. [ASA 8092]"}, {"id": "c4q67", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "Ni-Cd 배터리 셀 링크 토크 불량의 징후는?", "qe": "An indication of improperly torqued Ni-Cd cell link connections is", "opts": [{"L": "A", "ko": "셀 캡의 경미한 분출", "en": "Light spewing at cell caps"}, {"L": "B", "ko": "탄산칼륨 침전물", "en": "Potassium carbonate deposits"}, {"L": "C", "ko": "하드웨어의 발열·탄 자국", "en": "Heat or burn marks on the hardware"}], "ans": "C", "expk": "고저항 접촉 → 과열·burn mark. [ASA 8093]", "expe": "High-resistance path overheats and burns. [ASA 8093]"}, {"id": "c4q68", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "Ni-Cd 셀 상단의 소량 탄산칼륨 침전물이 뜻하는 것은?", "qe": "A small amount of potassium carbonate on Ni-Cd cells indicates", "opts": [{"L": "A", "ko": "정상 작동", "en": "Normal operation"}, {"L": "B", "ko": "과도한 가스 발생", "en": "Excessive gassing"}, {"L": "C", "ko": "극판 황산화", "en": "Plate sulfation"}], "ans": "A", "expk": "충전 말기 정상적 분출 잔여물. [ASA 8094]", "expe": "Normal residue from end-of-charge spewing. [ASA 8094]"}, {"id": "c4q69", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "Ni-Cd와 납산 배터리를 같은 정비구역에서 취급하면?", "qe": "Servicing Ni-Cd and lead-acid batteries in the same area likely results in", "opts": [{"L": "A", "ko": "전해액이 같아 문제 없음", "en": "No significant differences"}, {"L": "B", "ko": "납산만 오염", "en": "Only lead-acid contaminated"}, {"L": "C", "ko": "두 배터리 모두 오염", "en": "Contamination of both types"}], "ans": "C", "expk": "화학적으로 상극 — 구역·공구 분리. [ASA 8095]", "expe": "Chemistries are incompatible; keep areas separate. [ASA 8095]"}, {"id": "c4q70", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "Ni-Cd 배터리 전해액 수위가 가장 낮은 때는?", "qe": "The electrolyte of a Ni-Cd battery is lowest when the battery is", "opts": [{"L": "A", "ko": "충전 중", "en": "Being charged"}, {"L": "B", "ko": "방전 상태", "en": "In a discharged condition"}, {"L": "C", "ko": "고부하 상태", "en": "Under heavy load"}], "ans": "B", "expk": "방전 시 전해액이 극판에 흡수됨. [ASA 8096]", "expe": "Plates absorb electrolyte when discharged. [ASA 8096]"}, {"id": "c4q71", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "Ni-Cd 배터리의 충전 상태 확인 방법은?", "qe": "How can the state-of-charge of a Ni-Cd battery be determined?", "opts": [{"L": "A", "ko": "전해액 비중 측정", "en": "Specific gravity of electrolyte"}, {"L": "B", "ko": "측정 방전(Measured Discharge)", "en": "By a measured discharge"}, {"L": "C", "ko": "전해액 수위", "en": "Electrolyte level"}], "ans": "B", "expk": "Ni-Cd는 비중·전압이 거의 일정 → 완전 방전 후 재충전량으로 확인. [ASA 8099]", "expe": "Only a measured discharge reveals Ni-Cd charge state. [ASA 8099]"}, {"id": "c4q72", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "Ni-Cd 셀 온도가 상승하면 내부저항은?", "qe": "In nickel-cadmium batteries, a rise in cell temperature", "opts": [{"L": "A", "ko": "증가", "en": "Increases internal resistance"}, {"L": "B", "ko": "감소", "en": "Causes a decrease in internal resistance"}, {"L": "C", "ko": "전압 증가", "en": "Increases cell voltage"}], "ans": "B", "expk": "온도↑→저항↓→전류↑→열폭주 위험. [ASA 8101]", "expe": "Resistance drops, enabling thermal runaway. [ASA 8101]"}, {"id": "c4q73", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "Ni-Cd 열폭주의 조건으로 옳은 것은?", "qe": "Contributing factors to Ni-Cd thermal runaway are", "opts": [{"L": "A", "ko": "고내부저항+정전압 충전", "en": "High resistance, constant-potential charging"}, {"L": "B", "ko": "저내부저항+정전류 충전", "en": "Low resistance, constant-current"}, {"L": "C", "ko": "고온에서 낮아진 내부저항 + 정전압 충전의 큰 충·방전 전류", "en": "Low internal resistance intensified by high temperature and high current in constant-potential charging"}], "ans": "C", "expk": "온도↑→저항↓→전류↑ 악순환(정전압 충전). [ASA 8101-1]", "expe": "The runaway loop under constant-voltage charging. [ASA 8101-1]"}, {"id": "c4q74", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "Ni-Cd 충전 중 가스 발생 시점은?", "qe": "When a charging current is applied, Ni-Cd cells emit gas", "opts": [{"L": "A", "ko": "충전 말기", "en": "Toward the end of the charging cycle"}, {"L": "B", "ko": "충전 내내", "en": "Throughout charging"}, {"L": "C", "ko": "전해액 수위가 높을 때만", "en": "Only if level is high"}], "ans": "A", "expk": "말기에 물 분해로 가스 발생. [ASA 8102]", "expe": "Electrolyte decomposes near end of charge. [ASA 8102]"}, {"id": "c4q75", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "변압기 작동의 기본 원리는?", "qe": "The basis for transformer operation is mutual", "opts": [{"L": "A", "ko": "인덕턴스", "en": "Inductance"}, {"L": "B", "ko": "커패시턴스", "en": "Capacitance"}, {"L": "C", "ko": "리액턴스", "en": "Reactance"}], "ans": "A", "expk": "상호 인덕턴스로 1차→2차 유도. [ASA 8003]", "expe": "Mutual inductance couples the windings. [ASA 8003]"}, {"id": "c4q76", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전동기의 열 스위치(Thermal Protector)의 역할은?", "qe": "A thermal switch in an electric motor is designed to", "opts": [{"L": "A", "ko": "냉각팬 회로 폐쇄", "en": "Close the fan circuit"}, {"L": "B", "ko": "회로를 열어 모터를 냉각시킴", "en": "Open the circuit in order to allow cooling of the motor"}, {"L": "C", "ko": "회로를 접지로 우회", "en": "Reroute to ground"}], "ans": "B", "expk": "과열 시 전원 차단 → 냉각. [ASA 8056]", "expe": "It opens the power circuit when overheated. [ASA 8056]"}, {"id": "c4q77", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전기 회로의 정류기로 흔히 쓰이는 소자는?", "qe": "Which is commonly used as a rectifier in electrical circuits?", "opts": [{"L": "A", "ko": "다이오드와 애노드", "en": "Diodes and anodes"}, {"L": "B", "ko": "다이오드와 캐소드", "en": "Diodes and cathodes"}, {"L": "C", "ko": "다이오드", "en": "Diodes"}], "ans": "C", "expk": "다이오드=전자 체크밸브. [ASA 8039-1]", "expe": "Diodes act as electron check valves. [ASA 8039-1]"}, {"id": "c4q78", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전원 공급 회로에서 다이오드의 주 용도는?", "qe": "Diodes are used in power supply circuits primarily as", "opts": [{"L": "A", "ko": "스위치", "en": "Switches"}, {"L": "B", "ko": "정류기", "en": "Rectifiers"}, {"L": "C", "ko": "릴레이", "en": "Relays"}], "ans": "B", "expk": "한 방향 통과=정류. [ASA 8040]", "expe": "One-way flow = rectification. [ASA 8040]"}, {"id": "c4q79", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "P-N-P 트랜지스터가 켜지는(도통) 조건은?", "qe": "A P-N-P transistor is turned on when the", "opts": [{"L": "A", "ko": "베이스가 이미터보다 음(−)", "en": "Base is negative with respect to the emitter"}, {"L": "B", "ko": "베이스가 이미터보다 양(+)", "en": "Base positive w.r.t. emitter"}, {"L": "C", "ko": "이미터가 베이스보다 음(−)", "en": "Emitter negative w.r.t. base"}], "ans": "A", "expk": "PNP는 베이스가 이미터 대비 음일 때 순바이어스. [ASA 8075]", "expe": "Forward biased when base is negative to emitter. [ASA 8075]"}, {"id": "c4q80", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "N-P-N 트랜지스터가 켜지는 조건은?", "qe": "An N-P-N transistor is turned on when the", "opts": [{"L": "A", "ko": "이미터가 베이스보다 양(+)", "en": "Emitter positive w.r.t. base"}, {"L": "B", "ko": "베이스가 이미터보다 음(−)", "en": "Base negative w.r.t. emitter"}, {"L": "C", "ko": "베이스가 이미터보다 양(+)", "en": "Base is positive with respect to the emitter"}], "ans": "C", "expk": "NPN은 베이스가 이미터 대비 양일 때 도통. [ASA 8076]", "expe": "Conducts when base is positive to emitter. [ASA 8076]"}, {"id": "c4q81", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "제너 다이오드의 대표적 용도는?", "qe": "Typical application for zener diodes is as", "opts": [{"L": "A", "ko": "전파 정류기", "en": "Full-wave rectifiers"}, {"L": "B", "ko": "반파 정류기", "en": "Half-wave rectifiers"}, {"L": "C", "ko": "전압 조절기", "en": "Voltage regulators"}], "ans": "C", "expk": "역방향 항복 특성으로 전압 감지·조절. [ASA 8077]", "expe": "Reverse-breakdown behavior senses/regulates voltage. [ASA 8077]"}, {"id": "c4q82", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "반도체 소자를 순방향 바이어스하면?", "qe": "Forward biasing of a solid-state device causes it to", "opts": [{"L": "A", "ko": "제너 항복으로 도통", "en": "Conduct via zener breakdown"}, {"L": "B", "ko": "도통한다", "en": "Conduct"}, {"L": "C", "ko": "차단된다", "en": "Turn off"}], "ans": "B", "expk": "순바이어스=도통. [ASA 8079]", "expe": "Forward bias makes it conduct. [ASA 8079]"}, {"id": "c4q83", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "회로도에서 0V 기준으로 간주되는 지점은?", "qe": "On a circuit diagram, what point is considered to be at zero voltage?", "opts": [{"L": "A", "ko": "회로차단기", "en": "The circuit breaker"}, {"L": "B", "ko": "스위치", "en": "The switch"}, {"L": "C", "ko": "접지 기준점", "en": "The ground reference"}], "ans": "C", "expk": "모든 전압은 접지 기준으로 측정. [ASA 8072]", "expe": "All voltages are measured from ground reference. [ASA 8072]"}, {"id": "c4q84", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전기 회로도의 접지 기호가 나타내는 것은?", "qe": "The ground symbol in circuit diagrams shows that", "opts": [{"L": "A", "ko": "공통 버스 연결", "en": "A common bus"}, {"L": "B", "ko": "에너지원 표시", "en": "The source of energy"}, {"L": "C", "ko": "전원과 부하 사이 전류의 귀환 경로 존재", "en": "There is a return path for the current"}], "ans": "C", "expk": "접지=전류 리턴 경로. [ASA 8072-1]", "expe": "Ground indicates the current return path. [ASA 8072-1]"}, {"id": "c4q85", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "개방(Open)된 저항을 전압계로 점검하면?", "qe": "Troubleshooting an open circuit with a voltmeter will", "opts": [{"L": "A", "ko": "전류가 흘러 램프 점등", "en": "Permit current and light the lamp"}, {"L": "B", "ko": "저저항 경로 형성", "en": "Create a low-resistance path"}, {"L": "C", "ko": "전압계에 전원(배터리) 전압이 표시됨", "en": "Permit the battery voltage to appear on the voltmeter"}], "ans": "C", "expk": "개방부 양단에 전체 전압이 걸림. [ASA 8073]", "expe": "The full source voltage appears across the open. [ASA 8073]"}, {"id": "c4q86", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "정전기장(Electrostatic Field)의 다른 이름은?", "qe": "Electrostatic fields are also known as", "opts": [{"L": "A", "ko": "유전장(Dielectric Fields)", "en": "Dielectric fields"}, {"L": "B", "ko": "전자기장", "en": "Electromagnetic fields"}, {"L": "C", "ko": "중력장", "en": "Gravity fields"}], "ans": "A", "expk": "대전체 주위의 힘의 장=유전장. [ASA 8002-2]", "expe": "Also called dielectric fields. [ASA 8002-2]"}, {"id": "c4q87", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "전류 제한기(Current Limiter)를 나타내는 회로 기호는?<svg viewBox=\"0 0 340 70\" style=\"max-width:340px;display:block;margin:10px 0;background:#fff;border-radius:8px;padding:6px\" xmlns=\"http://www.w3.org/2000/svg\"><g stroke=\"#111\" stroke-width=\"2\" fill=\"none\"><line x1=\"10\" y1=\"35\" x2=\"45\" y2=\"35\"/><polygon points=\"45,20 45,50 75,35\" fill=\"#111\"/><polyline points=\"75,20 75,50\"/><polyline points=\"68,14 75,20 82,14\" fill=\"none\"/><polyline points=\"68,56 75,50 82,56\" fill=\"none\"/><line x1=\"75\" y1=\"35\" x2=\"105\" y2=\"35\"/><line x1=\"130\" y1=\"35\" x2=\"165\" y2=\"35\"/><polygon points=\"165,20 165,50 195,35\" fill=\"#111\"/><line x1=\"195\" y1=\"18\" x2=\"195\" y2=\"52\"/><line x1=\"195\" y1=\"35\" x2=\"225\" y2=\"35\"/><line x1=\"245\" y1=\"35\" x2=\"270\" y2=\"35\"/><polygon points=\"270,20 270,50 295,35\" fill=\"#111\"/><polygon points=\"320,20 320,50 295,35\" fill=\"#111\"/><line x1=\"320\" y1=\"35\" x2=\"335\" y2=\"35\"/></g><g font-family=\"sans-serif\" font-size=\"13\" fill=\"#111\"><text x=\"70\" y=\"66\">1</text><text x=\"190\" y=\"66\">2</text><text x=\"292\" y=\"66\">3</text></g></svg>", "qe": "What schematic symbol represents a current limiter? (See figure: 1, 2, 3)", "opts": [{"L": "A", "ko": "삼각형과 Z형 기호 (1번)", "en": "A triangle and a Z-like symbol (1)"}, {"L": "B", "ko": "삼각형 하나와 수직선 (2번)", "en": "One triangle pointing to a vertical line (2)"}, {"L": "C", "ko": "마주 보는 두 삼각형 (3번)", "en": "Two triangles pointing to each other (3)"}], "ans": "C", "expk": "3=전류 제한기, 1=제너 다이오드, 2=일반 다이오드. [ASA 8597]", "expe": "3 is the current limiter; 1 zener; 2 general diode. [ASA 8597]"}, {"id": "c4q88", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "코일 인덕터를 강하게 만드는 요인은?", "qe": "What factors strengthen a coil inductor?", "opts": [{"L": "A", "ko": "코일 제한·분리", "en": "Limiting and separating the coils"}, {"L": "B", "ko": "코일 추가·분리", "en": "Adding and separating"}, {"L": "C", "ko": "코일을 촘촘히 추가", "en": "Adding coils close together"}], "ans": "C", "expk": "감은 수를 늘리고 촘촘히 → 강한 전자석. [ASA 8004-1]", "expe": "More loops close together strengthen the field. [ASA 8004-1]"}, {"id": "c4q89", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "자기력선이 가장 잘 통과하는 재료는?", "qe": "Through which material will magnetic lines of force pass most readily?", "opts": [{"L": "A", "ko": "구리", "en": "Copper"}, {"L": "B", "ko": "철", "en": "Iron"}, {"L": "C", "ko": "알루미늄", "en": "Aluminum"}], "ans": "B", "expk": "철의 투자율(Permeability)이 가장 높음. [ASA 8052]", "expe": "Iron has the highest permeability. [ASA 8052]"}, {"id": "c4q90", "ch": 4, "chko": "기초 전기", "file": "ch04_basic_electricity.html", "qk": "AC 회로용 커패시터의 작동 전압(Working Voltage) 기준은?", "qe": "The working voltage of a capacitor in an AC circuit should be", "opts": [{"L": "A", "ko": "최고 인가 전압과 동일", "en": "Equal to the highest applied voltage"}, {"L": "B", "ko": "최고 인가 전압보다 20% 이상 높게", "en": "At least 20 percent greater"}, {"L": "C", "ko": "최고 인가 전압보다 50% 이상 높게", "en": "At least 50 percent greater than the highest applied voltage"}], "ans": "C", "expk": "유전체 파괴 방지를 위해 50% 여유. [ASA 8001]", "expe": "At least 50 percent margin. [ASA 8001]"}, {"id": "c5q1", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "단일 부품의 치수·재질을 보여주는 도면은?", "qe": "Which drawing shows one part's dimensions and material?", "opts": [{"L": "A", "ko": "조립도", "en": "Assembly"}, {"L": "B", "ko": "상세도", "en": "Detail"}, {"L": "C", "ko": "설치도", "en": "Installation"}, {"L": "D", "ko": "회로도", "en": "Schematic"}], "ans": "B", "expk": "상세도(Detail)입니다.", "expe": "A detail drawing."}, {"id": "c5q2", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "도면에서 부품을 식별하는 핵심 정보는?", "qe": "What identifies a part on a drawing?", "opts": [{"L": "A", "ko": "축척", "en": "Scale"}, {"L": "B", "ko": "도면 번호", "en": "Drawing number"}, {"L": "C", "ko": "재질", "en": "Material"}, {"L": "D", "ko": "날짜", "en": "Date"}], "ans": "B", "expk": "제목란의 도면 번호입니다.", "expe": "The drawing number in the title block."}, {"id": "c5q3", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "숨은선(Hidden Line)은 어떤 선인가?", "qe": "A hidden line is a:", "opts": [{"L": "A", "ko": "굵은 실선", "en": "Thick solid line"}, {"L": "B", "ko": "파선", "en": "Dashed line"}, {"L": "C", "ko": "일점쇄선", "en": "Chain line"}, {"L": "D", "ko": "이점쇄선", "en": "Phantom line"}], "ans": "B", "expk": "숨은선은 파선으로 그립니다.", "expe": "Hidden lines are dashed."}, {"id": "c5q4", "ch": 5, "chko": "항공기 도면", "file": "ch05_aircraft_drawings.html", "qk": "부품의 물리적 위치와 무관하게 기능을 기호로 보여주는 도면은?", "qe": "Which shows function symbolically regardless of physical location?", "opts": [{"L": "A", "ko": "배선도", "en": "Wiring diagram"}, {"L": "B", "ko": "회로도", "en": "Schematic"}, {"L": "C",
